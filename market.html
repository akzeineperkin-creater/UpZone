
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upzone — Stars Market</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0d0d0d;
            --bg2: #141414;
            --bg3: #1a1a1a;
            --border: #2a2a2a;
            --acid: #e8ff00;
            --acid2: #c8f000;
            --text: #f5f5f0;
            --muted: #888880;
            --red: #ff3c3c;
        }

        html, body { min-height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            cursor: crosshair;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            pointer-events: none; z-index: 9997;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* ── UTILS ── */
        .hidden { display: none !important; }

        /* ── NAV ── */
        nav {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 4px;
            color: var(--text);
            text-decoration: none;
        }

        .nav-logo span { color: var(--acid); }

        .nav-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-profile-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
            padding: 8px 14px;
            cursor: crosshair;
            background: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.15s;
        }
        .nav-profile-btn:hover { border-color: var(--acid); }

        .nav-profile-info { text-align: right; }

        #user-name-nav {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
        }

        #user-balance-nav {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            color: var(--acid);
        }

        .nav-create-btn {
            padding: 9px 20px;
            background: var(--acid);
            border: none;
            color: #0d0d0d;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: crosshair;
            transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
        }
        .nav-create-btn:hover {
            background: var(--acid2);
            transform: translate(-2px,-2px);
            box-shadow: 2px 2px 0 var(--acid);
        }

        /* ── MAIN ── */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 40px 80px;
        }

        /* market header */
        .market-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .market-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px;
            letter-spacing: 0.5px;
            line-height: 1;
        }

        .market-count {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── POSTS GRID ── */
        #posts-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            border: 1px solid var(--border);
        }

        .post-card {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: background 0.15s;
        }

        .post-card:hover { background: var(--bg2); }

        .post-card:hover .post-img-overlay { opacity: 1; }

        .post-img-wrap {
            height: 200px;
            background: var(--bg3);
            position: relative;
            overflow: hidden;
            cursor: crosshair;
            border-bottom: 1px solid var(--border);
        }

        .post-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .post-card:hover .post-img-wrap img { transform: scale(1.03); }

        .post-img-empty {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #333;
        }

        .post-img-overlay {
            position: absolute;
            inset: 0;
            background: rgba(232,255,0,0.06);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .post-extra-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text);
            padding: 4px 8px;
            border: 1px solid var(--border);
        }

        .post-body {
            padding: 20px;
            flex: 1;
            cursor: crosshair;
        }

        .post-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .post-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .post-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            color: var(--acid);
        }

        .post-author {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .post-rating {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--acid);
            margin-top: 6px;
        }

        .post-rating.new-post { color: var(--muted); font-style: italic; }

        .post-actions {
            display: flex;
            border-top: 1px solid var(--border);
        }

        .post-chat-btn {
            flex: 1;
            padding: 11px;
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-decoration: none;
            text-align: center;
            cursor: crosshair;
            transition: background 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .post-chat-btn:hover { background: var(--acid); color: #0d0d0d; }

        .post-delete-btn {
            padding: 11px 16px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: crosshair;
            font-size: 14px;
            transition: background 0.15s, color 0.15s;
        }

        .post-delete-btn:hover { background: var(--red); color: #fff; }

        .empty-state {
            padding: 80px 40px;
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #333;
            grid-column: 1/-1;
        }

        /* ── VIEW MODAL ── */
        #view-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #view-modal.open { display: flex; }

        .view-modal-inner {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-top: 2px solid var(--acid);
            max-width: 640px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: fadeScale 0.2s ease;
        }

        @keyframes fadeScale {
            from { transform: scale(0.96); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        /* gallery */
        #view-gallery {
            position: relative;
            background: var(--bg3);
            border-bottom: 1px solid var(--border);
        }

        #gallery-slides {
            position: relative;
            height: 280px;
            overflow: hidden;
        }

        .gallery-nav-btn {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 36px; height: 36px;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: crosshair;
            z-index: 10;
            transition: background 0.15s, border-color 0.15s;
        }

        .gallery-nav-btn:hover { background: var(--acid); color: #0d0d0d; border-color: var(--acid); }
        #gallery-prev { left: 10px; }
        #gallery-next { right: 10px; }

        #gallery-dots {
            position: absolute;
            bottom: 10px;
            left: 50%; transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .g-dot {
            width: 6px; height: 6px;
            background: rgba(255,255,255,0.3);
            cursor: crosshair;
            transition: background 0.15s;
        }

        .g-dot.active { background: var(--acid); }

        .view-close-btn {
            position: absolute;
            top: 12px; right: 12px;
            width: 32px; height: 32px;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: crosshair;
            z-index: 10;
            transition: border-color 0.15s, color 0.15s;
            line-height: 1;
        }

        .view-close-btn:hover { border-color: var(--acid); color: var(--acid); }

        /* view content */
        .view-content { padding: 32px; }

        .view-title-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 20px;
        }

        #view-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 0.5px;
            line-height: 1;
        }

        #view-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 1px;
            color: var(--acid);
            white-space: nowrap;
        }

        .view-desc-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        #view-desc {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 24px;
            max-height: 120px;
            overflow-y: auto;
        }

        .view-author-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--bg3);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        #view-avatar-letter {
            width: 40px; height: 40px;
            background: var(--acid);
            color: #0d0d0d;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            flex-shrink: 0;
        }

        .view-author-info {}
        .view-author-label {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2px;
        }

        #view-author {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
        }

        #view-rating {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--acid);
            margin-top: 2px;
        }

        #view-chat-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--acid);
            color: #0d0d0d;
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            cursor: crosshair;
            transition: background 0.15s;
        }

        #view-chat-btn:hover { background: var(--acid2); }

        /* ── CREATE MODAL ── */
        #post-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #post-modal.open { display: flex; }

        .post-modal-inner {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-top: 2px solid var(--acid);
            padding: 36px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeScale 0.2s ease;
        }

        .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 1px;
            margin-bottom: 28px;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .modal-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            border-radius: 0;
            transition: border-color 0.15s;
        }

        .modal-input:focus { border-color: var(--acid); }
        .modal-input::placeholder { color: #333; }

        textarea.modal-input { resize: vertical; min-height: 96px; }

        /* photo upload */
        .photo-upload-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px dashed var(--border);
            color: var(--muted);
            cursor: crosshair;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: border-color 0.15s, color 0.15s;
        }

        .photo-upload-label:hover { border-color: var(--acid); color: var(--acid); }

        #photo-count { margin-left: auto; }

        #photo-preview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .photo-thumb {
            position: relative;
            aspect-ratio: 1;
        }

        .photo-thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-remove {
            position: absolute;
            top: -4px; right: -4px;
            width: 18px; height: 18px;
            background: var(--red);
            border: none;
            color: #fff;
            font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: crosshair;
            line-height: 1;
        }

        .modal-btn-row {
            display: flex;
            gap: 0;
            margin-top: 8px;
        }

        .modal-cancel-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: 1px solid var(--border);
            border-right: none;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: crosshair;
            transition: border-color 0.15s, color 0.15s;
        }

        .modal-cancel-btn:hover { border-color: var(--text); color: var(--text); }

        .modal-publish-btn {
            flex: 1;
            padding: 14px;
            background: var(--acid);
            border: none;
            color: #0d0d0d;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: crosshair;
            transition: background 0.15s;
        }

        .modal-publish-btn:hover { background: var(--acid2); }
        .modal-publish-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

        /* ── SIDEBAR ── */
        #profile-sidebar {
            position: fixed;
            top: 0; right: 0;
            height: 100%;
            width: 360px;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.28s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        #profile-sidebar.open { transform: translateX(0); }

        .sidebar-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-shrink: 0;
        }

        .sidebar-head-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-head-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .sidebar-close-btn {
            width: 30px; height: 30px;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: crosshair;
            transition: border-color 0.15s, color 0.15s;
            line-height: 1;
        }

        .sidebar-close-btn:hover { border-color: var(--acid); color: var(--acid); }

        .sidebar-user-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .sidebar-avatar {
            width: 40px; height: 40px;
            background: var(--bg3);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        #side-username {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
            display: block;
        }

        #side-balance {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            color: var(--acid);
        }

        .topup-link {
            margin-left: auto;
            padding: 7px 14px;
            background: var(--acid);
            color: #0d0d0d;
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .topup-link:hover { background: var(--acid2); }

        /* tabs */
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 4px;
            background: none;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: crosshair;
            transition: background 0.15s, color 0.15s;
        }

        .tab-btn:last-child { border-right: none; }
        .tab-btn:hover { color: var(--text); background: var(--bg3); }
        .tab-btn.active { color: var(--acid); background: rgba(232,255,0,0.04); border-bottom: 2px solid var(--acid); }

        /* sidebar content */
        .sidebar-content { flex: 1; overflow-y: auto; padding: 16px; }

        /* sidebar panel profile */
        .sidebar-nav-btn {
            width: 100%;
            padding: 12px 14px;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: crosshair;
            text-align: left;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }

        .sidebar-nav-btn:hover { color: var(--text); border-color: var(--text); background: var(--bg3); }

        .sidebar-nav-btn.accent { color: var(--acid); border-color: rgba(232,255,0,0.3); }
        .sidebar-nav-btn.accent:hover { background: rgba(232,255,0,0.05); border-color: var(--acid); }

        /* history items */
        .history-item {
            padding: 12px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            cursor: crosshair;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: background 0.15s, border-color 0.15s;
            animation: fadeIn .3s ease;
        }

        .history-item:hover { background: var(--bg3); border-color: var(--acid); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

        .history-thumb {
            width: 52px; height: 52px;
            flex-shrink: 0;

<script>
    const SB_URL = 'https://dvwegmdyhjyihrxqvoiw.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2d2VnbWR5aGp5aWhyeHF2b2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0MDYwOTAsImV4cCI6MjA4Mzk4MjA5MH0.HrG5GijHH4Lj7mO3SorbG0kKfnl5FLtSCWp6aONYxJ8';
    let supabaseClient;

    let globalProfile = null;
    let allPosts = [];
    let selectedPhotos = [];
    let currentSlide = 0;
    let currentImages = [];
    let activeTab = 'profile';
    let sellerLoaded = false;
    let buyerLoaded = false;

    // ─── Sidebar & tabs ───────────────────────────────────────────
    function toggleSidebar() {
        const sidebar = document.getElementById('profile-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const isOpen = sidebar.classList.contains('open');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
        if (!isOpen && globalProfile) {
            if (activeTab === 'seller' && !sellerLoaded) loadSellerHistory();
            if (activeTab === 'buyer'  && !buyerLoaded)  loadBuyerHistory();
        }
    }

    function switchTab(tab) {
        activeTab = tab;
        ['profile','seller','buyer'].forEach(t => {
            document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
            const btn = document.getElementById('tab-' + t);
            btn.classList.toggle('active', t === tab);
        });
        if (tab === 'seller' && !sellerLoaded && globalProfile) loadSellerHistory();
        if (tab === 'buyer'  && !buyerLoaded  && globalProfile) loadBuyerHistory();
    }

    // ─── Seller history ───────────────────────────────────────────
    async function loadSellerHistory() {
        if (!globalProfile) return;
        const container = document.getElementById('seller-history');
        container.innerHTML = '<div class="sidebar-empty">Загрузка...</div>';

        const { data: posts, error } = await supabaseClient
            .from('posts').select('*')
            .eq('author_id', globalProfile.id)
            .order('created_at', { ascending: false });

        if (error || !posts || posts.length === 0) {
            container.innerHTML = '<div class="sidebar-empty">Нет объявлений</div>';
            document.getElementById('seller-count').textContent = '0';
            sellerLoaded = true;
            return;
        }

        document.getElementById('seller-count').textContent = posts.length;

        let chatCounts = {};
        try {
            const { data: msgs } = await supabaseClient.from('messages')
                .select('post_id, sender_id')
                .in('post_id', posts.map(p => p.id))
                .neq('sender_id', globalProfile.id);
            if (msgs) {
                msgs.forEach(m => {
                    if (m.post_id) {
                        if (!chatCounts[m.post_id]) chatCounts[m.post_id] = new Set();
                        chatCounts[m.post_id].add(m.sender_id);
                    }
                });
            }
        } catch(e) {}

        container.innerHTML = posts.map(post => {
            const img = (post.images && post.images[0]) || post.image_url;
            const date = new Date(post.created_at).toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
            const buyers = chatCounts[post.id] ? chatCounts[post.id].size : 0;
            const ratingHtml = post.rating > 0
                ? `<span class="history-badge badge-done">★ ${post.rating.toFixed(1)}</span>`
                : `<span class="history-badge badge-wait">Новый</span>`;

            return `<div class="history-item" onclick="openViewModal('${post.id}'); toggleSidebar();">
                <div class="history-thumb">${img ? `<img src="${img}">` : '📷'}</div>
                <div class="history-info">
                    <div class="history-title">${post.title}</div>
                    <div class="history-price">${post.price} ⭐</div>
                    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px;">
                        ${ratingHtml}
                        ${buyers > 0 ? `<span class="history-badge badge-new">💬 ${buyers}</span>` : ''}
                    </div>
                </div>
                <div class="history-meta">
                    <div class="history-date">${date}</div>
                    <button onclick="event.stopPropagation(); deletePost('${post.id}')" class="history-delete-btn">× Удалить</button>
                </div>
            </div>`;
        }).join('');

        sellerLoaded = true;
    }

    // ─── Buyer history ────────────────────────────────────────────
    async function loadBuyerHistory() {
        if (!globalProfile) return;
        const container = document.getElementById('buyer-history');
        container.innerHTML = '<div class="sidebar-empty">Загрузка...</div>';

        let chats = [];
        try {
            const { data: msgs } = await supabaseClient.from('messages')
                .select('*').eq('sender_id', globalProfile.id).order('created_at', { ascending: false });
            if (msgs && msgs.length > 0) {
                const seen = new Map();
                msgs.forEach(m => {
                    const key = m.receiver_id || m.room_id || m.chat_id;
                    if (key && !seen.has(key)) seen.set(key, m);
                });
                chats = Array.from(seen.values());
            }
        } catch(e) {}

        if (chats.length === 0) {
            try {
                const { data: convs } = await supabaseClient.from('conversations')
                    .select('*')
                    .or(`user1_id.eq.${globalProfile.id},user2_id.eq.${globalProfile.id}`)
                    .order('updated_at', { ascending: false });
                if (convs && convs.length > 0) chats = convs;
            } catch(e) {}
        }

        if (chats.length === 0) {
            container.innerHTML = '<div class="sidebar-empty">Нет переписок</div>';
            document.getElementById('buyer-count').textContent = '0';
            buyerLoaded = true;
            return;
        }

        document.getElementById('buyer-count').textContent = chats.length;

        const rendered = await Promise.all(chats.map(async (chat) => {
            const otherId = chat.receiver_id || (chat.user1_id === globalProfile.id ? chat.user2_id : chat.user1_id) || null;
            let otherName = chat.receiver_name || chat.other_name || 'Продавец';
            let postTitle = chat.post_title || '';
            let postPrice = chat.post_price || '';

            if (otherId && (!otherName || otherName === 'Продавец')) {
                try {
                    const { data: prof } = await supabaseClient.from('profiles').select('username').eq('id', otherId).single();
                    if (prof) otherName = prof.username;
                } catch(e) {}
            }
            if (chat.post_id && !postTitle) {
                const post = allPosts.find(p => p.id === chat.post_id);
                if (post) { postTitle = post.title; postPrice = post.price + ' ⭐'; }
            }

            const date = new Date(chat.created_at || chat.updated_at || Date.now())
                .toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
            const chatUrl = otherId ? `chat.html?user_id=${otherId}&name=${encodeURIComponent(otherName)}` : 'chat.html';

            return `<div class="history-item">
                <div class="history-thumb" style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);">
                    ${otherName[0]?.toUpperCase() || '?'}
                </div>
                <div class="history-info">
                    <div class="history-title">@${otherName}</div>
                    ${postTitle ? `<div style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${postTitle}</div>` : ''}
                    ${postPrice ? `<div class="history-price">${postPrice}</div>` : ''}
                </div>
                <div class="history-meta">
                    <div class="history-date">${date}</div>
                    <a href="${chatUrl}" onclick="toggleSidebar()" class="history-open-link">Открыть →</a>
                </div>
            </div>`;
        }));

        container.innerHTML = rendered.join('') || '<div class="sidebar-empty">Нет переписок</div>';
        buyerLoaded = true;
    }

    // ─── Gallery ──────────────────────────────────────────────────
    function openGallery(images) {
        currentImages = images || [];
        currentSlide = 0;
        const slides = document.getElementById('gallery-slides');
        const dots = document.getElementById('gallery-dots');
        slides.innerHTML = '';
        dots.innerHTML = '';

        if (currentImages.length === 0) {
            slides.innerHTML = `<div style="height:100%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#333;">Без фото</div>`;
            document.getElementById('gallery-prev').classList.add('hidden');
            document.getElementById('gallery-next').classList.add('hidden');
            return;
        }

        currentImages.forEach((url, i) => {
            const slide = document.createElement('div');
            slide.style.cssText = `position:absolute;inset:0;transition:opacity 0.3s;opacity:${i === 0 ? 1 : 0}`;
            slide.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
            slides.appendChild(slide);
            const dot = document.createElement('div');
            dot.className = `g-dot${i === 0 ? ' active' : ''}`;
            dot.onclick = () => goToSlide(i);
            dots.appendChild(dot);
        });

        const showNav = currentImages.length > 1;
        document.getElementById('gallery-prev').classList.toggle('hidden', !showNav);
        document.getElementById('gallery-next').classList.toggle('hidden', !showNav);
    }

    function changeSlide(dir) {
        if (currentImages.length === 0) return;
        goToSlide((currentSlide + dir + currentImages.length) % currentImages.length);
    }

    function goToSlide(index) {
        const slides = document.getElementById('gallery-slides').children;
        const dots = document.getElementById('gallery-dots').children;
        if (!slides[currentSlide]) return;
        slides[currentSlide].style.opacity = '0';
        if (dots[currentSlide]) dots[currentSlide].classList.remove('active');
        currentSlide = index;
        slides[currentSlide].style.opacity = '1';
        if (dots[currentSlide]) dots[currentSlide].classList.add('active');
    }

    // ─── Modals ───────────────────────────────────────────────────
    function openViewModal(postId) {
        const post = allPosts.find(p => p.id === postId);
        if (!post) return;
        document.getElementById('view-title').innerText = post.title;
        document.getElementById('view-desc').innerText = post.description || "Автор не оставил описания.";
        document.getElementById('view-price').innerText = `${post.price} ⭐`;
        document.getElementById('view-author').innerText = `@${post.author_name}`;
        document.getElementById('view-avatar-letter').innerText = post.author_name[0].toUpperCase();
        const ratingDiv = document.getElementById('view-rating');
        ratingDiv.innerHTML = post.rating > 0
            ? `★ ${post.rating.toFixed(1)} (${post.review_count || 0})`
            : '<span style="color:var(--muted);font-style:italic;">Новый продавец</span>';
        const images = post.images || (post.image_url ? [post.image_url] : []);
        openGallery(images);
        document.getElementById('view-chat-btn').href = `chat.html?user_id=${post.author_id}&name=${encodeURIComponent(post.author_name)}`;
        document.getElementById('view-modal').classList.add('open');
    }

    function closeViewModal() { document.getElementById('view-modal').classList.remove('open'); }

    function checkAuthAndOpenModal() {
        if (!globalProfile) return alert("Нужна авторизация!");
        document.getElementById('post-modal').classList.add('open');
    }

    function closePostModal() {
        document.getElementById('post-modal').classList.remove('open');
        selectedPhotos = [];
        document.getElementById('photo-preview').innerHTML = '';
        document.getElementById('photo-count').textContent = '0/5';
        document.getElementById('photo-label').style.display = 'flex';
        document.getElementById('p-title').value = '';
        document.getElementById('p-desc').value = '';
        document.getElementById('p-price').value = '';
    }

    // ─── Photos ───────────────────────────────────────────────────
    function handlePhotoSelect(input) {
        const files = Array.from(input.files);
        const remaining = 5 - selectedPhotos.length;
        selectedPhotos = [...selectedPhotos, ...files.slice(0, remaining)];
        updatePhotoPreview();
        input.value = '';
    }

    function updatePhotoPreview() {
        const preview = document.getElementById('photo-preview');
        document.getElementById('photo-count').textContent = `${selectedPhotos.length}/5`;
        preview.innerHTML = '';
        selectedPhotos.forEach((file, i) => {
            const url = URL.createObjectURL(file);
            const div = document.createElement('div');
            div.className = 'photo-thumb';
            div.innerHTML = `<img src="${url}"><button class="photo-remove" onclick="removePhoto(${i})">×</button>`;
            preview.appendChild(div);
        });
        document.getElementById('photo-label').style.display = selectedPhotos.length >= 5 ? 'none' : 'flex';
    }

    function removePhoto(index) { selectedPhotos.splice(index, 1); updatePhotoPreview(); }

    // ─── Posts ────────────────────────────────────────────────────
    async function loadPosts() {
        const { data: posts } = await supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
        allPosts = posts || [];

        const container = document.getElementById('posts-list');
        const countEl = document.getElementById('posts-count');

        if (allPosts.length === 0) {
            container.innerHTML = '<div class="empty-state">Объявлений пока нет</div>';
            countEl.textContent = '0 объявлений';
            return;
        }

        countEl.textContent = `${allPosts.length} объявлений`;

        container.innerHTML = allPosts.map(post => {
            const images = post.images || (post.image_url ? [post.image_url] : []);
            const firstImg = images[0];
            const extraCount = images.length > 1 ? images.length - 1 : 0;

            return `<div class="post-card">
                <div class="post-img-wrap" onclick="openViewModal('${post.id}')">
                    ${firstImg
                        ? `<img src="${firstImg}" alt="${post.title}">`
                        : `<div class="post-img-empty">Без фото</div>`}
                    <div class="post-img-overlay"></div>
                    ${extraCount > 0 ? `<span class="post-extra-badge">+${extraCount}</span>` : ''}
                </div>
                <div class="post-body" onclick="openViewModal('${post.id}')">
                    <div class="post-title">${post.title}</div>
                    <div class="post-desc">${post.description || ''}</div>
                    <div class="post-meta">
                        <span class="post-price">${post.price} ⭐</span>
                        <span class="post-author">@${post.author_name}</span>
                    </div>
                    <div class="post-rating ${post.rating > 0 ? '' : 'new-post'}">
                        ${post.rating > 0
                            ? `★ ${post.rating.toFixed(1)} (${post.review_count || 0})`
                            : 'Новый'}
                    </div>
                </div>
                <div class="post-actions">
                    <a href="chat.html?user_id=${post.author_id}&name=${encodeURIComponent(post.author_name)}"
                        onclick="event.stopPropagation()"
                        class="post-chat-btn">
                        💬 Chat
                    </a>
                    ${post.author_id === globalProfile?.id ? `
                    <button onclick="event.stopPropagation(); deletePost('${post.id}')" class="post-delete-btn">🗑</button>
                    ` : ''}
                </div>
            </div>`;
        }).join('');
    }

    async function deletePost(postId) {
        if (!confirm('Удалить этот пост?')) return;
        const { error } = await supabaseClient.from('posts').delete().eq('id', postId);
        if (error) alert('Ошибка: ' + error.message);
        else { sellerLoaded = false; loadPosts(); }
    }

    async function publish() {
        const title = document.getElementById('p-title').value.trim();
        const desc  = document.getElementById('p-desc').value.trim();
        const price = document.getElementById('p-price').value;
        const btn   = document.getElementById('pub-btn');
        if (!title || !price) return alert("Заполни название и цену!");
        btn.innerText = "Публикация...";
        btn.disabled = true;

        let imageUrls = [];
        for (const file of selectedPhotos) {
            const ext = file.name.split('.').pop();
            const path = `posts/${globalProfile.id}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
            const { error: upErr } = await supabaseClient.storage.from('chat-media').upload(path, file);
            if (!upErr) {
                const { data: urlData } = supabaseClient.storage.from('chat-media').getPublicUrl(path);
                imageUrls.push(urlData.publicUrl);
            }
        }

        const { error } = await supabaseClient.from('posts').insert([{
            title, description: desc, price: parseInt(price),
            author_id: globalProfile.id, author_name: globalProfile.username,
            images: imageUrls.length > 0 ? imageUrls : null,
            image_url: imageUrls[0] || null, rating: 0, review_count: 0
        }]);

        btn.innerText = "Опубликовать →";
        btn.disabled = false;

        if (error) alert(error.message);
        else { sellerLoaded = false; closePostModal(); loadPosts(); }
    }

    // ─── Init ─────────────────────────────────────────────────────
    async function init() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if (profile) {
                globalProfile = profile;
                document.getElementById('user-name-nav').innerText = profile.username || 'Гость';
                document.getElementById('user-balance-nav').innerText = profile.wallet_balance || 0;
                document.getElementById('side-username').innerText = `@${profile.username || 'Гость'}`;
                document.getElementById('side-balance').innerText = profile.wallet_balance || 0;
            }
        }
        loadPosts();

        supabaseClient.channel('posts-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => {
                sellerLoaded = false; loadPosts();
            }).subscribe();

        if (user) {
            supabaseClient.channel('balance-market')
                .on('postgres_changes', {
                    event: 'UPDATE', schema: 'public', table: 'profiles',
                    filter: `id=eq.${user.id}`
                }, payload => {
                    const newBalance = payload.new.wallet_balance || 0;
                    document.getElementById('user-balance-nav').innerText = newBalance;
                    document.getElementById('side-balance').innerText = newBalance;
                    if (globalProfile) globalProfile.wallet_balance = newBalance;
                }).subscribe();
        }
    }

    window.onload = function() {
        const _supabase = window.supabase || window.Supabase;
        if (!_supabase) { alert('Ошибка: библиотека Supabase не загрузилась.'); return; }
        supabaseClient = _supabase.createClient(SB_URL, SB_KEY);
        init();
    };
</script>
</body>
