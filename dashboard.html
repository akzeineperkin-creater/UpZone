<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upzone — Добро пожаловать</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0e17;
      background: linear-gradient(to bottom, #0a0e17 0%, #00040f 100%);
      font-family: 'Roboto', sans-serif;
      color: #d0d8e0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(0, 170, 255, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: row;
      background: rgba(12, 18, 28, 0.92);
      border-radius: 20px;
      border: 1px solid rgba(0, 170, 255, 0.18);
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.75),
        inset 0 0 25px rgba(0,170,255,0.06);
      backdrop-filter: blur(10px);
      overflow: hidden;
      z-index: 2;
    }

    .form-side {
      flex: 1;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-side {
      flex: 1;
      background: rgba(0, 170, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(80, 180, 255, 0.55));
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      text-align: center;
      color: #ffffff;
      letter-spacing: 2.5px;
      text-shadow: 0 0 12px rgba(0, 170, 255, 0.45);
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 15px;
      color: #8899aa;
      margin-bottom: 35px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #c0d0e0;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #0e1622;
      border: 1px solid #1e2f45;
      border-radius: 10px;
      color: #f0f4f8;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #00aaff;
      box-shadow: 0 0 0 4px rgba(0,170,255,0.20);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 20px 0;
      font-size: 14px;
      color: #8899aa;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      margin: 0;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      accent-color: #00aaff;
    }

    .forgot {
      color: #00aaff;
      text-decoration: none;
      font-size: 14px;
    }

    .forgot:hover {
      text-decoration: underline;
      color: #40c0ff;
    }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #0077cc, #00aaff);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 6px 18px rgba(0,170,255,0.35);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,170,255,0.5);
      background: linear-gradient(90deg, #00aaff, #40c0ff);
    }

    .toggle-auth {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: #8899aa;
    }

    .toggle-auth a {
      color: #00aaff;
      text-decoration: none;
      font-weight: 500;
    }

    .toggle-auth a:hover {
      text-decoration: underline;
    }

    /* Переключение между login и signup */
    .signup-form {
      display: none;
    }

    .active .login-form {
      display: none;
    }

    .active .signup-form {
      display: block;
    }

    /* На мобильных устройствах — стопка */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        max-width: 420px;
      }
      .logo-side {
        order: -1; /* логотип сверху на мобильных */
        padding: 40px 20px;
        background: transparent;
      }
      .form-side {
        padding: 30px 25px;
      }
    }
  </style>
</head>
<body>

  <div class="container" id="auth-container">

    <div class="form-side">
      <h1>WELCOME BACK!</h1>
      <p class="subtitle">Upzone — от идеи до первых заработков</p>

      <!-- Форма входа -->
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label>Username или email</label>
          <input type="text" placeholder="example@gmail.com" required>
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" placeholder="••••••••" required>
        </div>

        <div class="checkbox-group">
          <label><input type="checkbox"> Запомнить меня</label>
          <a href="#" class="forgot">Забыли пароль?</a>
        </div>

        <button type="submit">Sign In</button>
      </form>

      <!-- Форма регистрации -->
      <form class="signup-form" id="signupForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" placeholder="yourname" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="example@gmail.com" required>
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" placeholder="••••••••" required>
        </div>

        <button type="submit">Sign Up</button>
      </form>

      <div class="toggle-auth">
        <span id="toggleText">Нет аккаунта? </span>
        <a href="#" id="toggleLink">Sign up</a>
      </div>
    </div>

    <div class="logo-side">
      <img src="logo.jpg" alt="Upzone Logo" class="logo">
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Инициализация
    const supabaseUrl = 'https://dvwegmdyhjyihrxqvoiw.supabase.co';
    const supabaseKey = 'sb_publishable_hDqX9KkG5m38yourV2K43w_PYB7ktXI'; 
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const container = document.getElementById('auth-container');
    const toggleLink = document.getElementById('toggleLink');
    const toggleText = document.getElementById('toggleText');
    const title = document.querySelector('h1');

    // 2. Переключение интерфейса (Вход/Регистрация)
    toggleLink.addEventListener('click', (e) => {
        e.preventDefault();
        container.classList.toggle('active');
        const isActive = container.classList.contains('active');
        toggleText.textContent = isActive ? 'Уже есть аккаунт? ' : 'Нет аккаунта? ';
        toggleLink.textContent = isActive ? 'Sign In' : 'Sign up';
        title.textContent = isActive ? 'CREATE ACCOUNT' : 'WELCOME BACK!';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const usernameValue = e.target.querySelector('input[placeholder="yourname"]').value;
    const emailValue = e.target.querySelector('input[type="email"]').value;
    const passwordValue = e.target.querySelector('input[type="password"]').value;

    // 1. Создаем пользователя в системе Supabase Auth
    const { data, error: authError } = await supabaseClient.auth.signUp({
        email: emailValue,
        password: passwordValue,
        options: {
            data: { username: usernameValue }
        }
    });

    if (authError) {
        return alert('Ошибка регистрации: ' + authError.message);
    }

    if (data.user) {
        // 2. ВАЖНЫЙ ШАГ: Вручную записываем данные в таблицу 'profiles'
        // Именно этот шаг заполнит те самые "квадраты" в базе
        const { error: profileError } = await supabaseClient
            .from('profiles')
            .upsert([ // Используем upsert, чтобы обновить если уже есть, или создать новую строку
                { 
                    id: data.user.id, 
                    username: usernameValue, 
                    email: emailValue 
                }
            ]);

        if (profileError) {
            console.error("Ошибка записи в таблицу profiles:", profileError.message);
            alert("Аккаунт создан, но данные профиля не сохранились. Проверьте RLS!");
        } else {
            alert('Регистрация успешна! Теперь данные появились в Supabase.');
            container.classList.remove('active');
        }
    }
});
      
    // 4. Логика Входа
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = e.target.querySelector('input[type="text"]').value;
        const password = e.target.querySelector('input[type="password"]').value;

        const { data, error } = await supabaseClient.auth.signInWithPassword({ 
            email: email, 
            password: password 
        });

        if (error) {
            alert('Ошибка входа: ' + error.message);
        } else {
            alert('Вы успешно вошли!');
            window.location.href = 'index.html'; 
        }
    });
</script>

</body>
</html>
