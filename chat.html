<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pro Media | Ultimate Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #2c2f33;
            --bg-sidebar: #23272a;
            --bg-input-area: #36393f;
            --accent-blue: #007bff;
            --text-color: #ffffff;
            --msg-in: #4f545c;
            --msg-out: #007bff;
            --border-color: #202225;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }

        #chat-widget-button {
            position: fixed; bottom: 30px; left: 30px;
            width: 70px; height: 70px; background: var(--accent-blue);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); transition: 0.3s;
        }
        #chat-widget-button:hover { transform: scale(1.1); }

        /* FIX 1: Unified .chat-header h2 rule (was duplicated with conflicting styles) */
        .chat-header h2 {
            color: white;
            font-size: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: calc(100% - 160px);
        }

        #chat-window {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-main);
            display: flex;
            z-index: 2000;
            flex-direction: row;
        }

        .sidebar {
            width: 320px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            flex-shrink: 0; /* FIX 2: prevent sidebar from shrinking */
        }
        .sidebar-header { padding: 25px; font-size: 22px; font-weight: bold; color: white; border-bottom: 1px solid var(--border-color); }
        .sidebar-content { flex: 1; overflow-y: auto; padding-top: 10px; }

        .section-title {
            padding: 15px 20px 5px 20px; font-size: 12px; text-transform: uppercase;
            color: #8e9297; font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }
        .item {
            padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #b9bbbe; transition: 0.2s;
        }
        .item:hover { background: #36393f; color: white; }
        .item.active { background: #40444b; color: white; border-left: 4px solid var(--accent-blue); }

        .avatar {
            width: 35px; height: 35px; border-radius: 50%; background: #5865f2;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0;
        }

        /* FIX 3: main-chat must properly fill remaining space and not overflow */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            min-width: 0; /* FIX: prevents flex overflow */
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 30px; background: var(--bg-sidebar);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; /* FIX 4: header must not shrink */
        }

        /* FIX 5: messages-container must scroll properly */
        .messages-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0; /* FIX: critical for flex scroll to work */
        }

        .message { max-width: 65%; padding: 12px 18px; border-radius: 18px; color: white; word-wrap: break-word; line-height: 1.4; }
        .incoming { background: var(--msg-in); align-self: flex-start; border-bottom-left-radius: 4px; }
        .my-message { background: var(--msg-out); align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-media { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; cursor: pointer; }

        .input-panel {
            padding: 25px 30px; background: var(--bg-sidebar);
            display: flex; gap: 15px; align-items: center;
            flex-shrink: 0; /* FIX 6: input panel must not shrink */
            position: relative; /* FIX 7: for emoji picker positioning */
        }
        #msgInput {
            flex: 1; padding: 14px 25px; border-radius: 30px; border: none;
            background: var(--bg-input-area); color: white; outline: none; font-size: 16px;
        }
        .btn-icon { background: #4f545c; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: none; flex-shrink: 0; }
        .btn-icon:hover { transform: scale(1.1); background: #72767d; }
        .btn-send { background: var(--accent-blue); color: white; border-radius: 30px; padding: 12px 25px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; flex-shrink: 0; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .search-box { padding: 10px 20px; }
        .search-box input {
            width: 100%; padding: 8px 15px; border-radius: 5px; border: none;
            background: var(--bg-input-area); color: white; outline: none; font-size: 14px;
        }

        .ai-panel {
            padding: 15px 20px; border-top: 1px solid var(--border-color);
        }
        .ai-panel label { display: flex; align-items: center; gap: 10px; cursor: pointer; color: #b9bbbe; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .ai-panel p { font-size: 10px; color: #72767d; margin-top: 4px; }

        .toast {
            position: fixed; bottom: 110px; left: 30px;
            background: #43b581; color: white; padding: 10px 20px;
            border-radius: 10px; font-size: 14px; z-index: 9999;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; /* FIX 8: toast should not block clicks */
        }
        .toast.show { opacity: 1; }

        .order-btn {
            background: linear-gradient(135deg, #eab308, #f59e0b);
            color: black; border: none; border-radius: 20px;
            padding: 8px 18px; cursor: pointer; font-size: 13px;
            font-weight: bold; margin-right: 10px;
            box-shadow: 0 2px 10px rgba(234,179,8,0.4);
            transition: 0.2s;
        }
        .order-btn:hover { transform: scale(1.05); }

        /* Room item hover actions */
        .room-item { position: relative; }
        .room-item .room-actions {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: none; gap: 4px; align-items: center;
        }
        .room-item:hover .room-actions { display: flex; }
        .room-action-btn {
            background: #40444b; border: none; border-radius: 6px;
            color: #b9bbbe; cursor: pointer; font-size: 13px;
            padding: 3px 7px; transition: 0.15s; line-height: 1;
        }
        .room-action-btn:hover { background: #f04747; color: white; }
        .room-action-btn.leave:hover { background: #f0a500; color: white; }

        /* Room context modal */
        .room-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .room-modal {
            background: #2c2f33; border-radius: 16px; width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #40444b;
            overflow: hidden; animation: slideUp 0.2s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
        .room-modal-header {
            padding: 20px 24px; background: #23272a;
            border-bottom: 1px solid #40444b;
            display: flex; justify-content: space-between; align-items: center;
        }
        .room-modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
        .room-modal-btn {
            width: 100%; padding: 13px 18px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .room-modal-btn:hover { filter: brightness(1.1); transform: translateX(3px); }

        /* FIX 9: members panel layout fix — must be sibling of messages, not child */
        #membersPanel {
            width: 0;
            overflow: hidden;
            background: #23272a;
            border-left: 1px solid #202225;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }

        /* FIX 10: chat-body wrapper to hold messages + members panel side by side */
        .chat-body {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
            overflow: hidden;
        }

        /* FIX 11: emoji picker anchored to input panel */
        #emojiPicker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 80px;
            z-index: 9999;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/css/emoji-mart.css">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="chat-window">
    <div class="sidebar">
        <div class="sidebar-header">Pro Media</div>
        <div class="sidebar-content">
            <div class="search-box" style="position:relative;">
                <div style="display:flex; gap:6px; align-items:center;">
                    <input type="text" id="userSearch" placeholder="Поиск по @username..." class="search-input" style="flex:1;">
                    <button id="dirFilterBtn" onclick="toggleDirectionFilter()" title="Фильтр по направлению"
                        style="background:#40444b; border:none; border-radius:8px; color:#b9bbbe;
                               width:34px; height:34px; cursor:pointer; font-size:16px; flex-shrink:0;
                               display:flex; align-items:center; justify-content:center; transition:0.2s;"
                        onmouseover="this.style.background='#5865f2';this.style.color='white'"
                        onmouseout="if(!window._dirFilterOpen){this.style.background='#40444b';this.style.color='#b9bbbe';}">
                        ⌄
                    </button>
                </div>
                <div id="dirFilterDropdown" style="display:none; position:absolute; top:42px; left:0; right:0;
                     background:#2c2f33; border:1px solid #40444b; border-radius:10px; z-index:999;
                     box-shadow:0 8px 24px rgba(0,0,0,0.4); overflow:hidden;">
                    <div id="dirFilterList" style="padding:6px;"></div>
                </div>
            </div>
            <div class="section-title">
                Группы
                <button onclick="createNewRoom()" style="background:none; border:none; color:#43b581; cursor:pointer; font-size:20px; line-height:1;">+</button>
            </div>
            <div id="roomList"></div>
            <div class="section-title" style="margin-top:20px;">Люди</div>
            <div id="userList"></div>
            <div style="padding:10px 20px 15px;">
                <button id="aiToggleBtn" onclick="toggleAIAutoReply()"
                    style="width:100%; background:#4f545c; color:white; border:none; border-radius:10px;
                           padding:10px; cursor:pointer; font-weight:bold; font-size:13px; transition:0.2s;">
                    🤖 ИИ: ВЫКЛ
                </button>
                <p style="color:#72767d; font-size:10px; margin-top:5px; text-align:center;">Авто-ответ на входящие</p>
            </div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <h2 id="currentChatTitle">Выберите чат</h2>
            <div style="display:flex; align-items:center; gap:10px;">
                <button id="membersMenuBtn" onclick="toggleMembersPanel()"
                    style="background:none; border:none; color:#8e9297; font-size:22px; cursor:pointer; line-height:1; display:none; padding:4px 8px; border-radius:6px; transition:0.2s;"
                    onmouseover="this.style.color='white'" onmouseout="this.style.color='#8e9297'">
                    ☰
                </button>
                <button onclick="toggleChat()" style="background:none; border:none; color:white; font-size:35px; cursor:pointer; line-height:1;">&times;</button>
            </div>
        </div>

        <!-- FIX 12: chat-body wraps messages + members panel correctly -->
        <div class="chat-body">
            <div class="messages-container" id="chatBox"></div>

            <!-- FIX 13: membersPanel is now a sibling of chatBox inside chat-body -->
            <div id="membersPanel">
                <div style="padding:20px; border-bottom:1px solid #40444b; display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="color:white; font-size:16px; white-space:nowrap;">👥 Участники</h3>
                    <button onclick="closeMembersPanel()" style="background:none;border:none;color:#72767d;font-size:22px;cursor:pointer;">×</button>
                </div>
                <div style="padding:12px 16px; border-bottom:1px solid #40444b;">
                    <input type="text" id="memberSearchInput" placeholder="🔍 Поиск..."
                        oninput="filterMembersPanel(this.value)"
                        style="width:100%; padding:8px 12px; border-radius:8px; border:none;
                               background:#36393f; color:white; outline:none; font-size:13px;">
                </div>
                <div id="membersPanelList" style="flex:1; overflow-y:auto; padding:10px 0;"></div>
                <div style="padding:15px 16px; border-top:1px solid #40444b;">
                    <button onclick="openAddMemberFromPanel()"
                        style="width:100%; background:#5865f2; color:white; border:none;
                               border-radius:10px; padding:10px; cursor:pointer; font-weight:bold; font-size:14px;">
                        + Добавить участника
                    </button>
                </div>
            </div>
        </div>

        <div class="input-panel" id="inputArea" style="visibility: hidden;">
            <label for="fileInput" class="btn-icon" title="Прикрепить файл">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
            </label>
<input type="file" id="fileInput" style="display:none" 
    accept="image/*,video/*,application/pdf" onchange="uploadFile(this)">
            <button class="btn-icon" id="emojiBtn" onclick="toggleEmojiPicker()" style="font-size:20px;">😊</button>
            <!-- FIX 14: emoji picker is now inside input-panel (which has position:relative) -->
            <div id="emojiPicker"></div>

            <input type="text" id="msgInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button class="btn-send" id="sendBtn" onclick="handleSend()">Отправить</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://dvwegmdyhjyihrxqvoiw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2d2VnbWR5aGp5aWhyeHF2b2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0MDYwOTAsImV4cCI6MjA4Mzk4MjA5MH0.HrG5GijHH4Lj7mO3SorbG0kKfnl5FLtSCWp6aONYxJ8';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const GLOBAL_SERVER_ID = "7838b2eb-ece1-47d8-a3af-83b47fd2ff8a";
    const COOLDOWN_MS = 30000;

    let myId = null;
    let myProfileData = null;
    let currentRoomId = null;
    let currentRecipientId = null;
    let lastMessageTime = 0;

    // FIX 15: toast helper — clear previous timeout to avoid flicker
    let toastTimer = null;
    function showToast(msg, color = '#43b581') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = color;
        t.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function updateAIButton() {
    const old = document.getElementById('askAIBtn');
    if (old) old.remove();
    const oldOrder = document.getElementById('orderBtn');
    if (oldOrder) oldOrder.remove();
    const oldConfirm = document.getElementById('confirmOrderHeaderBtn');
    if (oldConfirm) oldConfirm.remove();

    const menuBtn = document.getElementById('membersMenuBtn');
    if (menuBtn) {
        menuBtn.style.display = (currentRoomId && !currentRecipientId) ? 'inline-block' : 'none';
    }

    closeMembersPanel();

    if (!currentRecipientId) return;

    const header = document.querySelector('.chat-header');

    // ✅ Кнопка ИИ-ассистента
    if (currentRecipientId !== myId) {
        const aiBtn = document.createElement('button');
        aiBtn.id = 'askAIBtn';
        aiBtn.style.cssText = `
            background: linear-gradient(135deg, #5865f2, #7289da);
            color: white; border: none; border-radius: 20px;
            padding: 8px 18px; cursor: pointer; font-size: 13px;
            font-weight: bold; margin-right: 10px;
            box-shadow: 0 2px 10px rgba(88,101,242,0.4);
            transition: 0.2s;
        `;
        aiBtn.textContent = '🤖 ИИ-ассистент';
        aiBtn.onmouseover = () => aiBtn.style.transform = 'scale(1.05)';
        aiBtn.onmouseout = () => aiBtn.style.transform = 'scale(1)';
        aiBtn.onclick = () => openAIModal();
        header.insertBefore(aiBtn, header.lastElementChild);
    }

    // ✅ Кнопка Заказать
    if (currentRecipientId !== myId) {
        const orderBtn = document.createElement('button');
        orderBtn.id = 'orderBtn';
        orderBtn.className = 'order-btn';
        orderBtn.textContent = '⭐ Заказать';
        orderBtn.onclick = () => openOrderModal();
        header.insertBefore(orderBtn, header.lastElementChild);

        // ✅ Кнопка подтверждения заказа (галочка)
        const confirmBtn = document.createElement('button');
        confirmBtn.id = 'confirmOrderHeaderBtn';
        confirmBtn.title = 'Подтвердить выполнение заказа';
        confirmBtn.style.cssText = `
            background: linear-gradient(135deg, #43b581, #2d8a5e);
            color: white; border: none; border-radius: 50%;
            width: 38px; height: 38px; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 6px; box-shadow: 0 2px 10px rgba(67,181,129,0.4);
            transition: 0.2s; flex-shrink: 0;
        `;
        confirmBtn.innerHTML = '✓';
        confirmBtn.onmouseover = () => confirmBtn.style.transform = 'scale(1.1)';
        confirmBtn.onmouseout = () => confirmBtn.style.transform = 'scale(1)';
        confirmBtn.onclick = () => openConfirmOrderModal();
        header.insertBefore(confirmBtn, header.lastElementChild);
    }
}

    function openAIModal() {
        const oldModal = document.getElementById('aiModal');
        if (oldModal) oldModal.remove();

        const modal = document.createElement('div');
        modal.id = 'aiModal';
        modal.style.cssText = `
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        `;

        modal.innerHTML = `
            <div style="background:#2c2f33; border-radius:16px; width:480px; max-height:70vh;
                        display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.5);
                        border:1px solid #40444b; overflow:hidden;">
                <div style="padding:20px 25px; background:#23272a; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #40444b;">
                    <div>
                        <div style="color:white; font-size:18px; font-weight:bold;">🤖 ИИ-Ассистент</div>
                        <div style="color:#72767d; font-size:12px; margin-top:2px;">Спрашивайте об услугах продавца</div>
                    </div>
                    <button onclick="document.getElementById('aiModal').remove()"
                        style="background:none;border:none;color:#72767d;font-size:24px;cursor:pointer;">×</button>
                </div>
                <div id="aiChatBox" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; min-height:250px;">
                    <div style="text-align:center; color:#72767d; font-size:13px; padding:20px;">
                        Задайте вопрос об услугах, ценах или портфолио продавца
                    </div>
                </div>
                <div style="padding:15px 20px; background:#23272a; border-top:1px solid #40444b; display:flex; gap:10px;">
                    <input type="text" id="aiModalInput" placeholder="Ваш вопрос..."
                        style="flex:1; padding:12px 18px; border-radius:25px; border:none;
                               background:#36393f; color:white; outline:none; font-size:14px;">
                    <button onclick="sendAIQuestion()"
                        style="background:#007bff; color:white; border:none; border-radius:25px;
                               padding:12px 20px; cursor:pointer; font-weight:bold; white-space:nowrap;">
                        Спросить
                    </button>
                </div>
            </div>
        `;

        document.body.appendChild(modal);

        document.getElementById('aiModalInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendAIQuestion();
        });

        modal.addEventListener('click', e => {
            if (e.target === modal) modal.remove();
        });

        loadSellerInfo();
    }

    let sellerInfoCache = null;

    async function loadSellerInfo() {
        if (!currentRecipientId) return;

        const { data } = await _supabase
            .from('seller_info')
            .select('*')
            .eq('user_id', currentRecipientId)
            .maybeSingle();

        sellerInfoCache = data;

        if (data) {
            addAIMessage(`Привет! Я знаю об этом продавце следующее:\n📦 Услуги: ${data.services || 'не указано'}\n💰 Цены: ${data.prices || 'не указано'}\n⏱ Время ответа: ${data.response_time || '1-2 часа'}\n\nЗадайте любой вопрос!`, false);
        } else {
            addAIMessage('Привет! Продавец ещё не заполнил информацию о себе. Но я могу ответить на общие вопросы!', false);
        }
    }

    function addAIMessage(text, isUser = false) {
        const box = document.getElementById('aiChatBox');
        if (!box) return;

        const placeholder = box.querySelector('div[style*="text-align:center"]');
        if (placeholder) placeholder.remove();

        const msg = document.createElement('div');
        msg.style.cssText = `
            max-width: 85%; padding: 10px 15px; border-radius: 15px;
            color: white; font-size: 14px; line-height: 1.5; white-space: pre-wrap;
            align-self: ${isUser ? 'flex-end' : 'flex-start'};
            background: ${isUser ? '#007bff' : '#40444b'};
            ${isUser ? 'border-bottom-right-radius:4px' : 'border-bottom-left-radius:4px'};
        `;
        msg.textContent = text;
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
    }

    async function sendAIQuestion() {
        const input = document.getElementById('aiModalInput');
        if (!input) return;
        const question = input.value.trim();
        if (!question) return;

        input.value = '';
        addAIMessage(question, true);

        const typing = document.createElement('div');
        typing.id = 'aiTyping';
        typing.style.cssText = 'color:#72767d; font-size:13px; padding:5px 10px; align-self:flex-start;';
        typing.textContent = '🤖 печатает...';
        document.getElementById('aiChatBox')?.appendChild(typing);

        const sellerContext = sellerInfoCache
            ? `Информация о продавце:\nУслуги: ${sellerInfoCache.services || 'не указано'}\nЦены: ${sellerInfoCache.prices || 'не указано'}\nПортфолио: ${sellerInfoCache.portfolio || 'не указано'}\nВремя ответа: ${sellerInfoCache.response_time || '1-2 часа'}`
            : 'Информация о продавце не заполнена.';

        const { data, error } = await _supabase.functions.invoke('ai-reply', {
            body: {
                message: question,
                sellerId: currentRecipientId,
                context: sellerContext
            }
        });

        document.getElementById('aiTyping')?.remove();

        if (error || !data?.reply) {
            addAIMessage('Извините, не могу ответить сейчас. Попробуйте позже.', false);
            return;
        }

        addAIMessage(data.reply, false);

        const orderKeywords = ['заказать', 'хочу', 'купить', 'оформить', 'нужно', 'закажу', 'интересует'];
        const isOrder = orderKeywords.some(word => question.toLowerCase().includes(word));

        if (isOrder) {
            const orderMsg = `🤖 ИИ-ассистент:\nКлиент заинтересован в заказе!\n\nЗапрос клиента: "${question}"\nОтвет ИИ: "${data.reply}"`;
            await _supabase.from('messages').insert([{
                content: orderMsg,
                user_id: myId,
                sender_name: '🤖 Новый заказ от клиента',
                recipient_id: currentRecipientId,
                room_id: null
            }]);
            addAIMessage('✅ Ваш запрос отправлен продавцу! Он скоро свяжется с вами.', false);
        }
    }

    // ─── URL параметры (маркетплейс) ──────────────────────────────
    async function handleMarketRedirect() {
        const params = new URLSearchParams(window.location.search);
        const sellerId = params.get('user_id');
        const sellerName = params.get('name');

        if (!sellerId || !sellerName) return;

        let attempts = 0;
        while (!myId && attempts < 20) {
            await new Promise(r => setTimeout(r, 200));
            attempts++;
        }
        if (!myId) return;

        currentRecipientId = sellerId;
        currentRoomId = null;

        document.querySelectorAll('#userList .item').forEach(item => {
            if (item.onclick?.toString().includes(sellerId)) {
                setActiveItem(item);
            }
        });

        openChat(decodeURIComponent(sellerName));

        const { data } = await _supabase
            .from('messages')
            .select('id')
            .or(`and(user_id.eq.${myId},recipient_id.eq.${sellerId}),and(user_id.eq.${sellerId},recipient_id.eq.${myId})`)
            .limit(1);

        if (!data?.length) {
            const { data: sellerInfo } = await _supabase
                .from('seller_info')
                .select('*')
                .eq('user_id', sellerId)
                .maybeSingle();

            const context = sellerInfo
                ? `Услуги: ${sellerInfo.services || 'не указано'}\nЦены: ${sellerInfo.prices || 'не указано'}\nПортфолио: ${sellerInfo.portfolio || 'не указано'}\nВремя ответа: ${sellerInfo.response_time || '1-2 часа'}`
                : 'Информация не заполнена.';

            const { data: aiData } = await _supabase.functions.invoke('ai-reply', {
                body: {
                    message: 'Поприветствуй нового клиента очень коротко и предложи помощь',
                    sellerId: sellerId,
                    context: context
                }
            });

            if (aiData?.reply) {
                await _supabase.from('messages').insert([{
                    content: aiData.reply,
                    user_id: sellerId,
                    sender_name: `🤖 ИИ-ассистент @${decodeURIComponent(sellerName)}`,
                    recipient_id: myId,
                    is_ai_reply: true
                }]);
            }
        }
    }

    // ─── Комнаты ──────────────────────────────────────────────────
    async function loadRooms() {
        // Получаем только комнаты где я участник
        const { data: myMemberships } = await _supabase
            .from('room_members')
            .select('room_id')
            .eq('user_id', myId);
        const myRoomIds = new Set((myMemberships || []).map(m => m.room_id));

        // Получаем комнаты которые я создал
        const { data: createdRooms } = await _supabase
            .from('rooms')
            .select('id, created_by')
            .eq('created_by', myId);
        const myCreatedIds = new Set((createdRooms || []).map(r => r.id));

        // Собираем все ID комнат доступных мне (участник или создатель или глобальный)
        const visibleIds = new Set([...myRoomIds, ...myCreatedIds, GLOBAL_SERVER_ID]);

        // Загружаем только свои комнаты + глобальный
        const idsArray = [...visibleIds];
        const { data: rooms } = await _supabase
            .from('rooms')
            .select('*')
            .in('id', idsArray)
            .order('name');

        const list = document.getElementById('roomList');
        list.innerHTML = '';

        rooms?.forEach(room => {
            const isGlobal = room.id === GLOBAL_SERVER_ID;
            const isMember = myRoomIds.has(room.id);
            const isCreator = myCreatedIds.has(room.id);

            const div = document.createElement('div');
            div.className = 'item room-item' + (currentRoomId === room.id && !currentRecipientId ? ' active' : '');

            // Кнопки действий — не показываем для глобального чата
            const actionsHtml = isGlobal ? '' : `
                <div class="room-actions">
                    ${isMember ? `<button class="room-action-btn leave" title="Выйти из группы"
                        onclick="event.stopPropagation(); leaveRoom('${room.id}', '${escapeAttr(room.name)}')">
                        ↩ Выйти
                    </button>` : ''}
                    ${isCreator ? `<button class="room-action-btn" title="Удалить группу"
                        onclick="event.stopPropagation(); deleteRoom('${room.id}', '${escapeAttr(room.name)}')">
                        🗑
                    </button>` : ''}
                    ${!isMember && !isCreator ? `<button class="room-action-btn leave" title="Вступить в группу"
                        onclick="event.stopPropagation(); joinRoom('${room.id}', '${escapeAttr(room.name)}', this.closest('.room-item'))">
                        + Войти
                    </button>` : ''}
                </div>
            `;

            div.innerHTML = `
                <div class="avatar" style="background:#43b581">#</div>
                <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${room.name}</span>
                ${actionsHtml}
            `;

            div.onclick = () => {
                currentRoomId = room.id;
                currentRecipientId = null;
                setActiveItem(div);
                openChat(room.name);
            };

            list.appendChild(div);
        });
    }

    // Используем классы, которые точно есть в вашем CSS

    messageDiv.innerHTML = `
        <div class="message-text">${text}</div>

}
    // Экранирование для inline onclick атрибутов
    function escapeAttr(str) {
        return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    async function createNewRoom() {
        const name = prompt("Введите название новой группы:");
        if (!name?.trim()) return;
        const { data: newRoom, error } = await _supabase
            .from('rooms')
            .insert([{ name: name.trim(), created_by: myId }])
            .select()
            .single();
        if (error) { showToast("Ошибка: " + error.message, '#f04747'); return; }
        // Создатель автоматически получает роль owner
        await _supabase.from('room_members').insert([{ room_id: newRoom.id, user_id: myId, role: 'owner', added_by: myId }]);
        showToast("Группа создана!");
        await loadRooms();
    }

                    </div>
                    <button onclick="document.getElementById('roomActionModal').remove()"
                        style="background:none;border:none;color:#72767d;font-size:24px;cursor:pointer;line-height:1;">×</button>
                </div>

                    <div style="background:#40444b; border-radius:10px; padding:14px; color:#dcddde; font-size:13px; line-height:1.6;">

    async function confirmDeleteRoom(roomId) {
        document.getElementById('roomActionModal')?.remove();

        // Удаляем сообщения, участников и саму комнату
        await _supabase.from('messages').delete().eq('room_id', roomId);
        await _supabase.from('room_members').delete().eq('room_id', roomId);
        const { error } = await _supabase.from('rooms').delete().eq('id', roomId);

        if (error) { showToast('Ошибка удаления группы!', '#f04747'); return; }

        showToast('Группа удалена', '#f04747');

        // Если были в этой группе — возвращаемся в общий чат
        if (currentRoomId === roomId) {
            currentRoomId = GLOBAL_SERVER_ID;
            currentRecipientId = null;
            openChat('Общий чат 🌍');
        }
        await loadRooms();
    }

    async function confirmLeaveRoom(roomId, roomName) {
        document.getElementById('roomActionModal')?.remove();

        const { error } = await _supabase
            .from('room_members')
            .delete()
            .eq('room_id', roomId)
            .eq('user_id', myId);

        if (error) { showToast('Ошибка при выходе!', '#f04747'); return; }

        await _supabase.from('messages').insert([{
            content: `👋 @${myProfileData?.username || 'Пользователь'} покинул группу`,
            user_id: myId, sender_name: 'Система', room_id: roomId, recipient_id: null
        }]);

        showToast(`Вы вышли из "${roomName}"`, '#f0a500');

        if (currentRoomId === roomId) {
            currentRoomId = GLOBAL_SERVER_ID;
            currentRecipientId = null;
            openChat('Общий чат 🌍');
        }
        await loadRooms();
    }

    async function loadUsers() {
        if (!myId) return;
        const rawSearch = document.getElementById('userSearch').value.trim();
        // Strip leading @ so user can type either "@name" or "name"
        const searchText = rawSearch.startsWith('@') ? rawSearch.slice(1) : rawSearch;

        let query = _supabase.from('profiles').select('*').neq('id', myId);

        if (searchText) {
            query = query.or(
                `username.ilike.%${searchText}%,full_name.ilike.%${searchText}%,direction.ilike.%${searchText}%`
            );
        }

        // Apply direction filter if active
        if (window._activeDirection) {
            query = query.eq('direction', window._activeDirection);
        }

        const { data } = await query;

        const { data: unreadData } = await _supabase
            .from('messages')
            .select('user_id')
            .eq('recipient_id', myId)
            .eq('is_read', false)
            .is('room_id', null);

        const unreadCounts = {};
        unreadData?.forEach(msg => {
            unreadCounts[msg.user_id] = (unreadCounts[msg.user_id] || 0) + 1;
        });

        const list = document.getElementById('userList');
        list.innerHTML = '';

        data?.forEach(user => {
            const div = document.createElement('div');
            div.className = 'item' + (currentRecipientId === user.id ? ' active' : '');

            const name = user.username ? `@${user.username}` : 'Аноним';
            const directionLine = user.direction ? `<div style="font-size:12px;color:#43b581;">${user.direction}</div>` : '';
            const letter = (user.username?.[0] || '?').toUpperCase();
            const avatarStyle = user.avatar_url ? `background-image:url(${user.avatar_url}); background-size:cover;` : `background:#5865f2;`;

            const unread = unreadCounts[user.id] || 0;
            const badge = unread > 0 ? `<div style="background:#f04747; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold; margin-left:auto;">${unread}</div>` : '';

            div.innerHTML = `
                <div class="avatar" style="${avatarStyle}">${!user.avatar_url ? letter : ''}</div>
                <div style="display:flex; flex-direction:column; gap:2px; flex:1; min-width:0;">
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>
                    ${directionLine}
                </div>
                ${badge}
            `;

            div.onclick = () => {
                currentRecipientId = user.id;
                currentRoomId = null;
                setActiveItem(div);
                openChat(name);
                markAsRead(user.id);
            };

            div.ondblclick = () => openUserProfile(user);
            list.appendChild(div);
        });
    }

            { value: 'marketing', label: '📈 Marketing & SMM' },
            { value: 'fintech',   label: '💰 FinTech' },
            { value: 'edtech',    label: '🎓 EdTech' },
            { value: 'proptech',  label: '🏗 PropTech' },
            { value: 'greentech', label: '🌱 GreenTech' },

            { value: 'saas',      label: '🤝 B2B SaaS' },
            { value: 'other',     label: 'Другое' },
        ];

        const list = document.getElementById('dirFilterList');
        list.innerHTML = '';

        // Кнопка "Все"
        const allBtn = document.createElement('div');
        allBtn.style.cssText = `padding:8px 12px; cursor:pointer; border-radius:7px; font-size:13px;
            color:${!window._activeDirection ? 'white' : '#b9bbbe'};
            background:${!window._activeDirection ? '#5865f2' : 'transparent'};
            font-weight:${!window._activeDirection ? 'bold' : 'normal'}; transition:0.15s;`;
        allBtn.textContent = '👥 Все';
        allBtn.onmouseover = () => { if(window._activeDirection) allBtn.style.background = '#40444b'; };
        allBtn.onmouseout = () => { if(window._activeDirection) allBtn.style.background = 'transparent'; };

            window._activeDirection = null;

            loadUsers();
        };
        list.appendChild(allBtn);

        directions.forEach(dir => {
            const item = document.createElement('div');
            const isActive = window._activeDirection === dir.value;
            item.style.cssText = `padding:8px 12px; cursor:pointer; border-radius:7px; font-size:13px;
                color:${isActive ? 'white' : '#b9bbbe'};
                background:${isActive ? '#5865f2' : 'transparent'};
                font-weight:${isActive ? 'bold' : 'normal'}; transition:0.15s;`;
            item.textContent = dir.label;
            item.onmouseover = () => { if(!isActive) item.style.background = '#40444b'; item.style.color = 'white'; };
            item.onmouseout = () => { if(!isActive) item.style.background = 'transparent'; item.style.color = '#b9bbbe'; };
            item.onclick = () => {
                window._activeDirection = dir.value;
                closeDirectionFilter();
                loadUsers();
            };
            list.appendChild(item);
        });
    }

    // ─── Загрузка сообщений ───────────────────────────────────────
    async function loadMessages() {
        const box = document.getElementById('chatBox');
        box.innerHTML = '<div style="color:#72767d;text-align:center;padding:20px;">Загрузка...</div>';

        let query = _supabase.from('messages').select('*');

        if (currentRoomId) {
            query = query.eq('room_id', currentRoomId).is('recipient_id', null);
        } else if (currentRecipientId) {
            query = query.or(
                `and(user_id.eq.${myId},recipient_id.eq.${currentRecipientId}),` +
                `and(user_id.eq.${currentRecipientId},recipient_id.eq.${myId})`
            ).is('room_id', null);
        } else {
            box.innerHTML = '';
            return;
        }

        const { data, error } = await query.order('created_at', { ascending: true });

        if (error) {
            console.error('Ошибка загрузки сообщений:', error);
            box.innerHTML = '<div style="color:#f04747;text-align:center;padding:20px;">Ошибка загрузки</div>';
            return;
        }

        box.innerHTML = '';
        if (!data?.length) {
            box.innerHTML = '<div style="color:#72767d;text-align:center;padding:20px;">Сообщений пока нет</div>';
            return;
        }
        data.forEach(msg => renderMessage(msg));
        box.scrollTop = box.scrollHeight;
    }

    // ─── Отрисовка сообщения ──────────────────────────────────────
    function renderMessage(msg) {
        const box = document.getElementById('chatBox');
        const isMine = msg.user_id === myId;

        // FIX 17: remove placeholder "нет сообщений" when first message arrives
        const emptyPlaceholder = box.querySelector('div[style*="Сообщений пока нет"]');
        if (emptyPlaceholder) emptyPlaceholder.remove();

        const wrapper = document.createElement('div');
        wrapper.style.cssText = `display:flex; flex-direction:column; align-items:${isMine ? 'flex-end' : 'flex-start'}; gap:2px;`;
        wrapper.dataset.msgId = msg.id;

        if (!isMine && currentRoomId) {
            const nameTag = document.createElement('div');
            nameTag.style.cssText = 'font-size:11px;color:#43b581;padding:0 5px;';
            nameTag.textContent = msg.sender_name || 'Пользователь';
            wrapper.appendChild(nameTag);
        }

        const div = document.createElement('div');
        div.className = 'message ' + (isMine ? 'my-message' : 'incoming');

        if (msg.content.startsWith('[image]:')) {
            const img = document.createElement('img');

// ✅ ДОБАВЬТЕ ЭТОТ БЛОК:
} else if (msg.content.startsWith('[file:')) {

        } else {

    // FIX 19: XSS protection helper
    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // ─── Отправка ─────────────────────────────────────────────────
    async function handleSend() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !myId) return;

        // FIX 20: disable send button during send to prevent duplicate messages
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        const now = Date.now();
        if (currentRoomId === GLOBAL_SERVER_ID) {
            const passed = now - lastMessageTime;
            if (passed < COOLDOWN_MS) {
                showToast(`Подождите ${Math.ceil((COOLDOWN_MS - passed) / 1000)} сек.`, '#f04747');
                sendBtn.disabled = false;
                return;
            }
        }

        input.value = '';

        const payload = {
            content: text,
            user_id: myId,
            sender_name: myProfileData?.username || myProfileData?.full_name || "Аноним",
            room_id: currentRoomId || null,
            recipient_id: currentRecipientId || null
        };

        const { data: newMsg, error } = await _supabase.from('messages').insert([payload]).select().single();
        if (error) {
            console.error('Ошибка отправки:', error);
            showToast('Ошибка отправки!', '#f04747');
            input.value = text;
        } else {
            renderMessage(newMsg); // ← сразу показываем своё сообщение
            if (currentRoomId === GLOBAL_SERVER_ID) {
                lastMessageTime = Date.now();
                startVisualCooldown(30);
                return; // cooldown handles re-enabling
            }
        }

        sendBtn.disabled = false;
    }

    // ─── Загрузка файла ───────────────────────────────────────────
    async function uploadFile(input) {
    const file = input.files[0];
    if (!file || !myId) return;

    const isImage = file.type.startsWith('image/');
    const isVideo = file.type.startsWith('video/');
    const isPDF = file.type === 'application/pdf';

    if (!isImage && !isVideo && !isPDF) {
        showToast('Поддерживаются: картинки, видео и PDF!', '#f04747');
        return;
    }

    // ✅ Индикатор с прогресс-баром
    const box = document.getElementById('chatBox');
    const loadingDiv = document.createElement('div');
    loadingDiv.id = 'uploadingIndicator';
    loadingDiv.style.cssText = 'display:flex; justify-content:flex-end; padding:5px 0;';
    loadingDiv.innerHTML = `
        <div style="background:#40444b; border-radius:18px; padding:12px 18px;
                    color:#b9bbbe; font-size:13px; min-width:220px; max-width:65%;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <span style="font-size:22px;">📎</span>
                <div style="flex:1; min-width:0;">
                    <div style="color:white;font-weight:bold;font-size:13px;
                                overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                        ${file.name}
                    </div>
                    <div id="uploadPercent" style="font-size:11px;color:#7289da;margin-top:2px;">0%</div>
                </div>
            </div>
            <!-- Прогресс бар -->
            <div style="background:#2c2f33; border-radius:10px; height:6px; overflow:hidden;">
                <div id="uploadBar" style="height:100%; width:0%; background:linear-gradient(90deg,#5865f2,#7289da);
                     border-radius:10px; transition:width 0.2s ease;"></div>
            </div>
        </div>
    `;

    if (!document.getElementById('spinStyle')) {
        const style = document.createElement('style');
        style.id = 'spinStyle';
        style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
        document.head.appendChild(style);
    }

    box.appendChild(loadingDiv);
    box.scrollTop = box.scrollHeight;

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    const ext = file.name.split('.').pop();
    const filePath = `${myId}/${Date.now()}.${ext}`;
    const uploadUrl = `${SUPABASE_URL}/storage/v1/object/chat-media/${filePath}`;

    // ✅ XHR для отслеживания прогресса
    const publicUrl = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', uploadUrl);
        xhr.setRequestHeader('Authorization', `Bearer ${SUPABASE_KEY}`);
        xhr.setRequestHeader('x-upsert', 'false');
        xhr.setRequestHeader('Content-Type', file.type);

        xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) {
                const pct = Math.round((e.loaded / e.total) * 100);
                const bar = document.getElementById('uploadBar');
                const label = document.getElementById('uploadPercent');
                if (bar) bar.style.width = pct + '%';
                if (label) label.textContent = pct + '%';
            }
        });

        xhr.addEventListener('load', () => {
            if (xhr.status === 200 || xhr.status === 201) {
                const url = `${SUPABASE_URL}/storage/v1/object/public/chat-media/${filePath}`;
                resolve(url);
            } else {
                reject(new Error('Upload failed: ' + xhr.status));
            }
        });

        xhr.addEventListener('error', () => reject(new Error('Network error')));
        xhr.send(file);
    }).catch(err => {
        console.error(err);
        loadingDiv.remove();
        sendBtn.disabled = false;
        showToast('Ошибка загрузки файла', '#f04747');
        return null;
    });

    loadingDiv.remove();
    sendBtn.disabled = false;

    if (!publicUrl) { input.value = ''; return; }

    const prefix = isImage ? '[image]:' : isVideo ? '[video]:' : `[file:${file.name}]:`;

    const { data: newMsg, error } = await _supabase.from('messages').insert([{
    content: prefix + publicUrl,
    user_id: myId,
    sender_name: myProfileData?.username || "Аноним",
    room_id: currentRoomId || null,
    recipient_id: currentRecipientId || null
}]).select().single();  // ← обязательно .select().single()

if (error) {
    showToast('Ошибка отправки медиа', '#f04747');
} else {
    renderMessage(newMsg);  // ← ручной рендер сразу
}
input.value = '';
}
    // ─── Cooldown ─────────────────────────────────────────────────
    function startVisualCooldown(seconds) {
        const btn = document.getElementById('sendBtn');
        let left = seconds;
        btn.disabled = true;
        const itv = setInterval(() => {
            btn.textContent = `${left}s`;
            left--;
            if (left < 0) {
                clearInterval(itv);
                btn.textContent = "Отправить";
                btn.disabled = false;
            }
        }, 1000);
    }

    // ─── Realtime ─────────────────────────────────────────────────
    _supabase.channel('db_changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            const m = payload.new;

            const isCurrentRoom = currentRoomId && m.room_id === currentRoomId;
            const isCurrentDM =
                !currentRoomId && currentRecipientId &&
                !m.room_id &&
                ((m.user_id === currentRecipientId && m.recipient_id === myId) ||
                 (m.user_id === myId && m.recipient_id === currentRecipientId));

            // FIX 21: prevent duplicate messages — realtime fires for own messages too
            // Only render if the message was NOT sent by me (mine already rendered optimistically)
            // OR if it was sent by the other person
            if ((isCurrentRoom || isCurrentDM) && m.user_id !== myId) {
                renderMessage(m);
            }

            if (m.recipient_id === myId) {
                loadUsers();
            }

            if (m.recipient_id === myId && m.user_id !== myId && !m.is_ai_reply && !m.room_id) {
                processAIResponse(m);
            }
        })
        .subscribe();

    // FIX 22: Also handle DELETE events to keep UI in sync
    _supabase.channel('db_deletes')
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, payload => {
            const deleted = payload.old;
            if (deleted?.id) {
                const el = document.querySelector(`[data-msg-id="${deleted.id}"]`);
                if (el) el.remove();
            }
        })
        .subscribe();

    // ─── Переключатель чата ───────────────────────────────────────
    function toggleChat() {
        const win = document.getElementById('chat-window');
        const isOpen = win.style.display !== 'none';
        win.style.display = isOpen ? 'none' : 'flex';
    }

    function openChat(title) {
        document.getElementById('currentChatTitle').textContent = title;
        document.getElementById('inputArea').style.visibility = 'visible';
        updateAIButton();
        loadMessages();
        if (currentRecipientId) markAsRead(currentRecipientId);
    if (currentRecipientId) loadPendingOrders();
}

  async function sellerRejectOrder(orderId, amount, buyerId, btn) {

        .from('profiles')

        wallet_balance: (buyer?.wallet_balance || 0) + amount,

        recipient_id: buyerId,
        room_id: null

        const opt = sel.options[sel.selectedIndex];

        const block = document.getElementById('orderPriceBlock');
        const display = document.getElementById('orderPriceDisplay');

    async function placeOrder() {
        const sel = document.getElementById('orderPostSelect');
        const postId = sel.value;
        const opt = sel.options[sel.selectedIndex];
        const price = parseInt(opt?.dataset?.price);
        const postTitle = opt?.text?.split(' —')[0];

        if (!postId || !price) return showToast('Выбери услугу!', '#f04747');

        const myBalance = myProfileData?.wallet_balance || 0;
        if (myBalance < price) {
            showToast('Недостаточно звёзд!', '#f04747');
            return;
        }

        const newBalance = myBalance - price;
        const newFrozen = (myProfileData?.frozen_balance || 0) + price;

        const { error: balErr } = await _supabase
            .from('profiles')
            .update({ wallet_balance: newBalance, frozen_balance: newFrozen })
            .eq('id', myId);

        if (balErr) return showToast('Ошибка списания!', '#f04747');

        const autoComplete = new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString();
        const { data: order, error: orderErr } = await _supabase
            .from('orders')
            .insert([{
                buyer_id: myId,
                seller_id: currentRecipientId,
                buyer_name: myProfileData?.username,
                seller_name: document.getElementById('currentChatTitle').textContent,
                post_id: postId,
                post_title: postTitle,
                amount: price,
                status: 'frozen',
                auto_complete_at: autoComplete
            }])
            .select()
            .single();

        if (orderErr) {
            await _supabase.from('profiles').update({ wallet_balance: myBalance, frozen_balance: myProfileData?.frozen_balance || 0 }).eq('id', myId);
            return showToast('Ошибка создания заказа!', '#f04747');
        }

        myProfileData.wallet_balance = newBalance;
        myProfileData.frozen_balance = newFrozen;

        await _supabase.from('messages').insert([{
            content: `🔒 [ЗАКАЗ #${order.id.slice(0,8)}]\n📦 Услуга: ${postTitle}\n💰 Сумма: ${price} ⭐ (заморожено)\n\nПродавец, подтверди принятие заказа!`,
            user_id: myId,
            sender_name: myProfileData?.username,
            recipient_id: currentRecipientId,
            room_id: null
        }]);

        document.getElementById('orderModal').remove();
        showToast(`✅ Заказ оформлен! ${price} ⭐ заморожено`, '#43b581');
        showConfirmOrderBtn(order.id, price);
    }

    function showConfirmOrderBtn(orderId, amount) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.style.cssText = 'display:flex; justify-content:center; margin:15px 0;';
        div.innerHTML = `
            <button onclick="confirmOrder('${orderId}', ${amount}, this)"
                style="background:#43b581; color:white; border:none; border-radius:12px;
                       padding:12px 25px; cursor:pointer; font-weight:bold; font-size:14px;">

            </button>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }


async function submitReview(orderId, sellerId) {
    const selected = document.querySelectorAll('#starRow span.selected').length;
    if (!selected) return showToast('Выберите оценку!', '#f04747');

    const comment = document.getElementById('reviewComment').value.trim();
    const btn = document.getElementById('submitReviewBtn');
    btn.disabled = true;
    btn.textContent = 'Отправка...';

    const buyerName = myProfileData?.username || 'Аноним';

    const { error } = await _supabase.from('reviews').insert([{
        order_id: orderId,
        buyer_id: myId,
        buyer_name: buyerName,
        seller_id: sellerId,
        rating: selected,
        comment: comment || null
    }]);

    if (error) {
        showToast('Ошибка отправки отзыва!', '#f04747');
        btn.disabled = false;
        btn.textContent = 'Отправить оценку';
        return;
    }

    // Считаем новый средний рейтинг
    const { data: allReviews } = await _supabase
        .from('reviews')
        .select('rating')
        .eq('seller_id', sellerId);

    if (allReviews?.length) {
        const avg = allReviews.reduce((sum, r) => sum + r.rating, 0) / allReviews.length;
        const newRating = Math.round(avg * 10) / 10;
        const newCount = allReviews.length;

        // Обновляем профиль продавца
        await _supabase.from('profiles').update({
            rating: newRating,
            reviews_count: newCount
        }).eq('id', sellerId);

        // Обновляем рейтинг во ВСЕХ постах продавца
        await _supabase.from('posts').update({
            rating: newRating,
            review_count: newCount
        }).eq('author_id', sellerId);
    }

    document.getElementById('reviewModal').remove();
    showToast('✅ Спасибо за отзыв!', '#43b581');
}

    async function doConfirmOrder(orderId, amount) {
        const btn = document.getElementById('doConfirmOrderBtn');
        if (btn) { btn.disabled = true; btn.textContent = 'Обработка...'; }

        const { data: order } = await _supabase.from('orders').select('*').eq('id', orderId).single();
        if (!order) { showToast('Заказ не найден!', '#f04747'); return; }

        // Снимаем заморозку у покупателя
        const { data: buyer } = await _supabase.from('profiles').select('frozen_balance').eq('id', myId).single();
        await _supabase.from('profiles').update({
            frozen_balance: Math.max(0, (buyer?.frozen_balance || 0) - amount)
        }).eq('id', myId);

        // Начисляем звёзды продавцу
        const { data: seller } = await _supabase.from('profiles').select('wallet_balance').eq('id', order.seller_id).single();
        await _supabase.from('profiles').update({
            wallet_balance: (seller?.wallet_balance || 0) + amount
        }).eq('id', order.seller_id);

        // Обновляем статус заказа
        await _supabase.from('orders').update({
            status: 'completed',
            completed_at: new Date().toISOString()
        }).eq('id', orderId);

        // Отправляем сообщение продавцу
        await _supabase.from('messages').insert([{
            content: `✅ Заказ выполнен! ${amount} ⭐ отправлено продавцу.`,
            user_id: myId,
            sender_name: myProfileData?.username,
            recipient_id: order.seller_id,
            room_id: null
        }]);

        document.getElementById('confirmOrderModal')?.remove();
        showToast(`✅ ${amount} ⭐ успешно отправлено продавцу!`, '#43b581');

        // Открываем модалку оценки
        openReviewModal(orderId, order.seller_id, amount);
    }

    async function confirmOrder(orderId, amount, btn) {
    if (!confirm(`Подтвердить получение работы и отправить ${amount} ⭐ продавцу?`)) return;

    btn.disabled = true;
    btn.textContent = 'Обработка...';

    const { data: order } = await _supabase.from('orders').select('*').eq('id', orderId).single();
    if (!order) return showToast('Заказ не найден!', '#f04747');

    const { data: buyer } = await _supabase.from('profiles').select('frozen_balance').eq('id', myId).single();
    await _supabase.from('profiles').update({
        frozen_balance: Math.max(0, (buyer?.frozen_balance || 0) - amount)
    }).eq('id', myId);

    const { data: seller } = await _supabase.from('profiles').select('wallet_balance').eq('id', order.seller_id).single();
    await _supabase.from('profiles').update({
        wallet_balance: (seller?.wallet_balance || 0) + amount
    }).eq('id', order.seller_id);

    await _supabase.from('orders').update({
        status: 'completed',
        completed_at: new Date().toISOString()
    }).eq('id', orderId);

    await _supabase.from('messages').insert([{
        content: `✅ Заказ выполнен! ${amount} ⭐ отправлено продавцу.`,
        user_id: myId,
        sender_name: myProfileData?.username,
        recipient_id: order.seller_id,
        room_id: null
    }]);

    btn.parentElement.remove();
    showToast(`✅ ${amount} ⭐ отправлено продавцу!`, '#43b581');

    // Открываем модалку оценки
    openReviewModal(orderId, order.seller_id, amount);
}

const ratingLabels = ['', 'Ужасно 😤', 'Плохо 😕', 'Нормально 😐', 'Хорошо 😊', 'Отлично! 🔥'];

function hoverStars(n) {
    document.querySelectorAll('#starRow span').forEach(s => {
        const v = parseInt(s.dataset.star);
        s.style.filter = v <= n ? 'grayscale(0)' : 'grayscale(1)';
        s.style.transform = v <= n ? 'scale(1.2)' : 'scale(1)';
        s.style.color = v <= n ? '#eab308' : '';
    });
    document.getElementById('ratingLabel').textContent = ratingLabels[n];
}

function resetStars() {
    const selected = parseInt(document.querySelector('#starRow span.selected')?.dataset.star || 0);
    document.querySelectorAll('#starRow span').forEach(s => {
        const v = parseInt(s.dataset.star);
        s.style.filter = v <= selected ? 'grayscale(0)' : 'grayscale(1)';
        s.style.transform = 'scale(1)';
        s.style.color = v <= selected ? '#eab308' : '';
    });
    document.getElementById('ratingLabel').textContent = selected ? ratingLabels[selected] : '';
}

function selectStar(n) {
    document.querySelectorAll('#starRow span').forEach(s => s.classList.remove('selected'));
    document.querySelectorAll('#starRow span').forEach(s => {
        const v = parseInt(s.dataset.star);
        if (v <= n) s.classList.add('selected');
        s.style.filter = v <= n ? 'grayscale(0)' : 'grayscale(1)';
        s.style.color = v <= n ? '#eab308' : '';
    });
    document.getElementById('ratingLabel').textContent = ratingLabels[n];
}

<script>
// 1. Функция, которая рисует сообщение в чате
function appendMessage(text, type = 'sent') {
    const chatMessages = document.querySelector('.chat-messages');
    if (!chatMessages) return;

    const messageDiv = document.createElement('div');
    // У вас в CSS скорее всего классы message-sent и message-received
    messageDiv.className = `message ${type === 'sent' ? 'sent' : 'received'}`;
    
    // Формируем внутренности сообщения
    messageDiv.innerHTML = `
        <div class="message-text">${text}</div>
        <div class="message-time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
    `;
    
    chatMessages.appendChild(messageDiv);
    
    // Скроллим чат вниз, чтобы видеть новое сообщение
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// 2. Логика отправки
// Находим элементы интерфейса
const sendBtn = document.querySelector('.send-btn');
const messageInput = document.querySelector('.message-input');
const chatMessages = document.querySelector('.chat-messages');

// 1. Функция отрисовки (чтобы сразу видеть сообщение)
function appendMessage(text, type = 'sent') {
    if (!chatMessages) return;

    const messageDiv = document.createElement('div');
    // Проверь в своем CSS: если там .message-sent, замени 'sent' на 'message-sent'
    messageDiv.className = `message ${type === 'sent' ? 'sent' : 'received'}`;
    
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    messageDiv.innerHTML = `
        <div class="message-text">${text}</div>
        <div class="message-time">${time}</div>
    `;
    
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight; // Скролл вниз
}

// 2. Логика отправки
if (sendBtn) {
    sendBtn.onclick = async () => {
        const text = messageInput.value.trim();
        if (!text) return;

        // МГНОВЕННО показываем в чате
        appendMessage(text, 'sent');
        
        // Очищаем поле ввода сразу, не дожидаясь базы
        messageInput.value = "";

        // ОТПРАВЛЯЕМ в Supabase (в фоновом режиме)
        const { error } = await _supabase
            .from('messages')
            .insert([{ 
                content: text, 
                sender_id: myId, 
                room_id: currentRoomId,
                recipient_id: currentRecipientId 
            }]);

        if (error) {
            console.error("Ошибка базы данных:", error.message);
        }
    };
}
