<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Media | Ultimate Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #chat-widget-button {
            position: fixed;
            bottom: 30px;
            left: 30px; 
            width: 70px;
            height: 70px;
            background: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .chat-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            background: #ef4444; 
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            border: 2px solid var(--bg-main); 
        }
        .chat-badge.hidden {
            transform: scale(0);
            opacity: 0;
        }
        .sdot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar); 
            display: inline-block;
            flex-shrink: 0;
        }
        .sdot.online { 
            background: #43b581; 
            position: relative; 
        }
        .sdot.offline { 
            background: #747f8d; 
        }
        .sdot.online::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            border: 1.5px solid #43b581;
            opacity: 0;
            animation: pulse-ring 2.5s ease-out infinite;
        }

@keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.5; }
    70% { transform: scale(2); opacity: 0; }
    100% { opacity: 0; }
}

        .header-status-text {
            font-size: 13px;
            color: #b9bbbe;
            font-weight: normal;
            margin-left: 8px;
        }

        :root {
            --bg-main: #2c2f33;
            --bg-sidebar: #23272a;
            --bg-input-area: #36393f;
            --accent-blue: #007bff;
            --text-color: #ffffff;
            --msg-in: #4f545c;
            --msg-out: #007bff;
            --border-color: #202225;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: transparent; height: 100vh; overflow: hidden; }

        #chat-widget-button {
            position: fixed; bottom: 30px; left: 30px;
            width: 70px; height: 70px; background: var(--accent-blue);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); transition: 0.3s;
        }
        #chat-widget-button:hover { transform: scale(1.1); }

        .chat-header h2 {
            color: white;
            font-size: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: calc(100% - 160px);
        }

        #chat-window {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-main);
            display: flex;
            z-index: 2000;
            flex-direction: row;
        }

        .sidebar {
            width: 320px; background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header { padding: 25px; font-size: 22px; font-weight: bold; color: white; border-bottom: 1px solid var(--border-color); }
        .sidebar-content { flex: 1; overflow-y: auto; padding-top: 10px; }

        .section-title {
            padding: 15px 20px 5px 20px; font-size: 12px; text-transform: uppercase;
            color: #8e9297; font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }
        .item {
            padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #b9bbbe; transition: 0.2s;
        }
        .item:hover { background: #36393f; color: white; }
        .item.active { background: #40444b; color: white; border-left: 4px solid var(--accent-blue); }

        .avatar {
            width: 35px; height: 35px; border-radius: 50%; background: #5865f2;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; flex-shrink: 0;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
            min-width: 0; 
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 30px; background: var(--bg-sidebar);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; 
        }
        .messages-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }

        .message { max-width: 65%; padding: 12px 18px; border-radius: 18px; color: white; word-wrap: break-word; line-height: 1.4; }
        .incoming { background: var(--msg-in); align-self: flex-start; border-bottom-left-radius: 4px; }
        .my-message { background: var(--msg-out); align-self: flex-end; border-bottom-right-radius: 4px; }
        .chat-media { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; cursor: pointer; }

        .input-panel {
            padding: 25px 30px; background: var(--bg-sidebar);
            display: flex; gap: 15px; align-items: center;
            flex-shrink: 0; 
            position: relative; 
        }
        #msgInput {
            flex: 1; padding: 14px 25px; border-radius: 30px; border: none;
            background: var(--bg-input-area); color: white; outline: none; font-size: 16px;
        }
        .btn-icon { background: #4f545c; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: none; flex-shrink: 0; }
        .btn-icon:hover { transform: scale(1.1); background: #72767d; }
        .btn-send { background: var(--accent-blue); color: white; border-radius: 30px; padding: 12px 25px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; flex-shrink: 0; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .search-box { padding: 10px 20px; }
        .search-box input {
            width: 100%; padding: 8px 15px; border-radius: 5px; border: none;
            background: var(--bg-input-area); color: white; outline: none; font-size: 14px;
        }
        .toast {
            position: fixed; bottom: 110px; left: 30px;
            background: #43b581; color: white; padding: 10px 20px;
            border-radius: 10px; font-size: 14px; z-index: 9999;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; 
        }
        .toast.show { opacity: 1; }

        .order-btn {
            background: linear-gradient(135deg, #eab308, #f59e0b);
            color: black; border: none; border-radius: 20px;
            padding: 8px 18px; cursor: pointer; font-size: 13px;
            font-weight: bold; margin-right: 10px;
            box-shadow: 0 2px 10px rgba(234,179,8,0.4);
            transition: 0.2s;
        }
        .order-btn:hover { transform: scale(1.05); }

        .room-item { position: relative; }
        .room-item .room-actions {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            display: none; gap: 4px; align-items: center;
        }
        .room-item:hover .room-actions { display: flex; }
        .room-action-btn {
            background: #40444b; border: none; border-radius: 6px;
            color: #b9bbbe; cursor: pointer; font-size: 13px;
            padding: 3px 7px; transition: 0.15s; line-height: 1;
        }
        .room-action-btn:hover { background: #f04747; color: white; }
        .room-action-btn.leave:hover { background: #f0a500; color: white; }

        .room-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .room-modal {
            background: #2c2f33; border-radius: 16px; width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #40444b;
            overflow: hidden; animation: slideUp 0.2s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
        .room-modal-header {
            padding: 20px 24px; background: #23272a;
            border-bottom: 1px solid #40444b;
            display: flex; justify-content: space-between; align-items: center;
        }
        .room-modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
        .room-modal-btn {
            width: 100%; padding: 13px 18px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .room-modal-btn:hover { filter: brightness(1.1); transform: translateX(3px); }

        #membersPanel {
            width: 0;
            overflow: hidden;
            background: #23272a;
            border-left: 1px solid #202225;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }
        .chat-body {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
            overflow: hidden;
        }
        #emojiPicker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 80px;
            z-index: 9999;
        }

        /* ========== ПОИСК ПО СООБЩЕНИЯМ ========== */
        #msgSearchOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-main);
            z-index: 100;
            flex-direction: column;
        }
        #msgSearchOverlay.open { display: flex; }

        .msearch-header {
            padding: 16px 20px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
        }
        .msearch-bar {
            flex: 1; display: flex; align-items: center; gap: 10px;
            background: var(--bg-input-area);
            border-radius: 25px; padding: 9px 16px;
            border: 1px solid transparent; transition: border-color 0.15s;
        }
        .msearch-bar:focus-within { border-color: #4f545c; }
        .msearch-bar input {
            flex: 1; border: none; outline: none;
            background: transparent; color: white; font-size: 15px;
            font-family: inherit;
        }
        .msearch-bar input::placeholder { color: #72767d; }
        .msearch-clear {
            background: none; border: none; color: #72767d;
            cursor: pointer; font-size: 16px; line-height: 1;
            padding: 2px 4px; border-radius: 4px; display: none;
        }
        .msearch-clear:hover { color: #b9bbbe; }
        .msearch-close {
            background: none; border: none; color: #72767d;
            cursor: pointer; font-size: 24px; line-height: 1;
            transition: color 0.15s;
        }
        .msearch-close:hover { color: white; }

        .msearch-filters {
            display: flex; gap: 8px; padding: 12px 20px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .msearch-chip {
            padding: 5px 14px; border-radius: 20px; font-size: 13px;
            cursor: pointer; border: 1px solid #4f545c;
            background: transparent; color: #8e9297;
            transition: all 0.15s; user-select: none;
        }
        .msearch-chip:hover { border-color: #72767d; color: #b9bbbe; }
        .msearch-chip.active {
            border-color: var(--accent-blue);
            background: rgba(0,123,255,0.15);
            color: #7ab8ff;
        }

        .msearch-info {
            padding: 8px 20px; font-size: 12px; color: #72767d;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0; min-height: 34px;
            display: flex; align-items: center;
        }
        .msearch-info mark { background: rgba(234,179,8,0.25); color: #eab308; border-radius: 3px; padding: 0 3px; }

        .msearch-list {
            flex: 1; overflow-y: auto;
            padding: 8px 0;
        }
        .msearch-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 12px 20px; cursor: default;
            border-left: 3px solid transparent;
            transition: background 0.1s, border-color 0.1s;
        }
        .msearch-item:hover { background: #36393f; }
        .msearch-item.match {
            border-left-color: #eab308;
            background: rgba(234,179,8,0.05);
        }
        .msearch-item.match:hover { background: rgba(234,179,8,0.1); }

        .msearch-av {
            width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; margin-top: 1px;
        }
        .msearch-av.mine { background: #007bff; color: white; }
        .msearch-av.other { background: #5865f2; color: white; }

        .msearch-body { flex: 1; min-width: 0; }
        .msearch-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 4px; flex-wrap: wrap;
        }
        .msearch-name { font-size: 13px; font-weight: 600; color: #dcddde; }
        .msearch-time { font-size: 11px; color: #72767d; }
        .msearch-text { font-size: 14px; color: #96989d; line-height: 1.5; word-break: break-word; }
        .msearch-text mark { background: rgba(234,179,8,0.3); color: #fde68a; border-radius: 2px; padding: 0 2px; font-style: normal; }

        .msearch-empty {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; flex: 1; gap: 12px;
            color: #4f545c; padding: 60px 20px; text-align: center;
        }
        .msearch-empty svg { opacity: 0.4; }
        .msearch-empty p { font-size: 14px; color: #72767d; }
        /* ========================================= */

        /* ========== МОБИЛЬНАЯ АДАПТАЦИЯ ========== */
        #mobile-back-btn {
            display: none;
            background: none;
            border: none;
            color: #b9bbbe;
            cursor: pointer;
            padding: 4px 8px 4px 0;
            font-size: 22px;
            line-height: 1;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            /* Отключаем fixed-кнопку виджета на мобиле если она мешает */
            #chat-widget-button { bottom: 20px; left: 15px; width: 56px; height: 56px; }

            /* Основное окно чата — полный экран */
            #chat-window {
                position: fixed;
                top: 0; left: 0;
                width: 100vw;
                height: 100dvh; /* dynamic viewport height — учитывает адресную строку браузера */
            }

            /* Лэйаут: сайдбар и чат друг за другом горизонтально, но переключаемся через JS */
            #chat-window {
                flex-direction: column;
                overflow: hidden;
            }

            /* Сайдбар — полный экран, скрывается при открытом чате */
            .sidebar {
                width: 100% !important;
                height: 100%;
                border-right: none;
                position: absolute;
                top: 0; left: 0;
                z-index: 10;
                transition: transform 0.3s ease;
            }
            .sidebar.hidden-mobile {
                transform: translateX(-100%);
                pointer-events: none;
            }

            /* Основной чат — тоже полный экран */
            .main-chat {
                position: absolute;
                top: 0; left: 0;
                width: 100%;
                height: 100%;
                z-index: 5;
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }
            .main-chat.visible-mobile {
                transform: translateX(0);
            }

            /* Показываем кнопку "Назад" */
            #mobile-back-btn { display: flex; align-items: center; }

            /* Хедер чата — компактнее */
            .chat-header {
                padding: 12px 15px;
            }
            .chat-header h2 {
                font-size: 16px;
                max-width: calc(100% - 130px);
            }

            /* Сайдбар хедер */
            .sidebar-header {
                padding: 18px 20px;
                font-size: 18px;
            }

            /* Сообщения */
            .messages-container {
                padding: 15px;
                gap: 10px;
            }
            .message {
                max-width: 80%;
                padding: 10px 14px;
                font-size: 15px;
            }

            /* Панель ввода */
            .input-panel {
                padding: 10px 12px;
                gap: 8px;
                /* Фиксируем над клавиатурой */
                position: sticky;
                bottom: 0;
            }
            #msgInput {
                padding: 11px 18px;
                font-size: 16px; /* минимум 16px — не зумит браузер */
                border-radius: 24px;
            }
            .btn-icon { width: 40px; height: 40px; }
            .btn-send { padding: 10px 18px; font-size: 14px; }

            /* Панель участников — поверх, как drawer */
            #membersPanel {
                position: absolute !important;
                top: 0; right: 0;
                height: 100%;
                width: 0 !important;
                z-index: 20;
                box-shadow: -5px 0 20px rgba(0,0,0,0.5);
            }
            #membersPanel.open {
                width: 280px !important;
            }

            /* Поиск по сообщениям */
            #msgSearchOverlay {
                position: absolute;
                top: 0; left: 0;
                width: 100%;
                height: 100%;
                z-index: 50;
            }

            /* Модальные окна — на всю ширину */
            .room-modal { width: calc(100vw - 32px); max-width: 380px; }

            /* Toast — снизу по центру */
            .toast {
                left: 50%;
                transform: translateX(-50%);
                bottom: 80px;
                white-space: nowrap;
            }

            /* Emoji picker — снизу */
            #emojiPicker {
                bottom: 70px;
                left: 5px;
                right: 5px;
            }

            /* Поиск в сайдбаре */
            .search-box { padding: 10px 15px; }
        }

        /* Очень маленькие экраны */
        @media (max-width: 380px) {
            .chat-header h2 { font-size: 14px; }
            .message { max-width: 90%; font-size: 14px; }
            .btn-send { padding: 9px 12px; font-size: 13px; }
        }
        /* ========================================= */
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/css/emoji-mart.css">
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/dist/browser.js"></script>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="chat-window">
    <div class="sidebar">
        <div class="sidebar-header" style="display: flex; align-items: center; justify-content: space-between;">
    <span>Pro Media</span>
    <div style="display: flex; align-items: center; gap: 8px;">
        <div class="sdot online" id="my-sdot"></div>
        <span id="my-status-txt" style="font-size: 12px; color: #43b581; font-weight: normal;">В сети</span>
    </div>
</div>
        <div class="sidebar-content">
            <div class="search-box" style="position:relative;">
                <div style="display:flex; gap:6px; align-items:center;">
                    <input type="text" id="userSearch" placeholder="Поиск по @username..." class="search-input" style="flex:1;">
                    <button id="dirFilterBtn" onclick="toggleDirectionFilter()" title="Фильтр по направлению"
                        style="background:#40444b; border:none; border-radius:8px; color:#b9bbbe;
                               width:34px; height:34px; cursor:pointer; font-size:16px; flex-shrink:0;
                               display:flex; align-items:center; justify-content:center; transition:0.2s;"
                        onmouseover="this.style.background='#5865f2';this.style.color='white'"
                        onmouseout="if(!window._dirFilterOpen){this.style.background='#40444b';this.style.color='#b9bbbe';}">
                        ⌄
                    </button>
                </div>
                <div id="dirFilterDropdown" style="display:none; position:absolute; top:42px; left:0; right:0;
                     background:#2c2f33; border:1px solid #40444b; border-radius:10px; z-index:999;
                     box-shadow:0 8px 24px rgba(0,0,0,0.4); overflow:hidden;">
                    <div id="dirFilterList" style="padding:6px;"></div>
                </div>
            </div>
            <div class="section-title">
                Группы
                <button onclick="createNewRoom()" style="background:none; border:none; color:#43b581; cursor:pointer; font-size:20px; line-height:1;">+</button>
            </div>
            <div id="roomList"></div>
            <div class="section-title" style="margin-top:20px;">Люди</div>
            <div id="userList"></div>
            
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 0;">
            <button id="mobile-back-btn" onclick="mobileShowSidebar()" title="Назад">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div style="display: flex; flex-direction: column;">
    <h2 id="currentChatTitle">Выберите чат</h2>
    <div id="partnerStatus" style="display: flex; align-items: center; gap: 5px; margin-top: 2px; visibility: hidden;">
        <div class="sdot offline" id="partner-sdot" style="width: 8px; height: 8px;"></div>
        <span id="partner-status-txt" class="header-status-text">не в сети</span>
    </div>
</div>
</div>
            <div style="display:flex; align-items:center; gap:10px;">
                <!-- КНОПКА ПОИСКА ПО СООБЩЕНИЯМ -->
                <button id="msgSearchBtn" onclick="openMsgSearch()"
                    title="Поиск по сообщениям"
                    style="display:none; background:none; border:none; color:#8e9297;
                           cursor:pointer; padding:4px 8px; border-radius:6px; transition:0.2s; line-height:1;"
                    onmouseover="this.style.color='white'" onmouseout="this.style.color='#8e9297'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="11" cy="11" r="7"/><path d="M17 17l4 4"/>
                    </svg>
                </button>

    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function hlText(text, query) {
        if (!query) return escHtml(text);
        const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return escHtml(text).replace(
            new RegExp('(' + escHtml(safe) + ')', 'gi'),
            '<mark>$1</mark>'
        );
    }

    function renderMsgSearch() {
        const q    = _msgSearchQuery.toLowerCase().trim();
        const list = document.getElementById('msearchList');
        const info = document.getElementById('msearchInfo');

        // фильтруем
        const filtered = _cachedMessages.filter(m => {
            const isMine = m.user_id === myId;
            if (_msgSearchFilter === 'mine'  && !isMine) return false;
            if (_msgSearchFilter === 'other' &&  isMine) return false;

            if (!q) return true;

            const txt = (m.content || '').toLowerCase();
            const name = (m.sender_name || '').toLowerCase();
            return txt.includes(q) || name.includes(q);
        });

        // info
        if (q) {
            const n = filtered.length;
            info.innerHTML = n
                ? `Найдено <mark>${n}</mark> ${n === 1 ? 'сообщение' : n < 5 ? 'сообщения' : 'сообщений'}`
                : 'Ничего не найдено';
        } else {
            info.innerHTML = _cachedMessages.length
                ? `Всего сообщений в чате: <mark>${_cachedMessages.length}</mark>`
                : '';
        }

        if (!filtered.length) {
            list.innerHTML = `
                <div class="msearch-empty">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
                        <circle cx="11" cy="11" r="7"/><path d="M17 17l4 4"/>
                    </svg>
                    <p>${q ? 'По запросу «' + escHtml(q) + '» ничего не найдено' : 'Введите запрос для поиска'}</p>
                </div>`;
            return;
        }

        list.innerHTML = filtered.map(m => {
            const isMine  = m.user_id === myId;
            const isMatch = q && (m.content || '').toLowerCase().includes(q);
            const avCls   = isMine ? 'mine' : 'other';
            const avLetter = ((m.sender_name || '?')[0]).toUpperCase();

            let preview = '';
            if (m.content.startsWith('[image]:')) {
                preview = '📷 Фото';
            } else if (m.content.startsWith('[video]:')) {
                preview = '🎥 Видео';
            } else if (m.content.startsWith('[file:')) {
                const nm = m.content.match(/^\[file:(.+?)\]/);
                preview = '📄 ' + (nm ? nm[1] : 'Файл');
            } else {
                preview = hlText(m.content, _msgSearchQuery);
            }

            const msgDate = new Date(m.created_at);
            const today   = new Date();
            const isToday = msgDate.toDateString() === today.toDateString();
            const timeStr = msgDate.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
            const dateStr = isToday ? timeStr
                : msgDate.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit' }) + ' ' + timeStr;

            return `
                <div class="msearch-item ${isMatch ? 'match' : ''}">
                    <div class="msearch-av ${avCls}">${avLetter}</div>
                    <div class="msearch-body">
                        <div class="msearch-row">
                            <span class="msearch-name">${escHtml(m.sender_name || (isMine ? 'Вы' : 'Собеседник'))}</span>
                            <span class="msearch-time">${dateStr}</span>
                        </div>
                        <div class="msearch-text">${preview}</div>
                    </div>
                </div>`;
        }).join('');
    }

    let sellerInfoCache = null;

        if (!currentRecipientId) return;

    function addAIMessage(text, isUser = false) {
        const box = document.getElementById('aiChatBox');
        if (!box) return;

        if (placeholder) placeholder.remove();
        const msg = document.createElement('div');

        msg.textContent = text;
        box.appendChild(msg);
        box.scrollTop = box.scrollHeight;
    }

    async function sendAIQuestion() {
        const input = document.getElementById('aiModalInput');
        if (!input) return;
        const question = input.value.trim();
        if (!question) return;
        input.value = '';
        addAIMessage(question, true);
        const typing = document.createElement('div');
        typing.id = 'aiTyping';
        typing.style.cssText = 'color:#72767d;font-size:13px;padding:5px 10px;align-self:flex-start;';
        typing.textContent = '🤖 печатает...';
        document.getElementById('aiChatBox')?.appendChild(typing);
        const sellerContext = sellerInfoCache
            ? `Информация о продавце:\nУслуги: ${sellerInfoCache.services||'не указано'}\nЦены: ${sellerInfoCache.prices||'не указано'}\nПортфолио: ${sellerInfoCache.portfolio||'не указано'}\nВремя ответа: ${sellerInfoCache.response_time||'1-2 часа'}`
            : 'Информация о продавце не заполнена.';
        const { data, error } = await _supabase.functions.invoke('ai-reply', { body: { message: question, sellerId: currentRecipientId, context: sellerContext } });
        document.getElementById('aiTyping')?.remove();
        if (error || !data?.reply) { addAIMessage('Извините, не могу ответить сейчас.', false); return; }
        addAIMessage(data.reply, false);
        const orderKeywords = ['заказать','хочу','купить','оформить','нужно','закажу','интересует'];
        if (orderKeywords.some(w => question.toLowerCase().includes(w))) {
            await _supabase.from('messages').insert([{ content: `🤖 ИИ-ассистент:\nКлиент заинтересован!\n\n"${question}"\nОтвет ИИ: "${data.reply}"`, user_id: myId, sender_name: '🤖 Новый заказ от клиента', recipient_id: currentRecipientId, room_id: null }]);
            addAIMessage('✅ Ваш запрос отправлен продавцу!', false);
        }
    }

    async function handleMarketRedirect() {
        const params = new URLSearchParams(window.location.search);
        const sellerId = params.get('user_id');
        const sellerName = params.get('name');
        if (!sellerId || !sellerName) return;
        let attempts = 0;
        while (!myId && attempts < 20) { await new Promise(r => setTimeout(r, 200)); attempts++; }
        if (!myId) return;
        currentRecipientId = sellerId;
        currentRoomId = null;
        openChat(decodeURIComponent(sellerName));
        // ── ДОБАВЛЯЕМ ПРОДАВЦА В СПИСОК СЛЕВА ──────────────────────────
    if (!recentChats.find(u => u.id === sellerId)) {
        const { data: sellerProfile } = await _supabase
            .from('profiles')
            .select('*')
            .eq('id', sellerId)
            .single();
        if (sellerProfile) {
            recentChats.unshift(sellerProfile);
            saveRecentChats();
            loadUsers(); // перерисовываем список
        }
    }
        const { data } = await _supabase.from('messages').select('id').or(`and(user_id.eq.${myId},recipient_id.eq.${sellerId}),and(user_id.eq.${sellerId},recipient_id.eq.${myId})`).limit(1);
        if (!data?.length) {
            const { data: sellerInfo } = await _supabase.from('seller_info').select('*').eq('user_id', sellerId).maybeSingle();
            const context = sellerInfo ? `Услуги: ${sellerInfo.services||'не указано'}\nЦены: ${sellerInfo.prices||'не указано'}\nПортфолио: ${sellerInfo.portfolio||'не указано'}\nВремя ответа: ${sellerInfo.response_time||'1-2 часа'}` : 'Информация не заполнена.';
            const { data: aiData } = await _supabase.functions.invoke('ai-reply', { body: { message: 'Поприветствуй нового клиента очень коротко и предложи помощь', sellerId, context } });
            if (aiData?.reply) {
                await _supabase.from('messages').insert([{ content: aiData.reply, user_id: sellerId, sender_name: `🤖 ИИ-ассистент @${decodeURIComponent(sellerName)}`, recipient_id: myId, is_ai_reply: true }]);
            }
        }
    }

    window.addEventListener('load', async () => {

    async function loadRooms() {
        const { data: myMemberships } = await _supabase.from('room_members').select('room_id').eq('user_id', myId);
        const myRoomIds = new Set((myMemberships || []).map(m => m.room_id));
        const { data: createdRooms } = await _supabase.from('rooms').select('id, created_by').eq('created_by', myId);
        const myCreatedIds = new Set((createdRooms || []).map(r => r.id));
        const visibleIds = new Set([...myRoomIds, ...myCreatedIds, GLOBAL_SERVER_ID]);
        const { data: rooms } = await _supabase.from('rooms').select('*').in('id', [...visibleIds]).order('name');
        const list = document.getElementById('roomList');
        list.innerHTML = '';
        rooms?.forEach(room => {
            const isGlobal  = room.id === GLOBAL_SERVER_ID;
            const isMember  = myRoomIds.has(room.id);
            const isCreator = myCreatedIds.has(room.id);

                    list.appendChild(div);

        let query = _supabase.from('profiles').select('*').neq('id', myId);

    async function loadMessages() {
        const box = document.getElementById('chatBox');
        box.innerHTML = '<div style="color:#72767d;text-align:center;padding:20px;">Загрузка...</div>';
        let query = _supabase.from('messages').select('*');
        if (currentRoomId) {
            query = query.eq('room_id', currentRoomId).is('recipient_id', null);
        } else if (currentRecipientId) {
            query = query.or(`and(user_id.eq.${myId},recipient_id.eq.${currentRecipientId}),and(user_id.eq.${currentRecipientId},recipient_id.eq.${myId})`).is('room_id', null);
        } else { box.innerHTML = ''; return; }

        const { data, error } = await query.order('created_at', { ascending: true });
        if (error) { box.innerHTML = '<div style="color:#f04747;text-align:center;padding:20px;">Ошибка загрузки</div>'; return; }

        // сохраняем в кэш для поиска
        _cachedMessages = data || [];

        box.innerHTML = '';
        if (!data?.length) { box.innerHTML = '<div style="color:#72767d;text-align:center;padding:20px;">Сообщений пока нет</div>'; return; }
        data.forEach(msg => renderMessage(msg));
        box.scrollTop = box.scrollHeight;
    }

    function renderMessage(msg) {
        const box = document.getElementById('chatBox');
        const isMine = msg.user_id === myId;

        // добавляем в кэш поиска если ещё не добавлено
        if (!_cachedMessages.find(m => m.id === msg.id)) {
            _cachedMessages.push(msg);
        }

        const emptyPlaceholder = box.querySelector('div[style*="Сообщений пока нет"]');
        if (emptyPlaceholder) emptyPlaceholder.remove();

        const wrapper = document.createElement('div');
        wrapper.style.cssText = `display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'};gap:2px;`;
        wrapper.dataset.msgId = msg.id;

        if (!isMine && currentRoomId) {
            const nameTag = document.createElement('div');
            nameTag.style.cssText = 'font-size:11px;color:#43b581;padding:0 5px;';
            nameTag.textContent = msg.sender_name || 'Пользователь';
            wrapper.appendChild(nameTag);
        }

        const div = document.createElement('div');
        div.className = 'message ' + (isMine ? 'my-message' : 'incoming');

        if (msg.content.startsWith('[image]:')) {
            const img = document.createElement('img');
            img.src = msg.content.replace('[image]:', '');
            img.className = 'chat-media';
            img.onclick = () => window.open(img.src, '_blank');
            div.appendChild(img);
        } else if (msg.content.startsWith('[video]:')) {
            const vid = document.createElement('video');
            vid.src = msg.content.replace('[video]:', '');
            vid.className = 'chat-media';
            vid.controls = true;
            div.appendChild(vid);
        } else if (msg.content.startsWith('[file:')) {
            const match = msg.content.match(/^\[file:(.+?)\]:(.+)$/);
            if (match) {
                const fileLink = document.createElement('a');
                fileLink.href = match[2]; fileLink.target = '_blank';
                fileLink.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,0.2);border-radius:10px;text-decoration:none;color:white;margin-top:4px;';
                fileLink.innerHTML = `<span style="font-size:28px;">📄</span><div><div style="font-size:13px;font-weight:bold;">${match[1]}</div><div style="font-size:11px;color:rgba(255,255,255,0.6);">Нажмите для открытия</div></div>`;
                div.appendChild(fileLink);
            }
        } else {
            div.innerHTML = escapeHtml(msg.content).replace(/\n/g, '<br>');
        }

        const bottomRow = document.createElement('div');
        bottomRow.style.cssText = `display:flex;align-items:center;gap:8px;padding:0 5px;flex-direction:${isMine?'row-reverse':'row'};`;
        const timeEl = document.createElement('div');
        timeEl.style.cssText = 'font-size:10px;color:#72767d;';
        const msgDate = new Date(msg.created_at);
        const today = new Date();
        const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
        const isToday = msgDate.toDateString() === today.toDateString();
        const isYesterday = msgDate.toDateString() === yesterday.toDateString();
        const timeStr = msgDate.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
        timeEl.textContent = isToday ? timeStr : isYesterday ? `Вчера ${timeStr}` : `${msgDate.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})} ${timeStr}`;
        bottomRow.appendChild(timeEl);

        if (isMine) {
            const delBtn = document.createElement('button');
            delBtn.style.cssText = 'background:#f04747;border:none;cursor:pointer;font-size:11px;opacity:0;transition:opacity 0.2s;padding:3px 8px;border-radius:5px;color:white;font-weight:bold;';
            delBtn.textContent = '🗑 Удалить';
            wrapper.addEventListener('mouseenter', () => delBtn.style.opacity = '1');
            wrapper.addEventListener('mouseleave', () => delBtn.style.opacity = '0');
            delBtn.onclick = async () => {
                if (!confirm('Удалить сообщение?')) return;
                const { error } = await _supabase.from('messages').delete().eq('id', msg.id);
                if (error) showToast('Ошибка удаления!', '#f04747');
                else {
                    wrapper.remove();
                    _cachedMessages = _cachedMessages.filter(m => m.id !== msg.id);
                }
            };
            bottomRow.appendChild(delBtn);
        }

        wrapper.appendChild(div);
        wrapper.appendChild(bottomRow);
        box.appendChild(wrapper);
        box.scrollTop = box.scrollHeight;
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    async function handleSend() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !myId) return;
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;
        const now = Date.now();
        if (currentRoomId === GLOBAL_SERVER_ID) {
            const passed = now - lastMessageTime;
            if (passed < COOLDOWN_MS) { showToast(`Подождите ${Math.ceil((COOLDOWN_MS - passed) / 1000)} сек.`, '#f04747'); sendBtn.disabled = false; return; }
        }
        input.value = '';
        const payload = { content: text, user_id: myId, sender_name: myProfileData?.username || myProfileData?.full_name || "Аноним", room_id: currentRoomId || null, recipient_id: currentRecipientId || null };
        const { data: newMsg, error } = await _supabase.from('messages').insert([payload]).select().single();
        if (error) { showToast('Ошибка отправки!', '#f04747'); input.value = text; }
        else {
            renderMessage(newMsg);
            if (currentRoomId === GLOBAL_SERVER_ID) { lastMessageTime = Date.now(); startVisualCooldown(30); return; }
        }
        sendBtn.disabled = false;
    }

    async function uploadFile(input) {
        const file = input.files[0];
        if (!file || !myId) return;
        const isImage = file.type.startsWith('image/');
        const isVideo = file.type.startsWith('video/');
        const isPDF   = file.type === 'application/pdf';
        if (!isImage && !isVideo && !isPDF) { showToast('Поддерживаются: картинки, видео и PDF!', '#f04747'); return; }

        const box = document.getElementById('chatBox');
        const loadingDiv = document.createElement('div');
        loadingDiv.id = 'uploadingIndicator';
        loadingDiv.style.cssText = 'display:flex;justify-content:flex-end;padding:5px 0;';
        loadingDiv.innerHTML = `<div style="background:#40444b;border-radius:18px;padding:12px 18px;color:#b9bbbe;font-size:13px;min-width:220px;max-width:65%;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span style="font-size:22px;">📎</span><div style="flex:1;min-width:0;"><div style="color:white;font-weight:bold;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${file.name}</div><div id="uploadPercent" style="font-size:11px;color:#7289da;margin-top:2px;">0%</div></div></div><div style="background:#2c2f33;border-radius:10px;height:6px;overflow:hidden;"><div id="uploadBar" style="height:100%;width:0%;background:linear-gradient(90deg,#5865f2,#7289da);border-radius:10px;transition:width 0.2s ease;"></div></div></div>`;
        box.appendChild(loadingDiv);
        box.scrollTop = box.scrollHeight;
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;

        const ext = file.name.split('.').pop();
        const filePath = `${myId}/${Date.now()}.${ext}`;
        const uploadUrl = `${SUPABASE_URL}/storage/v1/object/chat-media/${filePath}`;

        const publicUrl = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', uploadUrl);
            xhr.setRequestHeader('Authorization', `Bearer ${SUPABASE_KEY}`);
            xhr.setRequestHeader('x-upsert', 'false');
            xhr.setRequestHeader('Content-Type', file.type);
            xhr.upload.addEventListener('progress', e => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    const bar = document.getElementById('uploadBar');
                    const label = document.getElementById('uploadPercent');
                    if (bar) bar.style.width = pct + '%';
                    if (label) label.textContent = pct + '%';
                }
            });
            xhr.addEventListener('load', () => {
                if (xhr.status === 200 || xhr.status === 201) resolve(`${SUPABASE_URL}/storage/v1/object/public/chat-media/${filePath}`);
                else reject(new Error('Upload failed: ' + xhr.status));
            });
            xhr.addEventListener('error', () => reject(new Error('Network error')));
            xhr.send(file);
        }).catch(err => { console.error(err); loadingDiv.remove(); sendBtn.disabled = false; showToast('Ошибка загрузки файла', '#f04747'); return null; });

        loadingDiv.remove();
        sendBtn.disabled = false;
        if (!publicUrl) { input.value = ''; return; }

        const prefix = isImage ? '[image]:' : isVideo ? '[video]:' : `[file:${file.name}]:`;
        const { data: newMsg, error } = await _supabase.from('messages').insert([{ content: prefix + publicUrl, user_id: myId, sender_name: myProfileData?.username || "Аноним", room_id: currentRoomId || null, recipient_id: currentRecipientId || null }]).select().single();
        if (error) showToast('Ошибка отправки медиа', '#f04747');
        else renderMessage(newMsg);
        input.value = '';
    }

    function startVisualCooldown(seconds) {
        const btn = document.getElementById('sendBtn');
        let left = seconds;
        btn.disabled = true;
        const itv = setInterval(() => {

    _supabase.channel('db_changes')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            const m = payload.new;
            const isCurrentRoom = currentRoomId && m.room_id === currentRoomId;
            const isCurrentDM = !currentRoomId && currentRecipientId && !m.room_id && ((m.user_id === currentRecipientId && m.recipient_id === myId) || (m.user_id === myId && m.recipient_id === currentRecipientId));
            if ((isCurrentRoom || isCurrentDM) && m.user_id !== myId) renderMessage(m);
            if (m.recipient_id === myId) {
                if (m.user_id !== myId && !m.room_id) {
                    const alreadyInChats = recentChats.find(u => u.id === m.user_id);
                    if (!alreadyInChats) {
                        _supabase.from('profiles').select('*').eq('id', m.user_id).single().then(({ data: sp }) => {
                            if (sp && !recentChats.find(u => u.id === sp.id)) { recentChats.unshift(sp); saveRecentChats(); loadUsers(); }
                        });
                    } else { recentChats = recentChats.filter(u => u.id !== m.user_id); recentChats.unshift(alreadyInChats); saveRecentChats(); }
                    sendNotification(`💬 Новое сообщение от @${m.sender_name||'кто-то'}`, m.content.startsWith('[image]') ? '📷 Фото' : m.content.startsWith('[video]') ? '🎥 Видео' : m.content.startsWith('[file') ? '📄 Файл' : m.content.slice(0, 60));
                    if (currentRecipientId !== m.user_id) setUnread(unreadCount + 1);
                }
                loadUsers();
            }
        }).subscribe();

    async function placeOrder() {
        const placeBtn = document.querySelector('[onclick="placeOrder()"]');
        if (placeBtn) { placeBtn.disabled = true; placeBtn.textContent = '⏳ Обработка...'; }
        const sel = document.getElementById('orderPostSelect');
        const postId = sel.value;
        const opt = sel.options[sel.selectedIndex];
        const price = parseInt(opt?.dataset?.price);
        const postTitle = opt?.text?.split(' —')[0];
        if (!postId || !price) { showToast('Выбери услугу!', '#f04747'); if (placeBtn) { placeBtn.disabled = false; placeBtn.textContent = '🔒 Заморозить и заказать'; } return; }
        const myBalance = myProfileData?.wallet_balance || 0;
        if (myBalance < price) { showToast('Недостаточно звёзд!', '#f04747'); if (placeBtn) { placeBtn.disabled = false; placeBtn.textContent = '🔒 Заморозить и заказать'; } return; }
        const newBalance = myBalance - price;
        const newFrozen = (myProfileData?.frozen_balance || 0) + price;
        const { error: balErr } = await _supabase.from('profiles').update({ wallet_balance: newBalance, frozen_balance: newFrozen }).eq('id', myId);
        if (balErr) { showToast('Ошибка списания!', '#f04747'); return; }
        const autoComplete = new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString();
        const { data: order, error: orderErr } = await _supabase.from('orders').insert([{ buyer_id: myId, seller_id: currentRecipientId, buyer_name: myProfileData?.username, seller_name: document.getElementById('currentChatTitle').textContent, post_id: postId, post_title: postTitle, amount: price, status: 'frozen', auto_complete_at: autoComplete }]).select().single();
        if (orderErr) { await _supabase.from('profiles').update({ wallet_balance: myBalance, frozen_balance: myProfileData?.frozen_balance || 0 }).eq('id', myId); showToast('Ошибка создания заказа!', '#f04747'); return; }
        myProfileData.wallet_balance = newBalance;
        myProfileData.frozen_balance = newFrozen;
        await _supabase.from('messages').insert([{ content: `🔒 [ЗАКАЗ #${order.id.slice(0,8)}]\n📦 Услуга: ${postTitle}\n💰 Сумма: ${price} ⭐ (заморожено)\n\nПродавец, подтверди принятие заказа!`, user_id: myId, sender_name: myProfileData?.username, recipient_id: currentRecipientId, room_id: null }]);
        document.getElementById('orderModal').remove();
        showToast(`✅ Заказ оформлен! ${price} ⭐ заморожено`, '#43b581');
        showConfirmOrderBtn(order.id, price);
        if (placeBtn) { placeBtn.disabled = false; placeBtn.textContent = '🔒 Заморозить и заказать'; }
    }

    async function submitReview(orderId, sellerId) {
        const selected = document.querySelectorAll('#starRow span.selected').length;
        if (!selected) return showToast('Выберите оценку!', '#f04747');
        const comment = document.getElementById('reviewComment').value.trim();

    async function toggleAdminRole(userId, userName, currentRole) {

        if (!confirm(`${isAdmin?'Снять роль админа у':'Назначить админом'} ${userName}?`)) return;
        const { error } = await _supabase.from('room_members').update({ role: newRole }).eq('room_id', currentRoomId).eq('user_id', userId);
        if (error) { showToast('Ошибка!', '#f04747'); return; }
        await _supabase.from('messages').insert([{ content: isAdmin ? `⬇ ${userName} больше не администратор` : `⚡ ${userName} назначен администратором`, user_id: myId, sender_name: 'Система', room_id: currentRoomId, recipient_id: null }]);
        showToast(isAdmin ? `${userName} снят` : `${userName} теперь админ!`, '#5865f2');
        await openMembersPanel();
    }

    async function kickMember(userId, userName) {
        const old = document.getElementById('kickModal');
        if (old) old.remove();
        const overlay = document.createElement('div');
        overlay.id = 'kickModal';
        overlay.className = 'room-modal-overlay';
        overlay.innerHTML = `<div class="room-modal"><div class="room-modal-header"><div><div style="color:white;font-size:17px;font-weight:bold;">🚫 Исключить участника</div><div style="color:#f04747;font-size:13px;margin-top:3px;font-weight:bold;">${userName}</div></div><button onclick="document.getElementById('kickModal').remove()" style="background:none;border:none;color:#72767d;font-size:24px;cursor:pointer;line-height:1;">×</button></div><div class="room-modal-body"><div style="background:#40444b;border-radius:10px;padding:14px;color:#dcddde;font-size:13px;line-height:1.6;">Участник <strong style="color:white">${userName}</strong> будет исключён из группы.</div><button class="room-modal-btn" style="background:#f04747;color:white;" onclick="confirmKickMember('${userId}','${escapeAttr(userName)}')">🚫 Да, исключить</button><button class="room-modal-btn" style="background:#40444b;color:#b9bbbe;" onclick="document.getElementById('kickModal').remove()">Отмена</button></div></div>`;
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
    }

    async function confirmKickMember(userId, userName) {
        document.getElementById('kickModal')?.remove();
        const { error } = await _supabase.from('room_members').delete().eq('room_id', currentRoomId).eq('user_id', userId);
        if (error) { showToast('Ошибка при исключении!', '#f04747'); return; }
        await _supabase.from('messages').insert([{ content: `🚫 ${userName} был исключён из группы`, user_id: myId, sender_name: 'Система', room_id: currentRoomId, recipient_id: null }]);
        showToast(`${userName} исключён`, '#f04747');
        await openMembersPanel();
    }

    async function openAddMemberFromPanel() {
        if (currentRoomRole !== 'owner' && currentRoomRole !== 'admin') { showToast('Недостаточно прав!', '#f04747'); return; }
        const memberIds = new Set(membersPanelData.map(m => m.user_id));
        const { data: allUsers } = await _supabase.from('profiles').select('id,username,avatar_url').neq('id', myId);
        const available = allUsers?.filter(u => !memberIds.has(u.id)) || [];
        const old = document.getElementById('addMemberPicker');
        if (old) { old.remove(); return; }
        const picker = document.createElement('div');
        picker.id = 'addMemberPicker';
        picker.style.cssText = 'position:absolute;bottom:70px;left:10px;right:10px;background:#36393f;border-radius:12px;border:1px solid #40444b;max-height:250px;overflow-y:auto;z-index:100;box-shadow:0 -5px 20px rgba(0,0,0,0.4);';
        picker.innerHTML = available.length ? available.map(u => {
            const name = u.username ? `@${u.username}` : 'Аноним';
            const letter = (u.username?.[0]||'?').toUpperCase();
            const av = u.avatar_url ? `background-image:url(${u.avatar_url});background-size:cover;` : `background:#5865f2;`;
            return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:0.2s;" onmouseover="this.style.background='#40444b'" onmouseout="this.style.background=''" onclick="quickAddMember('${u.id}','${escapeAttr(name)}',this.parentElement)"><div style="width:30px;height:30px;border-radius:50%;flex-shrink:0;${av}display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:12px;">${!u.avatar_url?letter:''}</div><span style="color:white;font-size:13px;">${name}</span></div>`;
        }).join('') : '<div style="color:#72767d;text-align:center;padding:15px;font-size:13px;">Все уже добавлены</div>';
        document.getElementById('membersPanel').appendChild(picker);
        setTimeout(() => document.addEventListener('click', closePicker), 100);
    }

    function closePicker(e) { const picker = document.getElementById('addMemberPicker'); if (picker && !picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', closePicker); } }

    async function openConfirmOrderModal() {
        const { data: orders } = await _supabase.from('orders').select('*').eq('buyer_id', myId).eq('seller_id', currentRecipientId).in('status', ['frozen','in_progress']).order('created_at', { ascending: false }).limit(1);
        if (!orders?.length) { showToast('Нет активных заказов с этим продавцом', '#f0a500'); return; }
        const order = orders[0];
        const amount = order.amount;
        const old = document.getElementById('confirmOrderModal');
        if (old) old.remove();
        const modal = document.createElement('div');
        modal.id = 'confirmOrderModal';
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;';
        modal.innerHTML = `<div style="background:#2c2f33;border-radius:20px;width:420px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid #40444b;text-align:center;"><div style="font-size:48px;margin-bottom:12px;">✅</div><h2 style="color:white;font-size:20px;font-weight:900;margin-bottom:8px;">Подтвердить выполнение?</h2><p style="color:#b9bbbe;font-size:15px;margin-bottom:6px;"><span style="color:#eab308;font-weight:900;">${amount} ⭐</span> будут переведены продавцу</p><p style="color:#72767d;font-size:12px;margin-bottom:28px;">У вас есть 10 дней для подтверждения</p><div style="display:flex;gap:12px;"><button onclick="document.getElementById('confirmOrderModal').remove()" style="flex:1;background:#40444b;color:#b9bbbe;border:none;border-radius:12px;padding:14px;cursor:pointer;font-size:14px;font-weight:bold;">Отмена</button><button id="doConfirmOrderBtn" onclick="doConfirmOrder('${order.id}',${amount})" style="flex:2;background:linear-gradient(135deg,#43b581,#2d8a5e);color:white;border:none;border-radius:12px;padding:14px;cursor:pointer;font-weight:900;font-size:15px;">✅ Подтвердить</button></div></div>`;
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
        document.body.appendChild(modal);
    }

    async function doConfirmOrder(orderId, amount) {
        const btn = document.getElementById('doConfirmOrderBtn');
        if (btn) { btn.disabled = true; btn.textContent = 'Обработка...'; }
        const { data: order } = await _supabase.from('orders').select('*').eq('id', orderId).single();
        if (!order) { showToast('Заказ не найден!', '#f04747'); return; }
        const { data: buyer } = await _supabase.from('profiles').select('frozen_balance').eq('id', myId).single();
        await _supabase.from('profiles').update({ frozen_balance: Math.max(0, (buyer?.frozen_balance||0) - amount) }).eq('id', myId);
        const { data: seller } = await _supabase.from('profiles').select('wallet_balance').eq('id', order.seller_id).single();
        await _supabase.from('profiles').update({ wallet_balance: (seller?.wallet_balance||0) + amount }).eq('id', order.seller_id);
        await _supabase.from('orders').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', orderId);
        await _supabase.from('messages').insert([{ content: `✅ Заказ выполнен! ${amount} ⭐ отправлено продавцу.`, user_id: myId, sender_name: myProfileData?.username, recipient_id: order.seller_id, room_id: null }]);
        document.getElementById('confirmOrderModal')?.remove();
        showToast(`✅ ${amount} ⭐ успешно отправлено продавцу!`, '#43b581');
        openReviewModal(orderId, order.seller_id, amount);
    }

    async function confirmOrder(orderId, amount, btn) {
        if (!confirm(`Подтвердить получение работы и отправить ${amount} ⭐ продавцу?`)) return;
        btn.disabled = true; btn.textContent = 'Обработка...';
        const { data: order } = await _supabase.from('orders').select('*').eq('id', orderId).single();
        if (!order) return showToast('Заказ не найден!', '#f04747');
        const { data: buyer } = await _supabase.from('profiles').select('frozen_balance').eq('id', myId).single();
        await _supabase.from('profiles').update({ frozen_balance: Math.max(0, (buyer?.frozen_balance||0) - amount) }).eq('id', myId);
        const { data: seller } = await _supabase.from('profiles').select('wallet_balance').eq('id', order.seller_id).single();
        await _supabase.from('profiles').update({ wallet_balance: (seller?.wallet_balance||0) + amount }).eq('id', order.seller_id);
        await _supabase.from('orders').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', orderId);
        await _supabase.from('messages').insert([{ content: `✅ Заказ выполнен! ${amount} ⭐ отправлено продавцу.`, user_id: myId, sender_name: myProfileData?.username, recipient_id: order.seller_id, room_id: null }]);
        btn.parentElement.remove();
        showToast(`✅ ${amount} ⭐ отправлено продавцу!`, '#43b581');
        openReviewModal(orderId, order.seller_id, amount);
    }

    function openReviewModal(orderId, sellerId, amount) {
        const old = document.getElementById('reviewModal');
        if (old) old.remove();
        const modal = document.createElement('div');
        modal.id = 'reviewModal';
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;';
        modal.innerHTML = `<div style="background:#2c2f33;border-radius:20px;width:420px;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,0.6);border:1px solid #40444b;"><div style="text-align:center;margin-bottom:20px;"><div style="font-size:40px;">⭐</div><h2 style="color:white;font-size:20px;margin-top:8px;">Оцените продавца</h2><p style="color:#72767d;font-size:13px;margin-top:5px;">Ваш отзыв поможет другим покупателям</p></div><div id="starRow" style="display:flex;justify-content:center;gap:10px;margin-bottom:20px;">${[1,2,3,4,5].map(i=>`<span data-star="${i}" style="font-size:40px;cursor:pointer;transition:transform 0.15s;filter:grayscale(1);" onmouseover="hoverStars(${i})" onmouseout="resetStars()" onclick="selectStar(${i})">★</span>`).join('')}</div><div id="ratingLabel" style="text-align:center;color:#eab308;font-size:14px;font-weight:bold;margin-bottom:15px;min-height:20px;"></div><textarea id="reviewComment" placeholder="Напишите отзыв (необязательно)..." style="width:100%;padding:14px;border-radius:12px;border:none;background:#36393f;color:white;font-size:14px;outline:none;resize:none;height:90px;font-family:inherit;margin-bottom:20px;"></textarea><div style="display:flex;gap:10px;"><button onclick="document.getElementById('reviewModal').remove()" style="flex:1;background:#40444b;color:#b9bbbe;border:none;border-radius:12px;padding:13px;cursor:pointer;font-size:14px;">Пропустить</button><button id="submitReviewBtn" onclick="submitReview('${orderId}','${sellerId}')" style="flex:2;background:linear-gradient(135deg,#eab308,#f59e0b);color:black;border:none;border-radius:12px;padding:13px;cursor:pointer;font-weight:900;font-size:15px;">Отправить оценку</button></div></div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    const ratingLabels = ['','Ужасно 😤','Плохо 😕','Нормально 😐','Хорошо 😊','Отлично! 🔥'];
    function hoverStars(n) { document.querySelectorAll('#starRow span').forEach(s => { const v=parseInt(s.dataset.star); s.style.filter=v<=n?'grayscale(0)':'grayscale(1)'; s.style.transform=v<=n?'scale(1.2)':'scale(1)'; s.style.color=v<=n?'#eab308':''; }); document.getElementById('ratingLabel').textContent=ratingLabels[n]; }
    function resetStars() { const sel=parseInt(document.querySelector('#starRow span.selected')?.dataset.star||0); document.querySelectorAll('#starRow span').forEach(s=>{const v=parseInt(s.dataset.star);s.style.filter=v<=sel?'grayscale(0)':'grayscale(1)';s.style.transform='scale(1)';s.style.color=v<=sel?'#eab308':'';});document.getElementById('ratingLabel').textContent=sel?ratingLabels[sel]:''; }
    function selectStar(n) { document.querySelectorAll('#starRow span').forEach(s=>{s.classList.remove('selected');const v=parseInt(s.dataset.star);if(v<=n)s.classList.add('selected');s.style.filter=v<=n?'grayscale(0)':'grayscale(1)';s.style.color=v<=n?'#eab308':'';});document.getElementById('ratingLabel').textContent=ratingLabels[n]; }

    async function quickAddMember(userId, userName, pickerEl) {
        const { error } = await _supabase.from('room_members').insert([{ room_id: currentRoomId, user_id: userId, role: 'member', added_by: myId }]);
        if (error) { showToast('Ошибка!', '#f04747'); return; }
        pickerEl?.remove();
        document.removeEventListener('click', closePicker);
        await _supabase.from('messages').insert([{ content: `👋 ${userName} добавлен в группу`, user_id: myId, sender_name: 'Система', room_id: currentRoomId, recipient_id: null }]);
        showToast(`${userName} добавлен!`, '#43b581');
        await openMembersPanel();
    }

    function updateMyPresence(isOnline) {
        const dot = document.getElementById('my-sdot');
        const txt = document.getElementById('my-status-txt');
        if (isOnline) { dot.className='sdot online'; txt.textContent='В сети'; txt.style.color='#43b581'; }
        else { dot.className='sdot offline'; txt.textContent='Не в сети'; txt.style.color='#747f8d'; }
    }
    window.addEventListener('focus', () => updateMyPresence(true));
    window.addEventListener('blur',  () => updateMyPresence(false));
    document.addEventListener('visibilitychange', () => updateMyPresence(document.visibilityState === 'visible'));

    function setPartnerStatus(isOnline) {
        const container = document.getElementById('partnerStatus');
        const dot = document.getElementById('partner-sdot');
        const txt = document.getElementById('partner-status-txt');
        container.style.visibility = 'visible';
        if (isOnline) { dot.className='sdot online'; txt.textContent='в сети'; }
        else { dot.className='sdot offline'; txt.textContent='был(а) недавно'; }
    }

    // ========== МОБИЛЬНАЯ НАВИГАЦИЯ ==========
    function isMobile() { return window.innerWidth <= 768; }

    function mobileShowChat() {
        if (!isMobile()) return;
        document.querySelector('.sidebar').classList.add('hidden-mobile');
        document.querySelector('.main-chat').classList.add('visible-mobile');
    }

    function mobileShowSidebar() {
        if (!isMobile()) return;
        document.querySelector('.sidebar').classList.remove('hidden-mobile');
        document.querySelector('.main-chat').classList.remove('visible-mobile');
    }

    // При клике на любой элемент списка (чат/комната) — переходим в чат на мобиле
    document.addEventListener('click', function(e) {
        const item = e.target.closest('#userList .item, #roomList .item');
        if (item && isMobile()) {
            setTimeout(mobileShowChat, 80);
        }
    });

    // Фикс высоты при появлении клавиатуры (iOS/Android)
    function fixMobileHeight() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.getElementById('chat-window').style.height = vh + 'px';
    }
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', fixMobileHeight);
    }
    window.addEventListener('resize', fixMobileHeight);
    fixMobileHeight();

    // При открытии/закрытии панели участников на мобиле — добавляем класс open
    const _origToggleMembers = window.toggleMembersPanel;
    if (typeof toggleMembersPanel === 'function') {
        const __orig = toggleMembersPanel;
        window.toggleMembersPanel = function() {
            __orig();
            if (isMobile()) {
                const panel = document.getElementById('membersPanel');
                panel.classList.toggle('open');
            }
        };
    }
    // =========================================

    const chatBadge = document.getElementById('chatBadge');
    let unreadCount = parseInt(localStorage.getItem('chat_unread') || '0');
    function setUnread(n) {
        unreadCount = Math.max(0, n);
        localStorage.setItem('chat_unread', unreadCount);
        chatBadge.textContent = unreadCount > 99 ? '99+' : unreadCount;
        chatBadge.classList.toggle('hidden', unreadCount === 0);
    }
    document.getElementById('chat-widget-button').addEventListener('click', () => setUnread(0));
    setUnread(unreadCount);
</script>

</body>
</html>
