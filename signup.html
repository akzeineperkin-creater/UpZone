
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upzone — Регистрация</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { min-height: 100%; height: 100%; }

    body {
      background: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      color: #f5f5f0;
      display: flex;
      align-items: stretch;
      overflow-x: hidden;
      overflow-y: auto;
      cursor: crosshair;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .container {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* brand side */
    .brand-side {
      width: 420px;
      flex-shrink: 0;
      background: #0d0d0d;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    .brand-side::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #e8ff00;
      clip-path: polygon(0 60%, 100% 40%, 100% 100%, 0 100%);
    }

    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      color: #f5f5f0;
      text-decoration: none;
      position: relative;
      z-index: 1;
    }

    .brand-tagline {
      position: relative;
      z-index: 1;
    }

    .brand-tagline h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      line-height: 0.9;
      letter-spacing: -1px;
      color: #f5f5f0;
      margin-bottom: 16px;
    }

    .brand-tagline p {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* stats strip */
    .brand-stats {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    .bstat {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .bstat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: #e8ff00;
      line-height: 1;
    }

    .bstat-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* form side */
    .form-side {
      flex: 1;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 72px;
    }

    .form-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888880;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      letter-spacing: 1px;
      color: #f5f5f0;
      margin-bottom: 40px;
      line-height: 1;
    }

    h1 span { color: #e8ff00; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888880;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 0;
      color: #f5f5f0;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #e8ff00;
    }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background: #e8ff00;
      border: none;
      border-radius: 0;
      color: #0d0d0d;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: crosshair;
      transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
      min-height: 52px;
      -webkit-appearance: none;
      margin-top: 8px;
    }
    button[type="submit"]:hover {
      background: #c8f000;
      transform: translate(-2px, -2px);
      box-shadow: 2px 2px 0 #e8ff00;
    }
    button[type="submit"]:active { transform: translate(0,0); box-shadow: none; }

    .toggle-auth {
      margin-top: 28px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #888880;
    }

    .toggle-auth a {
      color: #e8ff00;
      text-decoration: none;
      border-bottom: 1px solid rgba(232,255,0,0.3);
      transition: border-color 0.15s;
    }
    .toggle-auth a:hover { border-color: #e8ff00; }

    /* agree line */
    .agree-line {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .agree-line input[type="checkbox"] {
      width: 16px;
      height: 16px;
      min-width: 16px;
      accent-color: #e8ff00;
      cursor: crosshair;
      margin-top: 2px;
    }

    .agree-line span {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      color: #888880;
      line-height: 1.7;
    }

    .agree-line a {
      color: #e8ff00;
      text-decoration: none;
      border-bottom: 1px solid rgba(232,255,0,0.3);
    }

    /* responsive */
    @media (max-width: 900px) {
      .brand-side { display: none; }
      .form-side { padding: 48px 28px; }
    }

    @media (max-width: 480px) {
      .form-side { padding: 40px 20px 48px; justify-content: flex-start; padding-top: 60px; }
      h1 { font-size: 44px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Brand side -->
  <div class="brand-side">
    <a href="landing.html" class="brand-logo">UPZONE</a>

    <div class="brand-tagline">
      <h2>СОЗДАЙ<br>АККАУНТ</h2>
      <p>— Начни зарабатывать сегодня</p>
    </div>

    <div class="brand-stats">
      <div class="bstat">
        <span class="bstat-num">2.4К+</span>
        <span class="bstat-label">Активных пользователей</span>
      </div>
      <div class="bstat">
        <span class="bstat-num">840+</span>
        <span class="bstat-label">Проектов запущено</span>
      </div>
      <div class="bstat">
        <span class="bstat-num">92%</span>
        <span class="bstat-label">Довольных участников</span>
      </div>
    </div>
  </div>

  <!-- Form side -->
  <div class="form-side">
    <div class="form-eyebrow">— Регистрация</div>
    <h1>НОВЫЙ <span>АККАУНТ</span></h1>

    <form id="signupForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="yourname" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="example@gmail.com" required>
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <div class="agree-line">
        <input type="checkbox" required>
        <span>Я принимаю <a href="#">условия использования</a> и <a href="#">политику конфиденциальности</a></span>
      </div>

      <button type="submit">Создать аккаунт →</button>
    </form>

    <div class="toggle-auth">
      Уже есть аккаунт? &nbsp;<a href="signin.html">Войти</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = 'https://dvwegmdyhjyihrxqvoiw.supabase.co';
  const supabaseKey = 'sb_publishable_hDqX9KkG5m38yourV2K43w_PYB7ktXI';
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const usernameValue = e.target.querySelector('input[placeholder="yourname"]').value;
    const emailValue    = e.target.querySelector('input[type="email"]').value;
    const passwordValue = e.target.querySelector('input[type="password"]').value;

    const { data, error: authError } = await supabaseClient.auth.signUp({
      email: emailValue,
      password: passwordValue,
      options: { data: { username: usernameValue } }
    });

    if (authError) { return alert('Ошибка регистрации: ' + authError.message); }

    if (data.user) {
      const { error: profileError } = await supabaseClient
        .from('profiles')
        .upsert([{ id: data.user.id, username: usernameValue, email: emailValue }]);

      if (profileError) {
        console.error("Ошибка записи в таблицу profiles:", profileError.message);
        alert("Аккаунт создан, но данные профиля не сохранились. Проверьте RLS!");
      } else {
        alert('Регистрация успешна!');
        window.location.href = 'index.html';
      }
    }
  });
</script>

</body>
</html>
