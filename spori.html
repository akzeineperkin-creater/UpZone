<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pro Media | Модератор</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#1a1c1e; color:white; min-height:100vh; }

        .header {
            background:#23272a; padding:20px 30px;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:1px solid #40444b;
        }
        .header h1 { font-size:22px; color:white; }
        .stats { display:flex; gap:20px; }
        .stat {
            background:#2c2f33; border-radius:10px; padding:10px 20px;
            text-align:center; border:1px solid #40444b;
        }
        .stat-num { font-size:24px; font-weight:900; color:#eab308; }
        .stat-label { font-size:11px; color:#72767d; margin-top:2px; }

        .tabs {
            display:flex; gap:0; background:#23272a;
            border-bottom:1px solid #40444b; padding:0 30px;
        }
        .tab {
            padding:14px 24px; cursor:pointer; color:#72767d;
            font-weight:bold; font-size:14px; border-bottom:3px solid transparent;
            transition:0.2s;
        }
        .tab:hover { color:white; }
        .tab.active { color:white; border-bottom-color:#f04747; }

        .content { padding:30px; }

        .dispute-card {
            background:#23272a; border-radius:16px;
            border:1px solid #40444b; margin-bottom:16px;
            overflow:hidden; transition:0.2s;
        }
        .dispute-card:hover { border-color:#5865f2; }

        .dispute-header {
            padding:18px 24px; display:flex;
            justify-content:space-between; align-items:center;
            border-bottom:1px solid #40444b; cursor:pointer;
        }
        .dispute-body { padding:20px 24px; display:none; }
        .dispute-body.open { display:block; }

        .badge {
            padding:4px 12px; border-radius:20px;
            font-size:12px; font-weight:bold;
        }
        .badge-dispute { background:#f04747; color:white; }
        .badge-frozen { background:#eab308; color:black; }
        .badge-completed { background:#43b581; color:white; }
        .badge-refunded { background:#5865f2; color:white; }

        .info-grid {
            display:grid; grid-template-columns:1fr 1fr;
            gap:12px; margin-bottom:16px;
        }
        .info-box {
            background:#2c2f33; border-radius:10px;
            padding:14px; border:1px solid #40444b;
        }
        .info-box label { font-size:11px; color:#72767d; text-transform:uppercase; }
        .info-box p { font-size:14px; color:white; margin-top:4px; font-weight:bold; }

        .dispute-reason {
            background:#3a1f1f; border:1px solid #f04747;
            border-radius:10px; padding:14px; margin-bottom:16px;
        }
        .dispute-reason label { font-size:11px; color:#f04747; text-transform:uppercase; }
        .dispute-reason p { font-size:14px; color:#ffcdd2; margin-top:4px; }

        .action-btns { display:flex; gap:10px; }
        .btn {
            flex:1; padding:13px; border:none; border-radius:10px;
            font-size:14px; font-weight:bold; cursor:pointer; transition:0.2s;
        }
        .btn:hover { filter:brightness(1.1); transform:translateY(-1px); }
        .btn-buyer { background:linear-gradient(135deg,#5865f2,#7289da); color:white; }
        .btn-seller { background:linear-gradient(135deg,#43b581,#2d8a5e); color:white; }
        .btn-refund { background:linear-gradient(135deg,#f04747,#c0392b); color:white; }

        .empty {
            text-align:center; padding:60px 20px;
            color:#72767d; font-size:15px;
        }
        .empty span { font-size:40px; display:block; margin-bottom:12px; }

        .login-screen {
            display:flex; align-items:center; justify-content:center;
            min-height:100vh; background:#1a1c1e;
        }
        .login-box {
            background:#23272a; border-radius:20px; padding:40px;
            width:380px; border:1px solid #40444b;
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .login-box h2 { color:white; font-size:22px; margin-bottom:6px; }
        .login-box p { color:#72767d; font-size:13px; margin-bottom:24px; }
        .login-input {
            width:100%; padding:13px 16px; border-radius:10px;
            border:none; background:#36393f; color:white;
            font-size:14px; outline:none; margin-bottom:12px;
        }
        .login-btn {
            width:100%; padding:13px; border:none; border-radius:10px;
            background:linear-gradient(135deg,#5865f2,#7289da);
            color:white; font-size:15px; font-weight:bold;
            cursor:pointer; transition:0.2s;
        }
        .login-btn:hover { filter:brightness(1.1); }

        .toast {
            position:fixed; bottom:30px; right:30px;
            background:#43b581; color:white; padding:12px 24px;
            border-radius:10px; font-size:14px; z-index:9999;
            opacity:0; transition:opacity 0.3s; pointer-events:none;
        }
        .toast.show { opacity:1; }

        .messages-preview {
            max-height:200px; overflow-y:auto;
            background:#2c2f33; border-radius:10px;
            padding:12px; margin-bottom:16px;
            border:1px solid #40444b;
        }
        .msg-item {
            padding:6px 0; border-bottom:1px solid #40444b;
            font-size:12px; color:#b9bbbe;
        }
        .msg-item:last-child { border-bottom:none; }
        .msg-item strong { color:white; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Экран входа -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h2>🛡 Панель модератора</h2>
        <p>Введите пароль для доступа</p>
        <input type="password" id="adminPassword" class="login-input" placeholder="Пароль...">
        <button class="login-btn" onclick="checkPassword()">Войти</button>
    </div>
</div>

<!-- Основная панель -->
<div id="adminPanel" style="display:none;">
    <div class="header">
        <h1>🛡 Панель модератора</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="countDisputes">0</div>
                <div class="stat-label">Споры</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="countFrozen">0</div>
                <div class="stat-label">Заморожено ⭐</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="countTotal">0</div>
                <div class="stat-label">Всего заказов</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('disputes', this)">⚠️ Споры</div>
        <div class="tab" onclick="switchTab('all', this)">📋 Все заказы</div>
        <div class="tab" onclick="switchTab('frozen', this)">🔒 Замороженные</div>
    </div>

    <div class="content" id="mainContent"></div>
</div>

<script>
    const SUPABASE_URL = 'https://dvwegmdyhjyihrxqvoiw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2d2VnbWR5aGp5aWhyeHF2b2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0MDYwOTAsImV4cCI6MjA4Mzk4MjA5MH0.HrG5GijHH4Lj7mO3SorbG0kKfnl5FLtSCWp6aONYxJ8';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ← СЮДА ВСТАВЬ СВОЙ ПАРОЛЬ
    const ADMIN_PASSWORD = 'MyP@nel_2026!';

    let currentTab = 'disputes';

    let toastTimer = null;
    function showToast(msg, color = '#43b581') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = color;
        t.classList.add('show');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function checkPassword() {
        const val = document.getElementById('adminPassword').value;
        if (val === ADMIN_PASSWORD) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadStats();
            loadDisputes();
        } else {
            showToast('Неверный пароль!', '#f04747');
        }
    }

    document.getElementById('adminPassword').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkPassword();
    });

    function switchTab(tab, el) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        if (tab === 'disputes') loadDisputes();
        else if (tab === 'all') loadAllOrders();
        else if (tab === 'frozen') loadFrozenOrders();
    }

    async function loadStats() {
        const { data: disputes } = await _supabase
            .from('orders').select('id').eq('status', 'dispute');
        const { data: frozen } = await _supabase
            .from('orders').select('amount').eq('status', 'frozen');
        const { data: all } = await _supabase
            .from('orders').select('id');

        document.getElementById('countDisputes').textContent = disputes?.length || 0;
        document.getElementById('countFrozen').textContent =
            (frozen?.reduce((s, o) => s + o.amount, 0) || 0) + ' ⭐';
        document.getElementById('countTotal').textContent = all?.length || 0;
    }

    async function loadDisputes() {
        const content = document.getElementById('mainContent');
        content.innerHTML = '<div style="color:#72767d;text-align:center;padding:30px;">Загрузка...</div>';

        const { data: orders } = await _supabase
            .from('orders')
            .select('*')
            .eq('status', 'dispute')
            .order('created_at', { ascending: false });

        renderOrders(orders, true);
    }

    async function loadAllOrders() {
        const content = document.getElementById('mainContent');
        content.innerHTML = '<div style="color:#72767d;text-align:center;padding:30px;">Загрузка...</div>';

        const { data: orders } = await _supabase
            .from('orders')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(50);

        renderOrders(orders, false);
    }

    async function loadFrozenOrders() {
        const content = document.getElementById('mainContent');
        content.innerHTML = '<div style="color:#72767d;text-align:center;padding:30px;">Загрузка...</div>';

        const { data: orders } = await _supabase
            .from('orders')
            .select('*')
            .eq('status', 'frozen')
            .order('created_at', { ascending: false });

        renderOrders(orders, false);
    }

    function renderOrders(orders, isDispute) {
        const content = document.getElementById('mainContent');

        if (!orders?.length) {
            content.innerHTML = `<div class="empty"><span>${isDispute ? '✅' : '📋'}</span>${isDispute ? 'Активных споров нет' : 'Заказов нет'}</div>`;
            return;
        }

        const statusBadge = {
            dispute:     '<span class="badge badge-dispute">⚠️ Спор</span>',
            frozen:      '<span class="badge badge-frozen">🔒 Заморожен</span>',
            completed:   '<span class="badge badge-completed">✅ Выполнен</span>',
            refunded:    '<span class="badge badge-refunded">↩ Возврат</span>',
            in_progress: '<span class="badge" style="background:#5865f2;color:white;">🔄 В работе</span>',
            cancelled:   '<span class="badge" style="background:#4f545c;color:white;">❌ Отменён</span>',
        };

        content.innerHTML = orders.map(order => `
            <div class="dispute-card">
                <div class="dispute-header" onclick="toggleCard('${order.id}')">
                    <div>
                        <div style="font-size:15px;font-weight:bold;color:white;">
                            #${order.id.slice(0,8)} — ${order.post_title || 'Услуга'}
                        </div>
                        <div style="font-size:12px;color:#72767d;margin-top:4px;">
                            ${new Date(order.created_at).toLocaleString('ru-RU')}
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span style="color:#eab308;font-weight:900;font-size:16px;">${order.amount} ⭐</span>
                        ${statusBadge[order.status] || ''}
                    </div>
                </div>
                <div class="dispute-body" id="body-${order.id}">
                    <div class="info-grid">
                        <div class="info-box">
                            <label>👤 Покупатель</label>
                            <p>@${order.buyer_name || 'неизвестно'}</p>
                        </div>
                        <div class="info-box">
                            <label>🏪 Продавец</label>
                            <p>@${order.seller_name || 'неизвестно'}</p>
                        </div>
                        <div class="info-box">
                            <label>💰 Сумма</label>
                            <p>${order.amount} ⭐</p>
                        </div>
                        <div class="info-box">
                            <label>📅 Дедлайн</label>
                            <p>${order.deadline_at ? new Date(order.deadline_at).toLocaleDateString('ru-RU') : 'Не указан'}</p>
                        </div>
                    </div>

                    ${order.dispute_reason ? `
                    <div class="dispute-reason">
                        <label>⚠️ Причина спора</label>
                        <p>${order.dispute_reason}</p>
                    </div>` : ''}

                    ${order.status === 'dispute' ? `
                    <div class="action-btns">
                        <button class="btn btn-buyer" onclick="resolveDispute('${order.id}', 'buyer', ${order.amount}, '${order.buyer_id}', '${order.seller_id}')">
                            👤 В пользу покупателя (вернуть ⭐)
                        </button>
                        <button class="btn btn-seller" onclick="resolveDispute('${order.id}', 'seller', ${order.amount}, '${order.buyer_id}', '${order.seller_id}')">
                            🏪 В пользу продавца (перевести ⭐)
                        </button>
                    </div>` : ''}

                    ${order.status === 'frozen' ? `
                    <div class="action-btns">
                        <button class="btn btn-refund" onclick="forceRefund('${order.id}', ${order.amount}, '${order.buyer_id}')">
                            ↩ Принудительный возврат покупателю
                        </button>
                    </div>` : ''}
                </div>
            </div>
        `).join('');
    }

    function toggleCard(id) {
        const body = document.getElementById('body-' + id);
        body.classList.toggle('open');
    }

    async function resolveDispute(orderId, winner, amount, buyerId, sellerId) {
        const side = winner === 'buyer' ? 'покупателя' : 'продавца';
        if (!confirm(`Решить спор в пользу ${side}?`)) return;

        if (winner === 'buyer') {
            // Возвращаем звёзды покупателю
            const { data: buyer } = await _supabase.from('profiles')
                .select('wallet_balance, frozen_balance').eq('id', buyerId).single();
            await _supabase.from('profiles').update({
                wallet_balance: (buyer?.wallet_balance || 0) + amount,
                frozen_balance: Math.max(0, (buyer?.frozen_balance || 0) - amount)
            }).eq('id', buyerId);

            // Уведомляем обоих
            await _supabase.from('messages').insert([
                {
                    content: `✅ Модератор решил спор в вашу пользу!\n💫 ${amount} ⭐ возвращено на ваш баланс.`,
                    user_id: buyerId, sender_name: '🛡 Модератор',
                    recipient_id: buyerId, room_id: null
                },
                {
                    content: `❌ Модератор решил спор в пользу покупателя.\n💫 ${amount} ⭐ возвращено покупателю.`,
                    user_id: buyerId, sender_name: '🛡 Модератор',
                    recipient_id: sellerId, room_id: null
                }
            ]);

        } else {
            // Переводим звёзды продавцу
            const { data: buyer } = await _supabase.from('profiles')
                .select('frozen_balance').eq('id', buyerId).single();
            await _supabase.from('profiles').update({
                frozen_balance: Math.max(0, (buyer?.frozen_balance || 0) - amount)
            }).eq('id', buyerId);

            const { data: seller } = await _supabase.from('profiles')
                .select('wallet_balance').eq('id', sellerId).single();
            await _supabase.from('profiles').update({
                wallet_balance: (seller?.wallet_balance || 0) + amount
            }).eq('id', sellerId);

            await _supabase.from('messages').insert([
                {
                    content: `✅ Модератор решил спор в вашу пользу!\n💫 ${amount} ⭐ зачислено на ваш баланс.`,
                    user_id: sellerId, sender_name: '🛡 Модератор',
                    recipient_id: sellerId, room_id: null
                },
                {
                    content: `❌ Модератор решил спор в пользу продавца.\n💫 ${amount} ⭐ переведено продавцу.`,
                    user_id: buyerId, sender_name: '🛡 Модератор',
                    recipient_id: buyerId, room_id: null
                }
            ]);
        }

        await _supabase.from('orders').update({
            status: 'completed',
            completed_at: new Date().toISOString()
        }).eq('id', orderId);

        showToast(`✅ Спор решён в пользу ${side}!`, '#43b581');
        loadStats();
        loadDisputes();
    }

    async function forceRefund(orderId, amount, buyerId) {
        if (!confirm(`Принудительно вернуть ${amount} ⭐ покупателю?`)) return;

        const { data: buyer } = await _supabase.from('profiles')
            .select('wallet_balance, frozen_balance').eq('id', buyerId).single();
        await _supabase.from('profiles').update({
            wallet_balance: (buyer?.wallet_balance || 0) + amount,
            frozen_balance: Math.max(0, (buyer?.frozen_balance || 0) - amount)
        }).eq('id', buyerId);

        await _supabase.from('orders').update({ status: 'refunded' }).eq('id', orderId);

        await _supabase.from('messages').insert([{
            content: `↩ Модератор вернул ${amount} ⭐ на ваш баланс.`,
            user_id: buyerId, sender_name: '🛡 Модератор',
            recipient_id: buyerId, room_id: null
        }]);

        showToast('↩ Возврат выполнен!', '#5865f2');
        loadStats();
        loadFrozenOrders();
    }
</script>
</body>
</html>
