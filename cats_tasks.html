
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Python с Котиком 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1b2e; --bg2: #222340; --bg3: #2c2f55;
  --card: #1e2038; --border: #33365a;
  --text: #c9d1f0; --text2: #6b72a8;
  --accent: #f9a825; --blue: #4fc3f7;
  --purple: #ce93d8; --green: #69f0ae; --red: #ff5252;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg); min-height:100vh;
  font-family:'Nunito',sans-serif; color:var(--text);
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:60px; overflow-x:hidden;
}

/* TOP BAR */
.topbar { width:100%; max-width:520px; padding:22px 20px 0; display:flex; align-items:center; justify-content:space-between; }
.progress-dots { display:flex; gap:9px; }
.dot { width:13px; height:13px; border-radius:50%; background:var(--bg3); border:2px solid var(--border); transition:all .35s cubic-bezier(.34,1.56,.64,1); }
.dot.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 10px var(--accent); transform:scale(1.2); }
.dot.done { background:var(--green); border-color:var(--green); }
.level-badge { font-size:13px; font-weight:700; color:var(--text2); }

/* MASCOT */
.mascot-row { display:flex; align-items:flex-start; gap:14px; max-width:520px; width:100%; padding:18px 20px 0; }
.mascot-wrap { width:92px; flex-shrink:0; position:relative; }
.cat-img-wrap {
  width:92px; height:92px; border-radius:50%;
  background: radial-gradient(circle at 40% 35%, #2e3060, #1a1b2e);
  border:3px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  overflow:hidden; display:flex; align-items:center; justify-content:center;
  position:relative;
}
.cat-img-wrap img { width:88px; height:88px; object-fit:cover; border-radius:50%; }

/* animations */
@keyframes catIdle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes catBounce {
  0%{transform:translateY(0) rotate(0)} 15%{transform:translateY(-22px) rotate(-9deg)}
  30%{transform:translateY(-8px) rotate(7deg)} 45%{transform:translateY(-18px) rotate(-5deg)}
  60%{transform:translateY(-4px) rotate(3deg)} 80%{transform:translateY(-10px) rotate(-2deg)}
  100%{transform:translateY(0) rotate(0)}
}
@keyframes catSpin {
  0%{transform:scale(1) rotate(0)} 30%{transform:scale(1.3) rotate(180deg)}
  70%{transform:scale(1.1) rotate(360deg)} 100%{transform:scale(1) rotate(360deg)}
}
@keyframes catShake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px) rotate(-4deg)}
  40%{transform:translateX(8px) rotate(4deg)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}
@keyframes heartFloat { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-45px) scale(1.6)} }
@keyframes starFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:var(--tx) scale(.2)} }

.cat-img-wrap.idle img { animation:catIdle 2.5s ease-in-out infinite; }
.cat-img-wrap.celebrate img { animation:catBounce .9s ease; }
.cat-img-wrap.super img { animation:catSpin 1s ease; }
.cat-img-wrap.wrong img { animation:catShake .45s ease; }

.heart-float { position:absolute; font-size:18px; pointer-events:none; animation:heartFloat .85s ease forwards; z-index:10; }
.star-p { position:absolute; font-size:14px; opacity:0; animation:starFly .65s ease forwards; pointer-events:none; }
.stars-burst { position:absolute; top:0; left:0; width:92px; height:92px; pointer-events:none; }

/* SPEECH BUBBLE */
.speech-bubble {
  background:var(--bg2); border:1.5px solid var(--border);
  border-radius:16px; padding:14px 16px; font-size:15px; line-height:1.55;
  flex:1; position:relative; color:var(--text);
}
.speech-bubble::before { content:''; position:absolute; left:-10px; top:22px; border:5px solid transparent; border-right-color:var(--border); }
.speech-bubble::after  { content:''; position:absolute; left:-8px;  top:23px; border:4px solid transparent; border-right-color:var(--bg2); }
.cat-name { font-size:11px; color:var(--text2); font-weight:700; margin-bottom:5px; text-transform:uppercase; letter-spacing:.08em; }
.hl  { color:var(--accent); font-weight:900; }
.hl2 { color:var(--blue); font-weight:800; }

/* EDITOR */
.editor {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:18px; padding:20px 18px;
  max-width:520px; width:calc(100% - 40px);
  margin:16px 0 0; box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.editor-lang { font-family:'Fira Code',monospace; font-size:12px; color:var(--text2); margin-bottom:14px; letter-spacing:.06em; }
.code-lines { display:flex; flex-direction:column; gap:2px; }
.code-line { display:flex; align-items:center; gap:14px; min-height:42px; }
.lnum { font-family:'Fira Code',monospace; font-size:13px; color:#3a3d65; width:14px; text-align:right; flex-shrink:0; user-select:none; }
.lcode { font-family:'Fira Code',monospace; font-size:15px; display:flex; align-items:center; flex-wrap:wrap; gap:3px; }
.t-var{color:var(--text)} .t-kw{color:var(--purple);font-weight:600} .t-num{color:var(--accent)}
.t-fn{color:var(--blue)} .t-str{color:var(--blue)} .t-op{color:var(--text)} .t-ind{display:inline-block;width:22px}

/* SLOTS */
.slot {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:52px; height:34px; background:rgba(0,0,0,.3);
  border:2px dashed #3d4080; border-radius:9px; cursor:pointer;
  font-family:'Fira Code',monospace; font-size:14px; padding:0 10px;
  transition:all .2s; white-space:nowrap;
}
.slot:empty::before { content:'___'; color:#3d4080; font-size:12px; }
.slot.drag-over { border-color:var(--blue); background:rgba(79,195,247,.08); box-shadow:0 0 12px rgba(79,195,247,.35); }
.slot.filled { border-style:solid; border-color:#4a5090; background:rgba(74,80,144,.15); color:var(--text); font-weight:600; }
.slot.correct { border-color:var(--green)!important; background:rgba(105,240,174,.12)!important; animation:slotPop .35s ease; }
.slot.wrong-slot { border-color:var(--red)!important; background:rgba(255,82,82,.1)!important; }
@keyframes slotPop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }

/* TILES */
.tiles-wrap { max-width:520px; width:calc(100% - 40px); margin:18px 0 0; }
.tiles-row { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.tile {
  background:var(--bg2); border:2px solid var(--border); border-radius:12px;
  padding:8px 16px; font-family:'Fira Code',monospace; font-size:15px; font-weight:600;
  cursor:grab; user-select:none; touch-action:none;
  transition:transform .15s, box-shadow .15s, opacity .2s; color:var(--text);
}
.tile:active { cursor:grabbing; }
.tile.kw { color:var(--purple); border-color:#6a2f8a; background:#1a1028; }
.tile.op { color:var(--accent); border-color:#7a4800; background:#1a1008; }
.tile.bl { color:var(--blue); border-color:#1a5070; background:#0a1828; }
.tile.nu { color:var(--accent); border-color:#7a4800; background:#1a1008; }
.tile.dragging { opacity:.3; transform:scale(.92); }
.tile.used { opacity:.18; pointer-events:none; }

/* BUTTONS */
.btns-row { display:flex; gap:12px; max-width:520px; width:calc(100% - 40px); margin:18px 0 0; }
.btn-reset {
  flex:1; padding:14px; background:var(--bg2); border:1.5px solid var(--border);
  border-radius:14px; color:var(--text2); font-family:'Nunito',sans-serif;
  font-weight:700; font-size:15px; cursor:pointer; transition:background .2s;
}
.btn-reset:hover { background:var(--bg3); }
.btn-check {
  flex:1.3; padding:14px; background:var(--bg2); border:1.5px solid #4a5090;
  border-radius:14px; color:var(--text); font-family:'Nunito',sans-serif;
  font-weight:800; font-size:15px; cursor:pointer; transition:background .2s, transform .1s;
}
.btn-check:active { transform:scale(.97); }

/* SUCCESS OVERLAY */
.success-overlay {
  display:none; position:fixed; inset:0; background:rgba(8,9,20,.88);
  z-index:100; flex-direction:column; align-items:center; justify-content:center;
}
.success-overlay.show { display:flex; }
.success-card {
  background:var(--bg2); border:2px solid var(--green); border-radius:24px;
  padding:32px 36px; text-align:center; max-width:320px; width:90%;
  box-shadow:0 0 70px rgba(105,240,174,.2);
  animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes scaleIn { 0%{transform:scale(.55);opacity:0} 100%{transform:scale(1);opacity:1} }
.success-cat-img {
  width:100px; height:100px; border-radius:50%; object-fit:cover;
  border:3px solid var(--green); margin:0 auto 14px; display:block;
  box-shadow:0 0 24px rgba(105,240,174,.35);
  animation:catBounce .9s ease infinite;
}
.success-title { font-size:24px; font-weight:900; color:var(--green); margin-bottom:6px; }
.success-sub   { font-size:14px; color:var(--text2); margin-bottom:22px; }
.btn-next {
  background:linear-gradient(135deg,var(--green),#00c853); border:none; border-radius:14px;
  padding:14px 32px; color:#0a1a0a; font-family:'Nunito',sans-serif;
  font-weight:900; font-size:16px; cursor:pointer;
  box-shadow:0 6px 20px rgba(105,240,174,.3); transition:transform .15s;
}
.btn-next:active { transform:scale(.96); }

/* FINISH */
.finish-overlay {
  display:none; position:fixed; inset:0; background:rgba(8,9,20,.96);
  z-index:300; flex-direction:column; align-items:center; justify-content:center;
}
.finish-overlay.show { display:flex; }
.finish-card {
  background:var(--bg2); border:2px solid var(--accent); border-radius:24px;
  padding:36px; text-align:center; max-width:380px; width:90%;
  box-shadow:0 0 80px rgba(249,168,37,.25);
  animation:scaleIn .5s cubic-bezier(.34,1.56,.64,1);
}
.finish-cats-row { display:flex; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.finish-cat-img { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid var(--border); }
.finish-title { font-size:26px; font-weight:900; color:var(--accent); margin-bottom:8px; }
.finish-sub   { font-size:15px; color:var(--text2); margin-bottom:24px; }
.btn-restart {
  background:linear-gradient(135deg,var(--accent),#e08a00); border:none; border-radius:14px;
  padding:14px 32px; color:#1a0a00; font-family:'Nunito',sans-serif;
  font-weight:900; font-size:16px; cursor:pointer; box-shadow:0 6px 20px rgba(249,168,37,.3);
}

/* confetti */
.confetti-piece {
  position:fixed; border-radius:2px; opacity:0; pointer-events:none; z-index:200;
  animation:confettiFall var(--dur) ease forwards var(--delay);
}
@keyframes confettiFall {
  0%{opacity:1;transform:translate(var(--tx0),0) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--tx1),85vh) rotate(700deg)}
}

/* DRAG GHOST */
#ghost {
  position:fixed; pointer-events:none; z-index:9999;
  background:var(--bg3); border:2px solid var(--blue); border-radius:12px;
  padding:8px 16px; font-family:'Fira Code',monospace; font-size:15px; font-weight:600; color:#fff;
  box-shadow:0 8px 24px rgba(79,195,247,.45);
  transform:translate(-50%,-50%) rotate(4deg) scale(1.12);
  display:none; white-space:nowrap;
}
</style>
</head>
<body>

<div id="ghost"></div>

<!-- SUCCESS -->
<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <img class="success-cat-img" id="successCatImg" src="" alt="cat">
    <div class="success-title">Правильно! 🎉</div>
    <div class="success-sub" id="successSub">Отличная работа!</div>
    <button class="btn-next" onclick="nextLevel()">Следующий уровень →</button>
  </div>
</div>

<!-- FINISH -->
<div class="finish-overlay" id="finishOverlay">
  <div class="finish-card">
    <div class="finish-cats-row" id="finishCatsRow"></div>
    <div class="finish-title">Ты прошёл всё! 🏆</div>
    <div class="finish-sub">5 из 5 уровней завершены.<br>Ты настоящий Python-разработчик!</div>
    <button class="btn-restart" onclick="restartAll()">Начать заново 🔄</button>
  </div>
</div>

<div id="app"></div>

    tiles:[{v:'name',c:'bl'},{v:'21',c:'nu'},{v:'age',c:'bl'},{v:'22',c:'nu'},{v:'person',c:'bl'}],
    msg:'Словари — мощь! 👑'
  }
];

// =============================================
//  STATE
// =============================================
let cur = 0, slots = {}, draggingTile = null;
const ghost = document.getElementById('ghost');

// =============================================
//  RENDER
// =============================================
function renderLevel(lvl) {
  const L = LEVELS[lvl]; slots = {};
  let dots = LEVELS.map((_,i)=>`<div class="dot ${i<lvl?'done':i===lvl?'active':''}"></div>`).join('');

  let codeHTML = '';
  L.code.forEach(row => {
    if(!row.toks||row.toks.length===0){codeHTML+=`<div class="code-line"><span class="lnum">${row.n}</span><span class="lcode">&nbsp;</span></div>`;return;}
    let th='';
    row.toks.forEach(tok=>{
      if(tok==='ind'){th+=`<span class="t-ind"></span>`;return;}
      if(tok.startsWith('SLOT:')){
        const p=tok.split(':'); const ans=p[1]; const cls=p[2]||'var';
        const id='s_'+Math.random().toString(36).substr(2,9);
        slots[id]={answer:ans,filledBy:null};
        th+=`<span class="slot" id="${id}" data-slotid="${id}" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="ddr(event,this)"></span>`;
        return;
      }
      const ci=tok.indexOf(':'); const type=tok.substring(0,ci); const val=tok.substring(ci+1);
      th+=`<span class="t-${type}">${val}</span>`;
    });
    codeHTML+=`<div class="code-line"><span class="lnum">${row.n}</span><span class="lcode">${th}</span></div>`;
  });

  let tilesHTML = L.tiles.map((t,i)=>{
    const sv = t.v.replace(/"/g,'&quot;');
    return `<div class="tile ${t.c}" id="t${i}" data-tid="t${i}" data-value='${sv}'
      draggable="true" ondragstart="dds(event)"
      ontouchstart="tts(event)" ontouchmove="ttm(event)" ontouchend="tte(event)">${t.v}</div>`;
  }).join('')

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="progress-dots">${dots}</div>
      <div class="level-badge">Уровень ${lvl+1} / ${LEVELS.length}</div>
    </div>
    <div class="mascot-row">
      <div class="mascot-wrap">
        <div class="cat-img-wrap idle" id="catBox">
          <img src="${CATS[L.cat]}" alt="cat" id="catImg">
          <div class="stars-burst" id="starsBurst"></div>
        </div>
      </div>
      <div class="speech-bubble">
        <div class="cat-name">${L.catName}</div>
        ${L.prompt}
      </div>
    </div>
    <div class="editor">
      <div class="editor-lang">python</div>
      <div class="code-lines">${codeHTML}</div>
    </div>
    <div class="tiles-wrap"><div class="tiles-row">${tilesHTML}</div></div>
    <div class="btns-row">
      <button class="btn-reset" onclick="resetLevel()">Сбросить</button>
      <button class="btn-check" onclick="checkAnswers()">Проверить ✓</button>
    </div>`;
}

// =============================================
//  DRAG MOUSE
// =============================================
function dds(e){draggingTile=e.currentTarget;setTimeout(()=>draggingTile&&draggingTile.classList.add('dragging'),0);e.dataTransfer.setData('val',e.currentTarget.dataset.value);e.dataTransfer.setData('tid',e.currentTarget.id);}
document.addEventListener('dragend',()=>{if(draggingTile){draggingTile.classList.remove('dragging');draggingTile=null;}});
function dov(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dlv(e){e.currentTarget.classList.remove('drag-over');}
function ddr(e,slot){e.preventDefault();slot.classList.remove('drag-over');place(slot,e.dataTransfer.getData('val'),e.dataTransfer.getData('tid'));}

// =============================================
//  DRAG TOUCH
// =============================================
function tts(e){const t=e.currentTarget;if(t.classList.contains('used'))return;draggingTile=t;const tc=e.touches[0];ghost.textContent=t.dataset.value;ghost.style.display='block';ghost.style.left=tc.clientX+'px';ghost.style.top=tc.clientY+'px';t.classList.add('dragging');e.preventDefault();}
function ttm(e){if(!draggingTile)return;const tc=e.touches[0];ghost.style.left=tc.clientX+'px';ghost.style.top=tc.clientY+'px';e.preventDefault();}
function tte(e){if(!draggingTile)return;ghost.style.display='none';draggingTile.classList.remove('dragging');const tc=e.changedTouches[0];const el=document.elementFromPoint(tc.clientX,tc.clientY);const slot=el&&(el.classList.contains('slot')?el:el.closest('.slot'));if(slot)place(slot,draggingTile.dataset.value,draggingTile.id);draggingTile=null;}

// =============================================
//  PLACE
// =============================================
function place(slotEl,val,tileId){
  const sid=slotEl.dataset.slotid; if(!sid||!slots[sid])return;
  const old=slots[sid].filledBy; if(old){const ot=document.getElementById(old);if(ot)ot.classList.remove('used');}
  slots[sid].filledBy=tileId; slotEl.innerHTML=`<span style='color:#c9d1f0;font-family:"Fira Code",monospace;font-size:14px;font-weight:600'>${val}</span>`;
  slotEl.classList.add('filled'); slotEl.classList.remove('correct','wrong-slot');
  const tile=document.getElementById(tileId); if(tile)tile.classList.add('used');
}

// =============================================
//  CHECK
// =============================================
function checkAnswers(){
  let allOk=true, allFilled=true;
  Object.entries(slots).forEach(([sid,info])=>{
    const el=document.getElementById(sid); if(!el)return;
    const given=el.textContent.trim();
    if(!info.filledBy||!given){allFilled=false;return;}
    if(given===info.answer){el.classList.add('correct');el.classList.remove('wrong-slot');}
    else{el.classList.add('wrong-slot');el.classList.remove('correct');allOk=false;}
  });
  if(!allFilled||!allOk){animateCat('wrong');swapCatImg(CATS.sad,600);return;}
  animateCat(cur===LEVELS.length-1?'super':'celebrate');
  swapCatImg(CATS.happy, 1400);
  spawnStars(); spawnHearts();
  setTimeout(()=>showSuccess(),750);
}

// =============================================
//  CAT FX
// =============================================
function animateCat(type){
  const box=document.getElementById('catBox'); if(!box)return;
  box.className='cat-img-wrap'; void box.offsetWidth; box.className='cat-img-wrap '+type;
  setTimeout(()=>{box.className='cat-img-wrap idle';},1300);
}
function swapCatImg(src, restoreAfter){
  const img=document.getElementById('catImg'); if(!img)return;
  const origSrc=img.src;
  img.src=src;
  if(restoreAfter) setTimeout(()=>{img.src=CATS[LEVELS[cur].cat];}, restoreAfter);
}
function spawnStars(){
  const burst=document.getElementById('starsBurst'); if(!burst)return; burst.innerHTML='';
  const icons=['⭐','✨','💫','🌟','⚡'];
  [{x:'-42px',y:'-32px'},{x:'52px',y:'-38px'},{x:'-48px',y:'52px'},{x:'58px',y:'46px'},{x:'10px',y:'-55px'},{x:'-18px',y:'62px'}]
    .forEach((pos,i)=>{const s=document.createElement('div');s.className='star-p';s.textContent=icons[i%5];s.style.setProperty('--tx',`translate(${pos.x},${pos.y})`);s.style.left='46px';s.style.top='46px';s.style.animationDelay=(i*90)+'ms';burst.appendChild(s);});
  setTimeout(()=>{burst.innerHTML='';},1100);
}
function spawnHearts(){
  const box=document.getElementById('catBox'); if(!box)return;
  ['❤️','💖','💕','💗'].forEach((h,i)=>{const el=document.createElement('div');el.className='heart-float';el.textContent=h;el.style.left=(15+i*18)+'px';el.style.top='8px';el.style.animationDelay=(i*130)+'ms';box.appendChild(el);setTimeout(()=>el.remove(),1000);});
}

// =============================================
//  RESET
// =============================================
function resetLevel(){
  Object.entries(slots).forEach(([sid,info])=>{
    const el=document.getElementById(sid);
    if(el){el.innerHTML='';el.classList.remove('filled','correct','wrong-slot');}
    if(info.filledBy){const t=document.getElementById(info.filledBy);if(t)t.classList.remove('used');}
    info.filledBy=null;
  });
}

// =============================================
//  SUCCESS / NEXT / FINISH
// =============================================
function showSuccess(){
  document.getElementById('successCatImg').src = CATS.happy;
  document.getElementById('successSub').textContent = LEVELS[cur].msg;
  document.getElementById('successOverlay').classList.add('show');
  spawnConfetti();
}
function nextLevel(){
  document.getElementById('successOverlay').classList.remove('show');
  cur++; if(cur>=LEVELS.length) showFinish(); else renderLevel(cur);
}
function showFinish(){
  const row=document.getElementById('finishCatsRow');
  const catKeys=['wizard','robot','detective','builder','queen'];
  row.innerHTML=catKeys.map(k=>`<img class="finish-cat-img" src="${CATS[k]}" alt="cat">`).join('');
  document.getElementById('finishOverlay').classList.add('show');
  spawnConfetti(90);
}
function restartAll(){
  cur=0; document.getElementById('finishOverlay').classList.remove('show'); renderLevel(0);
}

// =============================================
//  CONFETTI
// =============================================
function spawnConfetti(n=55){
  const colors=['#F9A825','#4FC3F7','#69F0AE','#CE93D8','#FF5252','#FFFFFF','#FF7043'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div'); el.className='confetti-piece';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.left=(Math.random()*100)+'vw'; el.style.top='-20px';
    el.style.setProperty('--tx0',(Math.random()*40-20)+'px');
    el.style.setProperty('--tx1',(Math.random()*120-60)+'px');
    el.style.setProperty('--dur',(0.8+Math.random()*1.2)+'s');
    el.style.setProperty('--delay',(Math.random()*0.6)+'s');
    const sz=6+Math.random()*8; el.style.width=el.style.height=sz+'px';
    document.body.appendChild(el); setTimeout(()=>el.remove(),2600);
  }
}

// =============================================
//  INIT
// =============================================
renderLevel(0);
</script>
</body>
</html>
