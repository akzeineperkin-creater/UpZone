<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JavaScript с Котиком 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
  --card:#0d1117; --border:#30363d;
  --text:#e6edf3; --text2:#8b949e;
  --accent:#f7c948; --blue:#58a6ff;
  --purple:#d2a8ff; --green:#3fb950; --red:#f85149;
  --js:#f7c948; --kw:#ff7b72; --fn:#d2a8ff; --str:#a5d6ff; --num:#79c0ff; --cmt:#8b949e;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:var(--bg);
  background-image:radial-gradient(ellipse at 10% 0%,rgba(247,201,72,.06) 0%,transparent 50%),
                   radial-gradient(ellipse at 90% 100%,rgba(88,166,255,.06) 0%,transparent 50%);
  min-height:100vh; font-family:"Nunito",sans-serif; color:var(--text);
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:60px; overflow-x:hidden;
}

/* TOP BAR */
.topbar { width:100%; max-width:540px; padding:22px 20px 0; display:flex; align-items:center; justify-content:space-between; }
.progress-dots { display:flex; gap:9px; }
.dot { width:13px; height:13px; border-radius:50%; background:var(--bg3); border:2px solid var(--border); transition:all .35s cubic-bezier(.34,1.56,.64,1); }
.dot.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 12px rgba(247,201,72,.7); transform:scale(1.2); }
.dot.done { background:var(--green); border-color:var(--green); }
.level-badge { font-size:13px; font-weight:700; color:var(--text2); background:var(--bg2); padding:5px 12px; border-radius:20px; border:1px solid var(--border); }

/* MASCOT */
.mascot-row { display:flex; align-items:flex-start; gap:14px; max-width:540px; width:100%; padding:18px 20px 0; }
.mascot-wrap { width:92px; flex-shrink:0; position:relative; }
.cat-img-wrap {
  width:92px; height:92px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#1c2128,#0d1117);
  border:3px solid var(--border);
  box-shadow:0 4px 24px rgba(0,0,0,.8), 0 0 0 1px rgba(247,201,72,.08);
  overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative;
}
.cat-img-wrap img { width:88px; height:88px; object-fit:cover; border-radius:50%; }

@keyframes catIdle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes catBounce {
  0%{transform:translateY(0) rotate(0)} 15%{transform:translateY(-22px) rotate(-9deg)}
  30%{transform:translateY(-8px) rotate(7deg)} 45%{transform:translateY(-18px) rotate(-5deg)}
  60%{transform:translateY(-4px) rotate(3deg)} 80%{transform:translateY(-10px) rotate(-2deg)}
  100%{transform:translateY(0) rotate(0)}
}
@keyframes catSpin { 0%{transform:scale(1) rotate(0)} 30%{transform:scale(1.3) rotate(180deg)} 70%{transform:scale(1.1) rotate(360deg)} 100%{transform:scale(1) rotate(360deg)} }
@keyframes catShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px) rotate(-4deg)} 40%{transform:translateX(8px) rotate(4deg)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
@keyframes heartFloat { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-45px) scale(1.6)} }
@keyframes starFly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:var(--tx) scale(.2)} }

.cat-img-wrap.idle img { animation:catIdle 2.5s ease-in-out infinite; }
.cat-img-wrap.celebrate img { animation:catBounce .9s ease; }
.cat-img-wrap.super img { animation:catSpin 1s ease; }
.cat-img-wrap.wrong img { animation:catShake .45s ease; }

.heart-float { position:absolute; font-size:18px; pointer-events:none; animation:heartFloat .85s ease forwards; z-index:10; }
.star-p { position:absolute; font-size:14px; opacity:0; animation:starFly .65s ease forwards; pointer-events:none; }
.stars-burst { position:absolute; top:0; left:0; width:92px; height:92px; pointer-events:none; }

/* SPEECH BUBBLE */
.speech-bubble {
  background:var(--bg2); border:1.5px solid var(--border); border-radius:16px;
  padding:14px 16px; font-size:15px; line-height:1.6; flex:1; position:relative; color:var(--text);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.speech-bubble::before { content:''; position:absolute; left:-10px; top:22px; border:5px solid transparent; border-right-color:var(--border); }
.speech-bubble::after  { content:''; position:absolute; left:-8px;  top:23px; border:4px solid transparent; border-right-color:var(--bg2); }
.cat-name { font-size:11px; color:var(--accent); font-weight:700; margin-bottom:5px; text-transform:uppercase; letter-spacing:.08em; }
.hl  { color:var(--accent); font-weight:900; }
.hl2 { color:var(--blue); font-weight:800; }

/* EDITOR — GitHub Dark style */
.editor {
  background:#0d1117; border:1.5px solid var(--border); border-radius:18px; padding:0;
  max-width:540px; width:calc(100% - 40px); margin:16px 0 0;
  box-shadow:0 8px 40px rgba(0,0,0,.6); overflow:hidden;
}
.editor-header {
  display:flex; align-items:center; gap:8px; padding:10px 16px;
  background:#161b22; border-bottom:1px solid var(--border);
}
.editor-dot { width:11px; height:11px; border-radius:50%; }
.editor-dot.r{background:#ff5f57} .editor-dot.y{background:#ffbd2e} .editor-dot.g{background:#28c840}
.editor-filename { font-family:"Fira Code",monospace; font-size:12px; color:var(--text2); margin-left:6px; }
.editor-badge { margin-left:auto; background:#f7c94820; color:var(--accent); font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; font-family:"Fira Code",monospace; }

.code-lines { display:flex; flex-direction:column; padding:12px 0 16px; }
.code-line { display:flex; align-items:center; gap:0; min-height:38px; padding:0 16px; }
.code-line:hover { background:rgba(255,255,255,.02); }
.lnum { font-family:"Fira Code",monospace; font-size:12px; color:#3d444d; width:28px; text-align:right; flex-shrink:0; user-select:none; margin-right:20px; }
.lcode { font-family:"Fira Code",monospace; font-size:14px; display:flex; align-items:center; flex-wrap:wrap; gap:2px; line-height:1.9; }

/* JS syntax colors */
.t-kw  { color:#ff7b72; font-weight:600; }
.t-fn  { color:#d2a8ff; }
.t-str { color:#a5d6ff; }
.t-num { color:#79c0ff; }
.t-var { color:#e6edf3; }
.t-op  { color:#e6edf3; }
.t-cmt { color:#8b949e; font-style:italic; }
.t-bool{ color:#79c0ff; font-weight:600; }
.t-ind { display:inline-block; width:22px; }
.t-ind2{ display:inline-block; width:44px; }

/* SLOTS */
.slot {
  display:inline-flex; align-items:center; justify-content:center;
  min-width:60px; height:30px;
  background:rgba(247,201,72,.04);
  border:2px dashed #30363d; border-radius:7px; cursor:pointer;
  font-family:"Fira Code",monospace; font-size:13px; font-weight:600;
  padding:0 10px; transition:all .2s; white-space:nowrap; color:var(--text);
}
.slot:empty::before { content:"___"; color:#3d444d; font-size:12px; }
.slot.drag-over { border-color:var(--accent); background:rgba(247,201,72,.08); box-shadow:0 0 14px rgba(247,201,72,.25); }
.slot.filled { border-style:solid; border-color:#444c56; background:rgba(247,201,72,.06); color:#e6edf3; font-weight:600; }
.slot.correct { border-color:var(--green)!important; background:rgba(63,185,80,.1)!important; color:var(--green)!important; animation:slotPop .35s ease; }
.slot.wrong-slot { border-color:var(--red)!important; background:rgba(248,81,73,.1)!important; color:var(--red)!important; }
@keyframes slotPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

/* TILES */
.tiles-wrap { max-width:540px; width:calc(100% - 40px); margin:18px 0 0; }
.tiles-label { font-size:11px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
.tiles-row { display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
.tile {
  background:var(--bg2); border:1.5px solid var(--border); border-radius:9px;
  padding:7px 14px; font-family:"Fira Code",monospace; font-size:13px; font-weight:600;
  cursor:grab; user-select:none; touch-action:none;
  transition:transform .15s, box-shadow .15s, opacity .2s, border-color .15s; color:var(--text);
}
.tile:hover { border-color:var(--accent); box-shadow:0 0 12px rgba(247,201,72,.2); transform:translateY(-2px); }
.tile:active { cursor:grabbing; }
.tile.kw   { color:#ff7b72; border-color:#5c1a18; background:#160b0a; }
.tile.fn   { color:#d2a8ff; border-color:#4a2880; background:#100820; }
.tile.str  { color:#a5d6ff; border-color:#1a3a5c; background:#080e18; }
.tile.num  { color:#79c0ff; border-color:#1a3050; background:#080c18; }
.tile.bool { color:#79c0ff; border-color:#1a3050; background:#080c18; font-weight:700; }
.tile.op   { color:#e6edf3; border-color:#30363d; }
.tile.dragging { opacity:.3; transform:scale(.92); }
.tile.used { opacity:.15; pointer-events:none; }

/* BUTTONS */
.btns-row { display:flex; gap:12px; max-width:540px; width:calc(100% - 40px); margin:18px 0 0; }
.btn-reset { flex:1; padding:13px; background:var(--bg2); border:1.5px solid var(--border); border-radius:12px; color:var(--text2); font-family:"Nunito",sans-serif; font-weight:700; font-size:15px; cursor:pointer; transition:background .2s; }
.btn-reset:hover { background:var(--bg3); }
.btn-check { flex:1.4; padding:13px; background:linear-gradient(135deg,#2a1f00,#1a1400); border:1.5px solid var(--accent); border-radius:12px; color:var(--accent); font-family:"Nunito",sans-serif; font-weight:800; font-size:15px; cursor:pointer; transition:all .2s; box-shadow:0 0 16px rgba(247,201,72,.12); }
.btn-check:hover { box-shadow:0 0 28px rgba(247,201,72,.25); }
.btn-check:active { transform:scale(.97); }

/* SUCCESS */
.success-overlay { display:none; position:fixed; inset:0; background:rgba(1,4,9,.92); z-index:100; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
.success-overlay.show { display:flex; }
.success-card { background:var(--bg2); border:2px solid var(--green); border-radius:24px; padding:32px 36px; text-align:center; max-width:320px; width:90%; box-shadow:0 0 80px rgba(63,185,80,.2); animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes scaleIn { 0%{transform:scale(.55);opacity:0} 100%{transform:scale(1);opacity:1} }
.success-cat-img { width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid var(--green); margin:0 auto 14px; display:block; box-shadow:0 0 28px rgba(63,185,80,.4); animation:catBounce .9s ease infinite; }
.success-title { font-size:24px; font-weight:900; color:var(--green); margin-bottom:6px; }
.success-sub { font-size:14px; color:var(--text2); margin-bottom:22px; line-height:1.5; }
.btn-next { background:linear-gradient(135deg,var(--green),#2ea043); border:none; border-radius:12px; padding:13px 32px; color:#040d06; font-family:"Nunito",sans-serif; font-weight:900; font-size:16px; cursor:pointer; box-shadow:0 6px 20px rgba(63,185,80,.3); transition:transform .15s; }
.btn-next:active { transform:scale(.96); }

/* FINISH */
.finish-overlay { display:none; position:fixed; inset:0; background:rgba(1,4,9,.97); z-index:300; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(8px); }
.finish-overlay.show { display:flex; }
.finish-card { background:var(--bg2); border:2px solid var(--accent); border-radius:24px; padding:36px; text-align:center; max-width:380px; width:90%; box-shadow:0 0 80px rgba(247,201,72,.2); animation:scaleIn .5s cubic-bezier(.34,1.56,.64,1); }
.finish-cats-row { display:flex; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.finish-cat-img { width:52px; height:52px; border-radius:50%; object-fit:cover; border:2px solid var(--border); }
.finish-title { font-size:26px; font-weight:900; color:var(--accent); margin-bottom:8px; }
.finish-sub { font-size:15px; color:var(--text2); margin-bottom:24px; line-height:1.5; }
.btn-restart { background:linear-gradient(135deg,var(--accent),#d4a017); border:none; border-radius:12px; padding:13px 32px; color:#1a1000; font-family:"Nunito",sans-serif; font-weight:900; font-size:16px; cursor:pointer; box-shadow:0 6px 20px rgba(247,201,72,.25); }

/* CONFETTI */
.confetti-piece { position:fixed; border-radius:2px; opacity:0; pointer-events:none; z-index:200; animation:confettiFall var(--dur) ease forwards var(--delay); }
@keyframes confettiFall { 0%{opacity:1;transform:translate(var(--tx0),0) rotate(0)} 100%{opacity:0;transform:translate(var(--tx1),85vh) rotate(700deg)} }

/* GHOST */
#ghost { position:fixed; pointer-events:none; z-index:9999; background:var(--bg3); border:2px solid var(--accent); border-radius:9px; padding:7px 14px; font-family:"Fira Code",monospace; font-size:13px; font-weight:600; color:#fff; box-shadow:0 8px 24px rgba(247,201,72,.4); transform:translate(-50%,-50%) rotate(4deg) scale(1.12); display:none; white-space:nowrap; }
</style>
</head>
<body>

<div id="ghost"></div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <img class="success-cat-img" id="successCatImg" src="" alt="cat">
    <div class="success-title">Правильно! 🎉</div>
    <div class="success-sub" id="successSub"></div>
    <button class="btn-next" onclick="nextLevel()">Следующий уровень →</button>
  </div>
</div>

<div class="finish-overlay" id="finishOverlay">
  <div class="finish-card">
    <div class="finish-cats-row" id="finishCatsRow"></div>
    <div class="finish-title">JavaScript освоен! 🏆</div>
    <div class="finish-sub">5 из 5 уровней пройдено!<br>Ты настоящий JS-разработчик!</div>
    <button class="btn-restart" onclick="restartAll()">Начать заново 🔄</button>
  </div>
</div>

<div id="app"></div>

      {n:6, toks:['fn:console','op:.','fn:log','op:(','var:cat','op:.','SLOT:color:var','op:);']},
    ],
    tiles:[
      {v:'name',c:'op'},{v:'age',c:'op'},{v:'3',c:'num'},
      {v:'color',c:'op'},{v:'2',c:'num'},{v:'length',c:'op'}
    ],
    msg:'Объекты — освоены! 👑'
  }
];

// Check no duplicate slots per level (safety)
LEVELS.forEach(function(L, li) {
  var seen = {};
  L.code.forEach(function(row) {
    (row.toks||[]).forEach(function(tok) {
      if (tok.indexOf('SLOT:') === 0) {
        var ans = tok.split(':')[1];
        seen[ans] = (seen[ans]||0) + 1;
      }
    });
  });
});

var cur = 0, slots = {}, draggingTile = null;
var ghost = document.getElementById('ghost');

function renderLevel(lvl) {
  var L = LEVELS[lvl];
  slots = {};

  var dots = LEVELS.map(function(_,i){
    return '<div class="dot '+(i<lvl?'done':i===lvl?'active':'')+'" ></div>';
  }).join('');

  var codeHTML = '';
  L.code.forEach(function(row) {
    if (!row.toks || row.toks.length === 0) {
      codeHTML += '<div class="code-line"><span class="lnum">'+row.n+'</span><span class="lcode">&nbsp;</span></div>';
      return;
    }
    var th = '';
    row.toks.forEach(function(tok) {
      if (tok === 'ind')  { th += '<span class="t-ind"></span>';  return; }
      if (tok === 'ind2') { th += '<span class="t-ind2"></span>'; return; }
      if (tok.indexOf('SLOT:') === 0) {
        var parts = tok.split(':');
        var ans = parts[1];
        var cls = parts[2] || 'op';
        var id = 's_' + Math.random().toString(36).substr(2,9);
        slots[id] = { answer: ans, filledBy: null };
        th += '<span class="slot" id="'+id+'" data-slotid="'+id+'" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="ddr(event,this)"></span>';
        return;
      }
      var ci = tok.indexOf(':');
      var type = tok.substring(0, ci);
      var val  = tok.substring(ci + 1);
      th += '<span class="t-'+type+'">'+val+'</span>';
    });
    codeHTML += '<div class="code-line"><span class="lnum">'+row.n+'</span><span class="lcode">'+th+'</span></div>';
  });

  var tilesHTML = L.tiles.map(function(t, i) {
    var sv = t.v.replace(/"/g,'&quot;');
    return '<div class="tile '+t.c+'" id="t'+i+'" data-tid="t'+i+'" data-value=\''+sv+'\' draggable="true" ondragstart="dds(event)" ontouchstart="tts(event)" ontouchmove="ttm(event)" ontouchend="tte(event)">'+t.v+'</div>';
  }).join('');

  document.getElementById('app').innerHTML =
    '<div class="topbar"><div class="progress-dots">'+dots+'</div>' +
    '<div class="level-badge">Уровень '+(lvl+1)+' / '+LEVELS.length+'</div></div>' +
    '<div class="mascot-row">' +
      '<div class="mascot-wrap">' +
        '<div class="cat-img-wrap idle" id="catBox">' +
          '<img src="'+CATS[L.cat]+'" alt="cat" id="catImg">' +
          '<div class="stars-burst" id="starsBurst"></div>' +
        '</div>' +
      '</div>' +
      '<div class="speech-bubble">' +
        '<div class="cat-name">'+L.catName+'</div>' +
        L.prompt +
      '</div>' +
    '</div>' +
    '<div class="editor">' +
      '<div class="editor-header">' +
        '<div class="editor-dot r"></div>' +
        '<div class="editor-dot y"></div>' +
        '<div class="editor-dot g"></div>' +
        '<div class="editor-filename">script.js</div>' +
        '<div class="editor-badge">JS</div>' +
      '</div>' +
      '<div class="code-lines">'+codeHTML+'</div>' +
    '</div>' +
    '<div class="tiles-wrap">' +
      '<div class="tiles-label">Перетащи нужные слова:</div>' +
      '<div class="tiles-row">'+tilesHTML+'</div>' +
    '</div>' +
    '<div class="btns-row">' +
      '<button class="btn-reset" onclick="resetLevel()">Сбросить</button>' +
      '<button class="btn-check" onclick="checkAnswers()">Проверить ✓</button>' +
    '</div>';
}

/* DRAG MOUSE */
function dds(e){ draggingTile=e.currentTarget; setTimeout(function(){if(draggingTile)draggingTile.classList.add('dragging');},0); e.dataTransfer.setData('val',e.currentTarget.dataset.value); e.dataTransfer.setData('tid',e.currentTarget.id); }
document.addEventListener('dragend',function(){ if(draggingTile){draggingTile.classList.remove('dragging');draggingTile=null;} });
function dov(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dlv(e){ e.currentTarget.classList.remove('drag-over'); }
function ddr(e,slot){ e.preventDefault(); slot.classList.remove('drag-over'); place(slot,e.dataTransfer.getData('val'),e.dataTransfer.getData('tid')); }

/* DRAG TOUCH */
function tts(e){ var t=e.currentTarget; if(t.classList.contains('used'))return; draggingTile=t; var tc=e.touches[0]; ghost.textContent=t.dataset.value; ghost.style.display='block'; ghost.style.left=tc.clientX+'px'; ghost.style.top=tc.clientY+'px'; t.classList.add('dragging'); e.preventDefault(); }
function ttm(e){ if(!draggingTile)return; var tc=e.touches[0]; ghost.style.left=tc.clientX+'px'; ghost.style.top=tc.clientY+'px'; e.preventDefault(); }
function tte(e){ if(!draggingTile)return; ghost.style.display='none'; draggingTile.classList.remove('dragging'); var tc=e.changedTouches[0]; var el=document.elementFromPoint(tc.clientX,tc.clientY); var slot=el&&(el.classList.contains('slot')?el:el.closest('.slot')); if(slot)place(slot,draggingTile.dataset.value,draggingTile.id); draggingTile=null; }

/* PLACE */
function place(slotEl,val,tileId){
  var sid=slotEl.dataset.slotid; if(!sid||!slots[sid])return;
  var old=slots[sid].filledBy; if(old){var ot=document.getElementById(old);if(ot)ot.classList.remove('used');}
  slots[sid].filledBy=tileId;
  slotEl.textContent=val; slotEl.style.color='#e6edf3';
  slotEl.classList.add('filled'); slotEl.classList.remove('correct','wrong-slot');
  var tile=document.getElementById(tileId); if(tile)tile.classList.add('used');
}

/* CHECK */
function checkAnswers(){
  var allOk=true, allFilled=true;
  Object.keys(slots).forEach(function(sid){
    var info=slots[sid]; var el=document.getElementById(sid); if(!el)return;
    var given=el.textContent.trim();
    if(!info.filledBy||!given){allFilled=false;return;}
    if(given===info.answer){el.classList.add('correct');el.classList.remove('wrong-slot');}
    else{el.classList.add('wrong-slot');el.classList.remove('correct');allOk=false;}
  });
  if(!allFilled||!allOk){animateCat('wrong');swapCat(CATS.sad,1400);return;}
  animateCat(cur===LEVELS.length-1?'super':'celebrate');
  swapCat(CATS.happy,1500); spawnStars(); spawnHearts();
  setTimeout(showSuccess,750);
}

/* CAT FX */
function animateCat(type){ var b=document.getElementById('catBox');if(!b)return; b.className='cat-img-wrap';void b.offsetWidth;b.className='cat-img-wrap '+type; setTimeout(function(){b.className='cat-img-wrap idle';},1300); }
function swapCat(src,ms){ var i=document.getElementById('catImg');if(!i)return;i.src=src;if(ms)setTimeout(function(){i.src=CATS[LEVELS[cur].cat];},ms); }
function spawnStars(){ var burst=document.getElementById('starsBurst');if(!burst)return;burst.innerHTML=''; var icons=['⭐','✨','💫','🌟','⚡']; [{x:'-42px',y:'-32px'},{x:'52px',y:'-38px'},{x:'-48px',y:'52px'},{x:'58px',y:'46px'},{x:'10px',y:'-55px'},{x:'-18px',y:'62px'}].forEach(function(pos,i){var s=document.createElement('div');s.className='star-p';s.textContent=icons[i%5];s.style.setProperty('--tx','translate('+pos.x+','+pos.y+')');s.style.left='46px';s.style.top='46px';s.style.animationDelay=(i*90)+'ms';burst.appendChild(s);}); setTimeout(function(){burst.innerHTML='';},1100); }
function spawnHearts(){ var b=document.getElementById('catBox');if(!b)return; ['❤️','💖','💕','💗'].forEach(function(h,i){var el=document.createElement('div');el.className='heart-float';el.textContent=h;el.style.left=(15+i*18)+'px';el.style.top='8px';el.style.animationDelay=(i*130)+'ms';b.appendChild(el);setTimeout(function(){el.remove();},1000);}); }

/* RESET */
function resetLevel(){ Object.keys(slots).forEach(function(sid){var info=slots[sid];var el=document.getElementById(sid);if(el){el.innerHTML='';el.style.color='';el.classList.remove('filled','correct','wrong-slot');}if(info.filledBy){var t=document.getElementById(info.filledBy);if(t)t.classList.remove('used');}info.filledBy=null;}); }

/* SUCCESS / NEXT / FINISH */
function showSuccess(){ document.getElementById('successCatImg').src=CATS.happy; document.getElementById('successSub').textContent=LEVELS[cur].msg; document.getElementById('successOverlay').classList.add('show'); spawnConfetti(); }
function nextLevel(){ document.getElementById('successOverlay').classList.remove('show'); cur++; if(cur>=LEVELS.length)showFinish();else renderLevel(cur); }
function showFinish(){ var row=document.getElementById('finishCatsRow'); ['wizard','robot','detective','builder','queen'].forEach(function(k){var img=document.createElement('img');img.className='finish-cat-img';img.src=CATS[k];row.appendChild(img);}); document.getElementById('finishOverlay').classList.add('show'); spawnConfetti(90); }
function restartAll(){ cur=0; document.getElementById('finishOverlay').classList.remove('show'); renderLevel(0); }

/* CONFETTI */
function spawnConfetti(n){ n=n||55; var colors=['#f7c948','#58a6ff','#3fb950','#d2a8ff','#f85149','#ffffff','#ff7b72']; for(var i=0;i<n;i++){var el=document.createElement('div');el.className='confetti-piece';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.left=(Math.random()*100)+'vw';el.style.top='-20px';el.style.setProperty('--tx0',(Math.random()*40-20)+'px');el.style.setProperty('--tx1',(Math.random()*120-60)+'px');el.style.setProperty('--dur',(0.8+Math.random()*1.2)+'s');el.style.setProperty('--delay',(Math.random()*.6)+'s');var sz=6+Math.random()*8;el.style.width=el.style.height=sz+'px';document.body.appendChild(el);setTimeout(function(){el.remove();},2600);} }

renderLevel(0);
</script>
</body>
</html>
