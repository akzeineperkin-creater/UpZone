<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Upzone — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      min-height: 100%;
      height: 100%;
    }

    body {
      background: linear-gradient(to bottom, #0a0e17 0%, #00040f 100%);
      font-family: 'Roboto', sans-serif;
      color: #d0d8e0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(0,170,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: row;
      background: rgba(12,18,28,0.95);
      border-radius: 20px;
      border: 1px solid rgba(0,170,255,0.18);
      box-shadow: 0 15px 50px rgba(0,0,0,0.75), inset 0 0 25px rgba(0,170,255,0.06);
      backdrop-filter: blur(10px);
      overflow: hidden;
      z-index: 2;
    }

    .form-side {
      flex: 1;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-side {
      flex: 1;
      background: rgba(0,170,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(80,180,255,0.55));
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      text-align: center;
      color: #ffffff;
      letter-spacing: 2.5px;
      text-shadow: 0 0 12px rgba(0,170,255,0.45);
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #8899aa;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #c0d0e0;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #0e1622;
      border: 1px solid #1e2f45;
      border-radius: 10px;
      color: #f0f4f8;
      font-size: 16px; /* 16px prevents iOS zoom */
      transition: all 0.3s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus {
      outline: none;
      border-color: #00aaff;
      box-shadow: 0 0 0 3px rgba(0,170,255,0.18);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0;
      font-size: 14px;
      color: #8899aa;
      gap: 8px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      margin: 0;
      cursor: pointer;
      min-height: 44px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      accent-color: #00aaff;
      flex-shrink: 0;
      padding: 0;
    }

    .forgot {
      color: #00aaff;
      text-decoration: none;
      font-size: 14px;
      min-height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }
    .forgot:hover { text-decoration: underline; color: #40c0ff; }

    button[type="submit"], .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #0077cc, #00aaff);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 6px 18px rgba(0,170,255,0.35);
      min-height: 52px;
      -webkit-appearance: none;
    }

    button[type="submit"]:hover, .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,170,255,0.5);
      background: linear-gradient(90deg, #00aaff, #40c0ff);
    }
    button[type="submit"]:active, .btn-primary:active {
      transform: translateY(0);
    }

    .toggle-auth {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #8899aa;
      line-height: 2;
    }

    .toggle-auth a { color: #00aaff; text-decoration: none; font-weight: 500; }
    .toggle-auth a:hover { text-decoration: underline; }

    /* ─── MOBILE ─── */
    @media (max-width: 640px) {
      body {
        padding: 0;
        align-items: flex-start;
        background: #0a0e17;
      }

      .container {
        flex-direction: column;
        max-width: 100%;
        width: 100%;
        min-height: 100dvh;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }

      .logo-side {
        order: -1;
        padding: 28px 20px 16px;
        background: rgba(0,170,255,0.04);
        min-height: 140px;
        border-bottom: 1px solid rgba(0,170,255,0.10);
      }

      .logo {
        max-height: 90px;
        max-width: 200px;
      }

      .form-side {
        padding: 24px 20px 32px;
        justify-content: flex-start;
        flex: unset;
      }

      h1 { font-size: 22px; letter-spacing: 1.5px; }
      .subtitle { font-size: 13px; margin-bottom: 24px; }

      input {
        padding: 15px 16px;
        font-size: 16px;
        border-radius: 12px;
      }

      .form-group { margin-bottom: 16px; }

      .checkbox-group {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        margin: 12px 0;
      }

      button[type="submit"] {
        padding: 17px;
        font-size: 16px;
        border-radius: 12px;
        min-height: 54px;
      }

      .toggle-auth {
        margin-top: 20px;
        padding-bottom: 12px;
      }
    }

    /* ─── MODAL ─── */
    #forgotModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.80);
      z-index: 9999;
      align-items: flex-end;
      justify-content: center;
    }

    @media (min-width: 641px) {
      #forgotModal { align-items: center; }
    }

    .modal-inner {
      background: #0c121c;
      border: 1px solid rgba(0,170,255,0.25);
      border-radius: 24px 24px 0 0;
      padding: 32px 24px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.7);
      animation: slideUp 0.3s ease;
    }

    @media (min-width: 641px) {
      .modal-inner {
        border-radius: 20px;
        padding: 40px 36px;
        margin: 16px;
        animation: fadeScale 0.25s ease;
      }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    @keyframes fadeScale {
      from { transform: scale(0.94); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 20px;
      display: block;
    }

    @media (min-width: 641px) {
      .modal-handle { display: none; }
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      color: #8899aa;
      font-size: 26px;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      padding: 0;
      line-height: 1;
      border-radius: 50%;
    }
    .modal-close:hover { color: #fff; background: rgba(255,255,255,0.06); }

    .modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px;
      color: white;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    .modal-sub {
      text-align: center;
      color: #8899aa;
      font-size: 13px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-label {
      font-size: 13px;
      color: #c0d0e0;
      display: block;
      margin-bottom: 8px;
    }

    .modal-input {
      width: 100%;
      padding: 14px 16px;
      background: #0e1622;
      border: 1px solid #1e2f45;
      border-radius: 12px;
      color: #f0f4f8;
      font-size: 16px;
      outline: none;
      margin-bottom: 16px;
      -webkit-appearance: none;
    }
    .modal-input:focus {
      border-color: #00aaff;
      box-shadow: 0 0 0 3px rgba(0,170,255,0.15);
    }

    .modal-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #0077cc, #00aaff);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,170,255,0.35);
      min-height: 52px;
      -webkit-appearance: none;
      transition: all 0.3s;
    }
    .modal-btn:active { transform: scale(0.98); }

    /* OTP boxes */
    .otp-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .otp-box {
      width: 44px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      background: #0e1622;
      border: 1px solid #1e2f45;
      border-radius: 10px;
      color: #00aaff;
      outline: none;
      transition: border-color 0.2s;
      padding: 0;
      -webkit-appearance: none;
    }

    @media (max-width: 380px) {
      .otp-box { width: 38px; height: 48px; font-size: 20px; gap: 6px; }
      .otp-row { gap: 6px; }
    }

    .otp-box:focus { border-color: #00aaff; box-shadow: 0 0 0 2px rgba(0,170,255,0.2); }

    .resend-link {
      color: #8899aa;
      font-size: 13px;
      text-decoration: none;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 10px;
    }
    .resend-link.active { color: #00aaff; }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      min-height: 20px;
    }

    /* Eye button */
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      width: 44px;
      height: 44px;
      box-shadow: none;
      color: #8899aa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }
  </style>
</head>
<body>

  <div class="container" id="auth-container">
    <!-- Logo side -->
    <div class="logo-side">
      <img src="logo.jpg" alt="Upzone Logo" class="logo">
    </div>

    <!-- Form side -->
    <div class="form-side">
      <h1>WELCOME BACK!</h1>
      <p class="subtitle">Upzone — от идеи до первых заработков</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Username или email</label>
          <input type="text" id="emailInput" placeholder="example@gmail.com" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <div style="position: relative;">
            <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" required style="padding-right: 52px;">
            <button type="button" onclick="togglePassword()" id="eyeBtn" class="eye-btn">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="checkbox-group">
          <label><input type="checkbox"> Запомнить меня</label>
          <a href="#" class="forgot" onclick="showForgotModal(event)">Забыли пароль?</a>
        </div>

        <button type="submit">Sign In</button>
      </form>

      <div class="toggle-auth">
        <span>Нет аккаунта? </span>
        <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="forgotModal">
    <div class="modal-inner" id="modalInner">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeForgotModal()">×</button>

      <!-- Step 1: email -->
      <div id="step-email">
        <h2 class="modal-title">ВОССТАНОВЛЕНИЕ</h2>
        <p class="modal-sub">Введите ваш email — пришлём 6-значный код</p>
        <label class="modal-label">Email</label>
        <input type="email" id="forgot-email" class="modal-input" placeholder="example@gmail.com" autocomplete="email">
        <button class="modal-btn" onclick="sendOtpCode()" id="sendCodeBtn">Отправить код</button>
        <div id="step1-msg" class="msg"></div>
      </div>

      <!-- Step 2: OTP + new password -->
      <div id="step-code" style="display:none;">
        <h2 class="modal-title">ВВЕДИТЕ КОД</h2>
        <p id="code-hint" class="modal-sub"></p>

        <div class="otp-row">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        </div>

        <label class="modal-label">Новый пароль</label>
        <div style="position:relative; margin-bottom:16px;">
          <input type="password" id="new-pass" class="modal-input" placeholder="••••••••" style="margin-bottom:0; padding-right:52px;" autocomplete="new-password">
          <button type="button" onclick="toggleNewPass()" id="newPassEye" class="eye-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <button class="modal-btn" onclick="verifyOtpAndReset()" id="verifyBtn">Подтвердить и сменить пароль</button>

        <div style="text-align:center;">
          <a href="#" onclick="resendCode(event)" id="resendLink" class="resend-link">Отправить код повторно</a>
        </div>
        <div id="step2-msg" class="msg"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://dvwegmdyhjyihrxqvoiw.supabase.co';
    const supabaseKey = 'sb_publishable_hDqX9KkG5m38yourV2K43w_PYB7ktXI';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        alert('Ошибка входа: ' + error.message);
      } else {
        window.location.href = 'home.html';
      }
    });

    function togglePassword() {
      const input = document.getElementById('passwordInput');
      const btn   = document.getElementById('eyeBtn');
      const hide  = input.type === 'password';
      input.type  = hide ? 'text' : 'password';
      btn.style.color = hide ? '#00aaff' : '#8899aa';
      btn.innerHTML = hide
        ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    // Modal
    let otpEmail = '';
    let resendTimer = null;

    function showForgotModal(e) {
      e.preventDefault();
      document.getElementById('forgotModal').style.display = 'flex';
      setTimeout(() => document.getElementById('forgot-email').focus(), 350);
    }

    function closeForgotModal() {
      document.getElementById('forgotModal').style.display = 'none';
      document.getElementById('step-email').style.display = 'block';
      document.getElementById('step-code').style.display  = 'none';
      document.getElementById('forgot-email').value = '';
      document.getElementById('new-pass').value     = '';
      document.querySelectorAll('.otp-box').forEach(b => b.value = '');
      document.getElementById('step1-msg').textContent = '';
      document.getElementById('step2-msg').textContent = '';
      if (resendTimer) clearInterval(resendTimer);
    }

    async function sendOtpCode() {
      const email = document.getElementById('forgot-email').value.trim();
      const msg   = document.getElementById('step1-msg');
      const btn   = document.getElementById('sendCodeBtn');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msg.style.color = '#f87171';
        msg.textContent = '❌ Введите корректный email';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Отправка...';

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: false }
      });

      btn.disabled    = false;
      btn.textContent = 'Отправить код';
      msg.style.color = '#4ade80';
      msg.textContent = '✅ Если email зарегистрирован — код отправлен';

      if (!error) {
        otpEmail = email;
        setTimeout(() => {
          document.getElementById('step-email').style.display = 'none';
          document.getElementById('step-code').style.display  = 'block';
          document.getElementById('code-hint').textContent    = `Код отправлен на ${email}`;
          setupOtpBoxes();
          startResendTimer();
        }, 1000);
      }
    }

    function setupOtpBoxes() {
      const boxes = document.querySelectorAll('.otp-box');
      boxes.forEach((box, i) => {
        box.value = '';
        box.style.borderColor = '#1e2f45';
        const fresh = box.cloneNode(true);
        box.parentNode.replaceChild(fresh, box);
        boxes[i] = fresh;
      });
      document.querySelectorAll('.otp-box').forEach((box, i, all) => {
        box.addEventListener('input', () => {
          box.value = box.value.replace(/\D/g, '');
          if (box.value && i < all.length - 1) all[i + 1].focus();
        });
        box.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !box.value && i > 0) all[i - 1].focus();
        });
        box.addEventListener('focus', () => box.style.borderColor = '#00aaff');
        box.addEventListener('blur',  () => box.style.borderColor = box.value ? '#00aaff' : '#1e2f45');
      });
      document.querySelectorAll('.otp-box')[0].focus();
    }

    function startResendTimer() {
      const link = document.getElementById('resendLink');
      let seconds = 60;
      link.style.pointerEvents = 'none';
      link.classList.remove('active');
      if (resendTimer) clearInterval(resendTimer);
      resendTimer = setInterval(() => {
        seconds--;
        link.textContent = `Отправить повторно (${seconds}s)`;
        if (seconds <= 0) {
          clearInterval(resendTimer);
          link.textContent = 'Отправить код повторно';
          link.style.pointerEvents = 'auto';
          link.classList.add('active');
        }
      }, 1000);
    }

    async function resendCode(e) {
      e.preventDefault();
      await supabaseClient.auth.signInWithOtp({ email: otpEmail, options: { shouldCreateUser: false } });
      startResendTimer();
    }

    async function verifyOtpAndReset() {
      const boxes   = document.querySelectorAll('.otp-box');
      const code    = Array.from(boxes).map(b => b.value).join('');
      const newPass = document.getElementById('new-pass').value;
      const msg     = document.getElementById('step2-msg');
      const btn     = document.getElementById('verifyBtn');

      if (code.length < 6) {
        msg.style.color = '#f87171';
        msg.textContent = '❌ Введите все 6 цифр кода';
        return;
      }
      if (newPass.length < 6) {
        msg.style.color = '#f87171';
        msg.textContent = '❌ Пароль должен быть не менее 6 символов';
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Проверка...';

      const { error: otpError } = await supabaseClient.auth.verifyOtp({
        email: otpEmail, token: code, type: 'email'
      });

      if (otpError) {
        msg.style.color = '#f87171';
        msg.textContent = '❌ Неверный или устаревший код';
        btn.disabled    = false;
        btn.textContent = 'Подтвердить и сменить пароль';
        document.querySelectorAll('.otp-box').forEach(b => b.style.borderColor = '#f87171');
        return;
      }

      const { error: passError } = await supabaseClient.auth.updateUser({ password: newPass });

      if (passError) {
        msg.style.color = '#f87171';
        msg.textContent = '❌ ' + passError.message;
        btn.disabled    = false;
        btn.textContent = 'Подтвердить и сменить пароль';
        return;
      }

      msg.style.color = '#4ade80';
      msg.textContent = '✅ Пароль изменён! Входим...';
      if (resendTimer) clearInterval(resendTimer);
      setTimeout(() => {
        closeForgotModal();
        window.location.href = 'home.html';
      }, 1500);
    }

    function toggleNewPass() {
      const input = document.getElementById('new-pass');
      const btn   = document.getElementById('newPassEye');
      const hide  = input.type === 'password';
      input.type  = hide ? 'text' : 'password';
      btn.style.color = hide ? '#00aaff' : '#8899aa';
      btn.innerHTML = hide
        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    // Close modal on backdrop click (not on swipe up)
    document.getElementById('forgotModal').addEventListener('click', function(e) {
      if (e.target === this) closeForgotModal();
    });
  </script>
</body>
</html>
