
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Upzone — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { min-height: 100%; height: 100%; }

    body {
      background: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      color: #f5f5f0;
      display: flex;
      align-items: stretch;
      overflow-x: hidden;
      overflow-y: auto;
      cursor: crosshair;
    }

    /* noise */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── LAYOUT ── */
    .container {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* left panel */
    .brand-side {
      width: 420px;
      flex-shrink: 0;
      background: #e8ff00;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }

    .brand-side::before {
      content: 'UPZONE';
      font-family: 'Bebas Neue', sans-serif;
      font-size: 160px;
      letter-spacing: -4px;
      line-height: 1;
      color: rgba(0,0,0,0.06);
      position: absolute;
      bottom: -20px;
      left: -10px;
      pointer-events: none;
      user-select: none;
    }

    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      color: #0d0d0d;
      text-decoration: none;
    }

    .brand-tagline {
      position: relative;
      z-index: 1;
    }

    .brand-tagline h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      line-height: 0.9;
      letter-spacing: -1px;
      color: #0d0d0d;
      margin-bottom: 16px;
    }

    .brand-tagline p {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.5);
    }

    /* right panel */
    .form-side {
      flex: 1;
      background: #0d0d0d;
      border-left: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 72px;
    }

    .form-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888880;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      letter-spacing: 1px;
      color: #f5f5f0;
      margin-bottom: 40px;
      line-height: 1;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888880;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 0;
      color: #f5f5f0;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #e8ff00;
      box-shadow: none;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #e8ff00;
      flex-shrink: 0;
      padding: 0;
      cursor: crosshair;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 18px 0;
      font-size: 13px;
      color: #888880;
      gap: 8px;
    }

    .checkbox-group > label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      cursor: crosshair;
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
      color: #888880;
    }

    .forgot {
      color: #888880;
      text-decoration: none;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid #2a2a2a;
      transition: color 0.15s, border-color 0.15s;
    }
    .forgot:hover { color: #e8ff00; border-color: #e8ff00; }

    button[type="submit"] {
      width: 100%;
      padding: 16px;
      background: #e8ff00;
      border: none;
      border-radius: 0;
      color: #0d0d0d;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: crosshair;
      transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
      min-height: 52px;
      -webkit-appearance: none;
      margin-top: 8px;
    }
    button[type="submit"]:hover {
      background: #c8f000;
      transform: translate(-2px, -2px);
      box-shadow: 2px 2px 0 #e8ff00;
    }
    button[type="submit"]:active { transform: translate(0,0); box-shadow: none; }

    .toggle-auth {
      margin-top: 28px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #888880;
    }

    .toggle-auth a {
      color: #e8ff00;
      text-decoration: none;
      border-bottom: 1px solid rgba(232,255,0,0.3);
      transition: border-color 0.15s;
    }
    .toggle-auth a:hover { border-color: #e8ff00; }

    /* eye btn */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: crosshair;
      padding: 0;
      width: 40px;
      height: 40px;
      box-shadow: none;
      color: #888880;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      min-height: auto;
    }
    .eye-btn:hover { color: #e8ff00; background: none; transform: translateY(-50%); box-shadow: none; }

    /* ── MODAL ── */
    #forgotModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: flex-end;
      justify-content: center;
    }

    @media (min-width: 641px) {
      #forgotModal { align-items: center; }
    }

    .modal-inner {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 0;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      position: relative;
      animation: slideUp 0.3s ease;
    }

    @media (min-width: 641px) {
      .modal-inner {
        border-top: 3px solid #e8ff00;
        animation: fadeScale 0.25s ease;
        margin: 16px;
      }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes fadeScale {
      from { transform: scale(0.96); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .modal-handle {
      width: 40px; height: 3px;
      background: #2a2a2a;
      margin: 0 auto 24px;
      display: block;
    }

    @media (min-width: 641px) { .modal-handle { display: none; } }

    .modal-close {
      position: absolute;
      top: 14px; right: 14px;
      background: none;
      border: 1px solid #2a2a2a;
      color: #888880;
      font-size: 18px;
      cursor: crosshair;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      padding: 0;
      line-height: 1;
      border-radius: 0;
      min-height: auto;
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-close:hover { color: #e8ff00; border-color: #e8ff00; background: none; transform: none; box-shadow: none; }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: #f5f5f0;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .modal-sub {
      color: #888880;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal-label {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888880;
      display: block;
      margin-bottom: 8px;
    }

    .modal-input {
      width: 100%;
      padding: 14px 16px;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 0;
      color: #f5f5f0;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      margin-bottom: 16px;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: #e8ff00; }

    .modal-btn {
      width: 100%;
      padding: 15px;
      background: #e8ff00;
      border: none;
      border-radius: 0;
      color: #0d0d0d;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: crosshair;
      min-height: 52px;
      -webkit-appearance: none;
      transition: background 0.15s;
    }
    .modal-btn:active { background: #c8f000; transform: none; }

    .otp-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .otp-box {
      width: 44px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 0;
      color: #e8ff00;
      outline: none;
      transition: border-color 0.2s;
      padding: 0;
      -webkit-appearance: none;
    }

    @media (max-width: 380px) {
      .otp-box { width: 38px; height: 48px; font-size: 20px; }
      .otp-row { gap: 6px; }
    }

    .otp-box:focus { border-color: #e8ff00; }

    .resend-link {
      color: #888880;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 10px;
      transition: color 0.15s;
    }
    .resend-link.active { color: #e8ff00; }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      min-height: 20px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .brand-side { display: none; }
      .form-side { padding: 48px 28px; border-left: none; }
    }

    @media (max-width: 480px) {
      .form-side { padding: 40px 20px 48px; justify-content: flex-start; padding-top: 60px; }
      h1 { font-size: 44px; }
    }
  </style>
</head>
<body>

<div class="container" id="auth-container">

  <!-- Brand side -->
  <div class="brand-side">
    <a href="landing.html" class="brand-logo">UPZONE</a>
    <div class="brand-tagline">
      <h2>ДОБРО<br>ПОЖА-<br>ЛОВАТЬ</h2>
      <p>— Платформа для фрилансеров</p>
    </div>
  </div>

  <!-- Form side -->
  <div class="form-side">
    <div class="form-eyebrow">— Авторизация</div>
    <h1>ВОЙТИ В АККАУНТ</h1>

    <form id="loginForm">
      <div class="form-group">
        <label>Username или Email</label>
        <input type="text" id="emailInput" placeholder="example@gmail.com" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <div style="position: relative;">
          <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" required style="padding-right: 52px;">
          <button type="button" onclick="togglePassword()" id="eyeBtn" class="eye-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="checkbox-group">
        <label><input type="checkbox"> Запомнить меня</label>
        <a href="#" class="forgot" onclick="showForgotModal(event)">Забыли пароль?</a>
      </div>

      <button type="submit">Sign In →</button>
    </form>

    <div class="toggle-auth">
      Нет аккаунта? &nbsp;<a href="signup.html">Зарегистрироваться</a>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="forgotModal">
  <div class="modal-inner" id="modalInner">
    <span class="modal-handle"></span>
    <button class="modal-close" onclick="closeForgotModal()">×</button>

    <div id="step-email">
      <h2 class="modal-title">ВОССТАНОВЛЕНИЕ</h2>
      <p class="modal-sub">Введите email — пришлём 6-значный код</p>
      <label class="modal-label">Email</label>
      <input type="email" id="forgot-email" class="modal-input" placeholder="example@gmail.com" autocomplete="email">
      <button class="modal-btn" onclick="sendOtpCode()" id="sendCodeBtn">Отправить код</button>
      <div id="step1-msg" class="msg"></div>
    </div>

    <div id="step-code" style="display:none;">
      <h2 class="modal-title">ВВЕДИТЕ КОД</h2>
      <p id="code-hint" class="modal-sub"></p>

      <div class="otp-row">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      </div>

      <label class="modal-label">Новый пароль</label>
      <div style="position:relative; margin-bottom:16px;">
        <input type="password" id="new-pass" class="modal-input" placeholder="••••••••" style="margin-bottom:0; padding-right:52px;" autocomplete="new-password">
        <button type="button" onclick="toggleNewPass()" id="newPassEye" class="eye-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button class="modal-btn" onclick="verifyOtpAndReset()" id="verifyBtn">Подтвердить и сменить пароль</button>

      <div style="text-align:center;">
        <a href="#" onclick="resendCode(event)" id="resendLink" class="resend-link">Отправить код повторно</a>
      </div>
      <div id="step2-msg" class="msg"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = 'https://dvwegmdyhjyihrxqvoiw.supabase.co';
  const supabaseKey = 'sb_publishable_hDqX9KkG5m38yourV2K43w_PYB7ktXI';
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) { alert('Ошибка входа: ' + error.message); }
    else { window.location.href = 'home.html'; }
  });

  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const btn   = document.getElementById('eyeBtn');
    const hide  = input.type === 'password';
    input.type  = hide ? 'text' : 'password';
    btn.style.color = hide ? '#e8ff00' : '#888880';
    btn.innerHTML = hide
      ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  let otpEmail = '';
  let resendTimer = null;

  function showForgotModal(e) {
    e.preventDefault();
    document.getElementById('forgotModal').style.display = 'flex';
    setTimeout(() => document.getElementById('forgot-email').focus(), 350);
  }

  function closeForgotModal() {
    document.getElementById('forgotModal').style.display = 'none';
    document.getElementById('step-email').style.display = 'block';
    document.getElementById('step-code').style.display  = 'none';
    document.getElementById('forgot-email').value = '';
    document.getElementById('new-pass').value     = '';
    document.querySelectorAll('.otp-box').forEach(b => b.value = '');
    document.getElementById('step1-msg').textContent = '';
    document.getElementById('step2-msg').textContent = '';
    if (resendTimer) clearInterval(resendTimer);
  }

  async function sendOtpCode() {
    const email = document.getElementById('forgot-email').value.trim();
    const msg   = document.getElementById('step1-msg');
    const btn   = document.getElementById('sendCodeBtn');
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      msg.style.color = '#ff3c3c';
      msg.textContent = '✕ Введите корректный email';
      return;
    }
    btn.disabled    = true;
    btn.textContent = 'Отправка...';
    const { error } = await supabaseClient.auth.signInWithOtp({ email, options: { shouldCreateUser: false } });
    btn.disabled    = false;
    btn.textContent = 'Отправить код';
    msg.style.color = '#e8ff00';
    msg.textContent = '✓ Если email зарегистрирован — код отправлен';
    if (!error) {
      otpEmail = email;
      setTimeout(() => {
        document.getElementById('step-email').style.display = 'none';
        document.getElementById('step-code').style.display  = 'block';
        document.getElementById('code-hint').textContent    = `Код отправлен на ${email}`;
        setupOtpBoxes();
        startResendTimer();
      }, 1000);
    }
  }

  function setupOtpBoxes() {
    const boxes = document.querySelectorAll('.otp-box');
    boxes.forEach((box, i) => {
      box.value = '';
      box.style.borderColor = '#2a2a2a';
      const fresh = box.cloneNode(true);
      box.parentNode.replaceChild(fresh, box);
      boxes[i] = fresh;
    });
    document.querySelectorAll('.otp-box').forEach((box, i, all) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '');
        if (box.value && i < all.length - 1) all[i + 1].focus();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) all[i - 1].focus();
      });
      box.addEventListener('focus', () => box.style.borderColor = '#e8ff00');
      box.addEventListener('blur',  () => box.style.borderColor = box.value ? '#e8ff00' : '#2a2a2a');
    });
    document.querySelectorAll('.otp-box')[0].focus();
  }

  function startResendTimer() {
    const link = document.getElementById('resendLink');
    let seconds = 60;
    link.style.pointerEvents = 'none';
    link.classList.remove('active');
    if (resendTimer) clearInterval(resendTimer);
    resendTimer = setInterval(() => {
      seconds--;
      link.textContent = `Отправить повторно (${seconds}s)`;
      if (seconds <= 0) {
        clearInterval(resendTimer);
        link.textContent = 'Отправить код повторно';
        link.style.pointerEvents = 'auto';
        link.classList.add('active');
      }
    }, 1000);
  }

  async function resendCode(e) {
    e.preventDefault();
    await supabaseClient.auth.signInWithOtp({ email: otpEmail, options: { shouldCreateUser: false } });
    startResendTimer();
  }

  async function verifyOtpAndReset() {
    const boxes   = document.querySelectorAll('.otp-box');
    const code    = Array.from(boxes).map(b => b.value).join('');
    const newPass = document.getElementById('new-pass').value;
    const msg     = document.getElementById('step2-msg');
    const btn     = document.getElementById('verifyBtn');
    if (code.length < 6) { msg.style.color = '#ff3c3c'; msg.textContent = '✕ Введите все 6 цифр кода'; return; }
    if (newPass.length < 6) { msg.style.color = '#ff3c3c'; msg.textContent = '✕ Пароль должен быть не менее 6 символов'; return; }
    btn.disabled    = true;
    btn.textContent = 'Проверка...';
    const { error: otpError } = await supabaseClient.auth.verifyOtp({ email: otpEmail, token: code, type: 'email' });
    if (otpError) {
      msg.style.color = '#ff3c3c';
      msg.textContent = '✕ Неверный или устаревший код';
      btn.disabled    = false;
      btn.textContent = 'Подтвердить и сменить пароль';
      document.querySelectorAll('.otp-box').forEach(b => b.style.borderColor = '#ff3c3c');
      return;
    }
    const { error: passError } = await supabaseClient.auth.updateUser({ password: newPass });
    if (passError) {
      msg.style.color = '#ff3c3c';
      msg.textContent = '✕ ' + passError.message;
      btn.disabled    = false;
      btn.textContent = 'Подтвердить и сменить пароль';
      return;
    }
    msg.style.color = '#e8ff00';
    msg.textContent = '✓ Пароль изменён! Входим...';
    if (resendTimer) clearInterval(resendTimer);
    setTimeout(() => { closeForgotModal(); window.location.href = 'home.html'; }, 1500);
  }

  function toggleNewPass() {
    const input = document.getElementById('new-pass');
    const btn   = document.getElementById('newPassEye');
    const hide  = input.type === 'password';
    input.type  = hide ? 'text' : 'password';
    btn.style.color = hide ? '#e8ff00' : '#888880';
    btn.innerHTML = hide
      ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }

  document.getElementById('forgotModal').addEventListener('click', function(e) {
    if (e.target === this) closeForgotModal();
  });
</script>
</body>
</html>
